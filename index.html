<!DOCTYPE html>
<html lang="ckb" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>بیلال بازار | Bilal Bazar</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;600;700;900&family=Outfit:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060a08;--surface:#0e1712;--elevated:#131e17;
  --border:#1c2d22;--border2:#253d2d;
  --text:#dff0e8;--muted:#5a8a6e;--soft:#98c4aa;
  --accent:#10b981;--accent2:#059669;--accent3:#6ee7b7;
  --danger:#ef4444;--danger2:#b91c1c;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.rtl{direction:rtl}.ltr{direction:ltr}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:2px}
.nsb{-ms-overflow-style:none;scrollbar-width:none}
.nsb::-webkit-scrollbar{display:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
@keyframes glow{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:none}}
@keyframes slideL{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:none}}

/* ══ TOP SPONSOR BANNER ══ */
.sp-top-wrap{
  position:relative;width:100%;overflow:hidden;height:74px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
}
@media(min-width:641px){.sp-top-wrap{height:90px}}
.sp-top-slide{position:absolute;inset:0;transition:opacity .55s ease}
.sp-top-slide img,.sp-top-slide video{width:100%;height:100%;object-fit:cover;display:block}
.sp-top-slide a{display:block;width:100%;height:100%}
.sp-top-label{position:absolute;top:4px;right:6px;z-index:3;font-size:7px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:rgba(255,255,255,.5);background:rgba(0,0,0,.3);padding:1px 5px;border-radius:3px;pointer-events:none}

/* ══ FLOAT SPONSOR ══ */
.sp-float-wrap{position:fixed;bottom:72px;left:0;z-index:44;pointer-events:none;transition:opacity .55s ease}
.sp-float-inner{position:relative;width:190px;height:54px;border-radius:0 12px 12px 0;overflow:hidden;background:#fff;box-shadow:0 4px 20px rgba(0,0,0,.5);pointer-events:auto}
.sp-float-inner img{width:100%;height:100%;object-fit:contain;display:block}
.sp-float-inner video{width:100%;height:100%;object-fit:cover;display:block}
.sp-float-label{position:absolute;top:3px;right:5px;z-index:3;font-size:6px;font-weight:800;text-transform:uppercase;color:rgba(0,0,0,.3);background:rgba(255,255,255,.7);padding:1px 4px;border-radius:2px;pointer-events:none}
@media(min-width:641px){.sp-float-inner{width:220px;height:64px}}

/* ══ LAYOUT ══ */
.c{max-width:1100px;margin:0 auto;padding:0 16px}
.flex{display:flex}.col{flex-direction:column}
.ac{align-items:center}.jb{justify-content:space-between}.jc{justify-content:center}
.gap2{gap:8px}.gap3{gap:12px}.gap4{gap:16px}
.f1{flex:1}.wf{width:100%}
.tc{text-align:center}.muted{color:var(--muted)}.acc{color:var(--accent)}

/* ══ BUTTONS ══ */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;text-decoration:none}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#02140d}
.btn-p:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-g:hover{border-color:var(--accent);color:var(--text)}
.btn-d{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.22)}
.btn-d:hover{background:rgba(239,68,68,.2)}
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(16,185,129,.1);color:var(--accent);border:1px solid rgba(16,185,129,.18)}

/* ══ CARD ══ */
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:border-color .2s,box-shadow .2s;will-change:transform;transform:translateZ(0);contain:layout style}
.card:hover{border-color:rgba(16,185,129,.28);box-shadow:0 10px 32px rgba(0,0,0,.42)}
body.lb-open .card{pointer-events:none}

.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}

/* ══ TOAST ══ */
.toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;min-width:190px;text-align:center;animation:toastIn .3s ease}
.t-ok{background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.3);color:var(--accent3)}
.t-err{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.28);color:#fca5a5}

/* ══ MODAL ══ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:80;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:540px){.ov{align-items:center;padding:20px}}
.mbox{background:var(--elevated);border:1px solid var(--border);width:100%;max-width:500px;max-height:93vh;overflow-y:auto;border-radius:20px 20px 0 0;animation:slideUp .22s ease}
@media(min-width:540px){.mbox{border-radius:20px;animation:scaleIn .18s ease}}
.mhdr{position:sticky;top:0;z-index:2;background:var(--elevated);padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhdr h3{font-weight:800;font-size:15px}
.mbody{padding:18px 20px}

/* ══ DRAWER ══ */
.dov{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.8)}
.dpanel{position:absolute;top:0;bottom:0;width:min(290px,85vw);background:var(--surface);border-inline-end:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.rtl .dpanel{right:0;animation:slideR .22s ease}
.ltr .dpanel{left:0;animation:slideL .22s ease}
.di{display:flex;align-items:center;gap:12px;padding:13px 18px;font-size:14px;font-weight:600;color:var(--text);background:none;border:none;border-bottom:1px solid rgba(255,255,255,.04);width:100%;text-align:inherit;cursor:pointer;transition:background .12s;text-decoration:none;font-family:inherit}
.di:hover{background:var(--elevated)}
.dico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* ══ MOBILE NAV ══ */
.mnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(6,10,8,.97);border-top:1px solid var(--border);display:flex;justify-content:space-around;height:54px;padding-bottom:env(safe-area-inset-bottom)}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--muted);background:none;border:none;cursor:pointer;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;transition:color .14s}
.mnb.act{color:var(--accent)}

/* ══ HEADER ══ */
.hdr{position:sticky;top:0;z-index:40;background:rgba(6,10,8,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}

/* ══ HERO ══ */
#hero{position:relative;min-height:100vh;min-height:100dvh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(150deg,#071510 0%,#0b1e15 50%,#060a08 100%)}
.hero-vid{position:absolute;inset:0;z-index:0}
.hero-vid video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;pointer-events:none}
.hero-vid::after{content:'';position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(4,9,6,.78) 0%,rgba(4,9,6,.25) 44%,rgba(4,9,6,.88) 100%)}
.hero-body{position:relative;z-index:2;text-align:center;padding:108px 20px 88px;max-width:860px;margin:0 auto;width:100%}
.hero-title{font-weight:900;font-size:clamp(46px,9.5vw,100px);letter-spacing:-2px;line-height:.93;background:linear-gradient(130deg,#fff 0%,#aaf0d0 38%,var(--accent) 65%,#fff 100%);background-size:280% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeUp .7s ease .1s both}
.hero-sub{font-weight:900;font-size:clamp(15px,2.8vw,22px);color:rgba(245,212,96,.84);margin-top:10px;font-family:'Noto Sans Arabic',sans-serif;animation:fadeUp .7s ease .36s both}
.hero-desc{color:rgba(214,236,255,.6);font-size:clamp(13px,2vw,15px);line-height:1.78;margin:14px auto 34px;max-width:500px;animation:fadeUp .7s ease .58s both}
.hero-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;animation:fadeUp .7s ease .78s both}
.hero-stats{display:flex;gap:40px;justify-content:center;margin-top:52px;flex-wrap:wrap;animation:fadeUp .7s ease .98s both}

/* ══ PRODUCT IMAGE GRID ══ */
.pimg{position:relative}
.fi{background:var(--border);overflow:hidden;cursor:pointer;position:relative}
.fi img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .25s}
.fi:hover img{transform:scale(1.04)}

.g1{height:258px}
.g2i{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:200px}
.g3i{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;height:180px}
.g4i{display:grid;grid-template-columns:repeat(2,1fr);grid-template-rows:repeat(2,1fr);gap:2px;height:220px}
.g5i{display:grid;grid-template-columns:repeat(6,1fr);grid-template-rows:repeat(2,1fr);gap:2px;height:200px}
.g5i .fi:nth-child(1){grid-column:1/3}
.g5i .fi:nth-child(2){grid-column:3/5}
.g5i .fi:nth-child(3){grid-column:5/7}
.g5i .fi:nth-child(4){grid-column:1/4}
.g5i .fi:nth-child(5){grid-column:4/7}
.g6i{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(2,1fr);gap:2px;height:220px}

@media(max-width:640px){
  .g1{height:210px!important}
  .g2i{height:170px!important}
  .g3i{height:150px!important}
  .g4i,.g5i,.g6i{height:180px!important}
}

/* Discount badge */
.disc{position:absolute;top:10px;right:10px;z-index:5;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--danger),var(--danger2));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:12px;line-height:1;text-align:center;box-shadow:0 4px 14px rgba(185,28,28,.48)}
.ltr .disc{right:auto;left:10px}
.exp-ribbon{position:absolute;top:0;left:0;right:0;background:rgba(170,20,20,.82);padding:5px;text-align:center;z-index:4;pointer-events:none}
.exp-ribbon span{color:#fff;font-weight:900;font-size:11px;letter-spacing:.5px}

/* ══ COUNTDOWN ══ */
.cdown{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18)}
.cb{text-align:center;min-width:24px}
.cn{font-weight:900;font-size:16px;line-height:1;color:#fff}
.cl{font-size:7px;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}
.cs{color:rgba(16,185,129,.45);font-weight:900;font-size:13px;align-self:center;margin-bottom:2px}

/* ══ POST ACTIONS ══ */
.post-actions{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;padding-top:10px;border-top:1px solid var(--border)}
.act-btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:6px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .14s;white-space:nowrap;font-family:inherit;height:32px}
.act-btn:hover{border-color:var(--accent);color:var(--text)}
.act-btn.liked{background:rgba(239,68,68,.13);color:var(--danger);border-color:rgba(239,68,68,.3)}
.act-btn.active{color:var(--accent);border-color:var(--accent)}
.admin-btns{display:flex;gap:4px;margin-inline-start:auto}

/* ══ GLOBAL LIGHTBOX ══ */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;display:flex;align-items:center;justify-content:center;animation:fadeIn .15s ease;touch-action:pan-y}
.lbc{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.1);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2}
.lb-img{max-width:93vw;max-height:88vh;object-fit:contain;border-radius:10px;display:block;user-select:none;-webkit-user-drag:none}
.lb-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:46px;height:46px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:2;transition:background .15s}
.lb-nav:hover{background:rgba(255,255,255,.2)}
.lb-counter{position:absolute;top:14px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.7);font-size:13px;font-weight:700;z-index:2;background:rgba(0,0,0,.45);padding:3px 12px;border-radius:20px;pointer-events:none}

/* ══ COMMENTS ══ */
.cm-list{display:flex;flex-direction:column;gap:8px;max-height:220px;overflow-y:auto;padding-inline-end:2px}
.cm-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.cm-reply-item{background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.18);border-radius:10px;padding:8px 11px;margin-inline-start:24px;margin-top:5px}
.cm-meta{display:flex;align-items:center;gap:7px;margin-bottom:5px}
.cm-name{font-weight:800;font-size:12px;color:var(--accent);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.cm-admin-tag{font-size:9px;font-weight:800;background:rgba(16,185,129,.15);color:var(--accent);padding:1px 5px;border-radius:4px;border:1px solid rgba(16,185,129,.25);flex-shrink:0}
.cm-date{font-size:9px;color:var(--muted);margin-inline-start:auto;flex-shrink:0}
.cm-txt{font-size:12px;line-height:1.5;color:var(--soft);word-break:break-word}
.cm-char{font-size:9px;color:var(--muted);text-align:end;margin-top:3px}
.cm-input-row{display:flex;align-items:center;gap:7px;margin-top:10px;background:var(--elevated);border:1px solid var(--border);border-radius:10px;padding:6px 10px}
.cm-input-row input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:12px;font-family:inherit}
.cm-input-row input::placeholder{color:var(--muted)}
.cm-input-row button{background:none;border:none;cursor:pointer;color:var(--accent);font-size:14px;padding:2px 4px;flex-shrink:0}
.cm-input-row button:disabled{opacity:.35;cursor:not-allowed}
.cm-login-box{margin-top:10px;background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center}
.cm-reply-form{margin-inline-start:24px;margin-top:5px;background:rgba(16,185,129,.04);border:1px solid rgba(16,185,129,.15);border-radius:10px;padding:8px 10px}

/* ══ COMMENT DELETE BUTTON (NEW) ══ */
.cm-del-btn{
  background:none;border:none;cursor:pointer;
  color:rgba(255,255,255,.18);font-size:13px;font-weight:900;
  padding:0 3px;line-height:1;transition:color .12s;
  flex-shrink:0;margin-inline-start:4px;
  display:inline-flex;align-items:center;justify-content:center;
  width:18px;height:18px;border-radius:4px;
}
.cm-del-btn:hover{color:var(--danger);background:rgba(239,68,68,.1)}

/* ══ TITLE SEE-MORE BUTTON (NEW) ══ */
.title-toggle{
  display:inline;background:none;border:none;cursor:pointer;
  color:var(--accent);font-size:11px;font-weight:700;
  padding:1px 5px;margin-inline-start:4px;
  font-family:inherit;vertical-align:baseline;line-height:inherit;
  opacity:.85;
}
.title-toggle:hover{opacity:1;text-decoration:underline}

/* ══ SKELETON ══ */
.sk{background:linear-gradient(90deg,var(--border) 25%,var(--elevated) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

/* ══ SECTION TITLE ══ */
.stitle{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.stitle::before{content:'';width:26px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));flex-shrink:0}
.stitle h2{font-weight:900;font-size:24px}

/* ══ LOCATION CARD ══ */
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-decoration:none;color:inherit;display:block;transition:transform .2s,border-color .2s,box-shadow .2s}
.lcard:hover{border-color:rgba(16,185,129,.28);transform:translateY(-4px);box-shadow:0 12px 36px rgba(0,0,0,.42)}

.feats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.feat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 14px;width:138px;text-align:center;transition:border-color .2s}
.feat:hover{border-color:var(--accent)}
.feat-ico{width:40px;height:40px;border-radius:10px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:17px;color:var(--accent)}

.fab-wa{position:fixed;bottom:66px;right:16px;width:50px;height:50px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;z-index:45;box-shadow:0 4px 20px rgba(37,211,102,.4);transition:transform .18s;text-decoration:none}
.fab-wa:hover{transform:scale(1.1)}
.fab-add{position:fixed;bottom:66px;left:16px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;display:flex;align-items:center;justify-content:center;color:#02140d;font-size:22px;z-index:45;cursor:pointer;box-shadow:0 4px 20px rgba(16,185,129,.42);transition:transform .18s}
.fab-add:hover{transform:scale(1.1) rotate(90deg)}

.av-sel{display:flex;gap:10px;justify-content:center;margin-top:8px}
.av-opt{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 18px;border-radius:12px;border:2px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg);font-size:11px;font-weight:700;color:var(--muted)}
.av-opt.chosen{border-color:var(--accent);background:rgba(16,185,129,.08);color:var(--accent)}
.av-opt span{font-size:28px}

.divline{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}

.pl-toggle{display:flex;gap:8px;margin-bottom:2px}
.pl-btn{flex:1;padding:10px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg);color:var(--muted);font-size:12px;font-weight:700;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;align-items:center;gap:4px}
.pl-btn.sel{border-color:var(--accent);background:rgba(16,185,129,.08);color:var(--accent)}
.pl-btn i{font-size:16px}

/* ══ CONTEXT ══ */
const Ctx=React.createContext();
function Provider({children}){
  const[lang,setLang]=useState('ckb');
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[ready,setReady]=useState(false);
  const[toasts,setToasts]=useState([]);

  const t=useCallback(k=>{
    const keys=k.split('.');let v=TX[lang];
    for(const x of keys){if(v==null)return k;v=v[x]}
    return v==null?k:String(v);
  },[lang]);

  const toast=useCallback((msg,ok=true)=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,ok}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3500);
  },[]);

  const sw=useCallback(l=>{
    setLang(l);
    document.documentElement.lang=l;
    document.documentElement.dir=l==='en'?'ltr':'rtl';
  },[]);

  const loadProfile=useCallback(async uid=>{
    if(!uid)return;
    const{data}=await SB.from('profiles').select('*').eq('id',uid).maybeSingle();
    setProfile(data||null);
  },[]);

  useEffect(()=>{
    if(window.location.hash&&window.location.hash.includes('error')){
      const p=new URLSearchParams(window.location.hash.slice(1));
      const e=p.get('error_description')||p.get('error')||'Auth error';
      toast(decodeURIComponent(e.replace(/\+/g,' ')),false);
      window.history.replaceState(null,'',window.location.pathname);
    }
    SB.auth.getSession().then(({data:{session}})=>{
      const u=session?.user||null;
      setUser(u);if(u)loadProfile(u.id);setReady(true);
    });
    const{data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>{
      const u=s?.user||null;setUser(u);
      if(u)loadProfile(u.id);else setProfile(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const isAdmin=user?.email===ADMIN;
  const dir=lang==='en'?'ltr':'rtl';
  return(
    <Ctx.Provider value={{lang,t,sw,dir,user,profile,setProfile,isAdmin,ready,toast,loadProfile}}>
      {children}
      <div className="toast-wrap">{toasts.map(x=><div key={x.id} className={`toast ${x.ok?'t-ok':'t-err'}`}>{x.msg}</div>)}</div>
    </Ctx.Provider>
  );
}
const useApp=()=>useContext(Ctx);

/* ══ HELPERS ══ */
function tleft(iso,days){
  const d=new Date(iso).getTime()+days*86400000-Date.now();
  if(d<=0)return null;
  return{d:Math.floor(d/86400000),h:Math.floor(d%86400000/3600000),m:Math.floor(d%3600000/60000)};
}
function parseImgs(v){try{return Array.isArray(v)?v:JSON.parse(v||'[]')}catch{return[]}}
function isVideoUrl(url=''){return/\.(mp4|webm|mov|ogg|m4v)(\?|$)/i.test(url)}

async function uploadToStorage(bucket,fileOrBlob,ext='jpg'){
  const name=`${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
  const ctype=fileOrBlob instanceof Blob&&fileOrBlob.type?fileOrBlob.type:`image/${ext}`;
  const{error}=await SB.storage.from(bucket).upload(name,fileOrBlob,{contentType:ctype,upsert:false});
  if(error)throw new Error(error.message||'Storage upload failed');
  return SB.storage.from(bucket).getPublicUrl(name).data.publicUrl;
}

/* ══ CROP MODAL ══ */
function CropModal({file,aspect,onDone,onClose}){
  const{t}=useApp();
  const[img,setImg]=useState(null);
  const[crop,setCrop]=useState({x:0,y:0});
  const[drag,setDrag]=useState(false);
  const dr=useRef({});
  const sr=useRef({rw:320,rh:320,cw:320,ch:80,scale:1});

  useEffect(()=>{
    if(!file)return;
    const url=URL.createObjectURL(file);
    const im=new Image();
    im.onload=()=>{
      const nw=im.naturalWidth,nh=im.naturalHeight;
      const maxW=Math.min(window.innerWidth-52,420);
      const sc=Math.min(maxW/nw,300/nh,1);
      const rw=Math.round(nw*sc),rh=Math.round(nh*sc);
      let cw,ch;
      if(aspect>=(rw/rh)){cw=rw;ch=Math.max(1,Math.round(rw/aspect));}
      else{ch=rh;cw=Math.max(1,Math.round(rh*aspect));}
      sr.current={rw,rh,cw,ch,scale:sc};
      setImg(im);setCrop({x:Math.round((rw-cw)/2),y:Math.round((rh-ch)/2)});
    };
    im.src=url;
    return()=>URL.revokeObjectURL(url);
  },[file,aspect]);

  const getXY=e=>e.touches?{cx:e.touches[0].clientX,cy:e.touches[0].clientY}:{cx:e.clientX,cy:e.clientY};
  const onS=e=>{setDrag(true);const{cx,cy}=getXY(e);dr.current={sx:cx,sy:cy,cx:crop.x,cy:crop.y};};
  const onM=e=>{if(!drag)return;const{cx,cy}=getXY(e);const dx=cx-dr.current.sx,dy=cy-dr.current.sy;const{rw,rh,cw,ch}=sr.current;setCrop({x:Math.max(0,Math.min(rw-cw,dr.current.cx+dx)),y:Math.max(0,Math.min(rh-ch,dr.current.cy+dy))});};
  const onE=()=>setDrag(false);
  const confirm=()=>{
    if(!img)return;
    const{scale,cw,ch}=sr.current;
    const sx=crop.x/scale,sy=crop.y/scale,sw=cw/scale,sh=ch/scale;
    const outW=Math.min(aspect>=4?1600:1200,Math.round(sw));
    const outH=Math.round(outW/aspect);
    const cv=document.createElement('canvas');cv.width=outW;cv.height=outH;
    cv.getContext('2d').drawImage(img,sx,sy,sw,sh,0,0,outW,outH);
    cv.toBlob(b=>{if(b)onDone(b);},'image/jpeg',.92);
  };
  if(!img)return<div className="ov"><div className="mbox" style={{maxWidth:320,textAlign:'center'}} onClick={e=>e.stopPropagation()}><div className="mbody"><i className="fas fa-spinner fa-spin acc" style={{fontSize:28}}/></div></div></div>;
  const{rw,rh,cw,ch}=sr.current;
  return(
    <div className="ov" onClick={onClose}>
      <div className="mbox" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><h3>{t('crop')}</h3><button className="btn btn-g" onClick={onClose} style={{padding:'5px 10px'}}>×</button></div>
        <div className="mbody" style={{textAlign:'center'}}>
          <p style={{fontSize:11,color:'var(--muted)',marginBottom:12}}>Drag to adjust</p>
          <div style={{display:'inline-block',position:'relative',cursor:'grab',touchAction:'none',userSelect:'none'}}
            onMouseDown={onS} onMouseMove={onM} onMouseUp={onE} onMouseLeave={onE}
            onTouchStart={onS} onTouchMove={onM} onTouchEnd={onE}>
            <img src={img.src} alt="" style={{width:rw,height:rh,display:'block',borderRadius:8,maxWidth:'100%'}} draggable={false}/>
            <div style={{position:'absolute',left:crop.x,top:crop.y,width:cw,height:ch,border:'2px dashed rgba(255,255,255,.9)',boxShadow:'0 0 0 9999px rgba(0,0,0,.52)',borderRadius:4,pointerEvents:'none'}}/>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:16}}>
            <button className="btn btn-g" onClick={onClose}>{t('cancel')}</button>
            <button className="btn btn-p" onClick={confirm}><i className="fas fa-check"/> {t('upload')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ══ GLOBAL LIGHTBOX ══ */
function GlobalLightbox({imgs,startIdx,onClose}){
  const[i,setI]=useState(startIdx);
  const ts=useRef(null);

  useEffect(()=>{
    document.body.classList.add('lb-open');
    const h=e=>{
      if(e.key==='Escape')onClose();
      if(e.key==='ArrowLeft')setI(x=>(x-1+imgs.length)%imgs.length);
      if(e.key==='ArrowRight')setI(x=>(x+1)%imgs.length);
    };
    window.addEventListener('keydown',h);
    return()=>{document.body.classList.remove('lb-open');window.removeEventListener('keydown',h);};
  },[imgs,onClose]);

  const prev=()=>setI(x=>(x-1+imgs.length)%imgs.length);
  const next=()=>setI(x=>(x+1)%imgs.length);

  const onTouchStart=e=>{ts.current=e.touches[0].clientX;};
  const onTouchEnd=e=>{
    if(ts.current===null)return;
    const dx=e.changedTouches[0].clientX-ts.current;
    if(Math.abs(dx)>40){dx<0?next():prev();}
    ts.current=null;
  };

  const onImgClick=e=>{
    if(imgs.length<=1){onClose();return;}
    e.stopPropagation();
    const{left,width}=e.currentTarget.getBoundingClientRect();
    (e.clientX-left)<width/2?prev():next();
  };

  return(
    <div className="lb" onClick={onClose} onTouchStart={onTouchStart} onTouchEnd={onTouchEnd}>
      <button className="lbc" onClick={e=>{e.stopPropagation();onClose();}}>×</button>
      {imgs.length>1&&<div className="lb-counter">{i+1} / {imgs.length}</div>}
      <img src={imgs[i]} alt="" className="lb-img" onClick={onImgClick} style={{cursor:imgs.length>1?'pointer':'zoom-out'}}/>
      {imgs.length>1&&<>
        <button className="lb-nav" style={{left:10}} onClick={e=>{e.stopPropagation();prev();}}>‹</button>
        <button className="lb-nav" style={{right:10}} onClick={e=>{e.stopPropagation();next();}}>›</button>
      </>}
    </div>
  );
}

/* ══ TOP SPONSOR ══ */
function SpTop({sponsors}){
  const[idx,setIdx]=useState(0);
  const[opacity,setOpacity]=useState(1);
  const SHOW=6000,FADE=500;
  useEffect(()=>{
    if(sponsors.length<=1)return;
    const id=setInterval(()=>{
      setOpacity(0);
      setTimeout(()=>{setIdx(i=>(i+1)%sponsors.length);setOpacity(1);},FADE);
    },SHOW);
    return()=>clearInterval(id);
  },[sponsors.length]);
  if(!sponsors.length)return null;
  const s=sponsors[idx];
  const vid=isVideoUrl(s.image_url);
  const media=vid
    ?<video src={s.image_url} autoPlay muted loop playsInline style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>
    :<img src={s.image_url} alt="" style={{width:'100%',height:'100%',objectFit:'cover',display:'block'}}/>;
  const inner=s.link_url?<a href={s.link_url} target="_blank" rel="noreferrer" style={{display:'block',width:'100%',height:'100%'}}>{media}</a>:media;
  return(
    <div className="sp-top-wrap">
      <div className="sp-top-slide" style={{opacity,transition:`opacity ${FADE}ms ease`}}>{inner}</div>
      <span className="sp-top-label">Ad</span>
    </div>
  );
}

/* ══ FLOAT SPONSOR ══ */
function SpFloat({sponsors}){
  const[visible,setVisible]=useState(false);
  const[idx,setIdx]=useState(0);
  useEffect(()=>{
    if(!sponsors.length)return;
    let t;
    const cycle=()=>{
      setVisible(true);
      t=setTimeout(()=>{
        setVisible(false);
        setIdx(i=>(i+1)%sponsors.length);
        t=setTimeout(cycle,22000);
      },7000);
    };
    t=setTimeout(cycle,5000);
    return()=>clearTimeout(t);
  },[sponsors.length]);
  if(!sponsors.length)return null;
  const s=sponsors[idx];
  const vid=isVideoUrl(s.image_url);
  const media=vid?<video src={s.image_url} autoPlay muted loop playsInline/>:<img src={s.image_url} alt=""/>;
  const inner=s.link_url?<a href={s.link_url} target="_blank" rel="noreferrer" style={{display:'block',width:'100%',height:'100%'}}>{media}</a>:media;
  return(
    <div className="sp-float-wrap" style={{opacity:visible?1:0,pointerEvents:visible?'auto':'none',transition:'opacity .55s ease'}}>
      <div className="sp-float-inner"><span className="sp-float-label">Ad</span>{inner}</div>
    </div>
  );
}

function SponsorsDisplay({sponsors}){
  const top=sponsors.filter(s=>s.placement==='top');
  const bot=sponsors.filter(s=>s.placement!=='top');
  return<><SpTop sponsors={top}/><SpFloat sponsors={bot}/></>;
}

/* ══ COUNTDOWN ══ */
function Countdown({iso,days}){
  const{t}=useApp();
  const[tl,setTl]=useState(()=>tleft(iso,days));
  useEffect(()=>{const id=setInterval(()=>setTl(tleft(iso,days)),30000);return()=>clearInterval(id);},[iso,days]);
  if(!tl)return<span style={{fontSize:11,fontWeight:700,color:'var(--danger)'}}>{t('finished')}</span>;
  return(
    <div className="cdown">
      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(
        <React.Fragment key={i}>
          {i>0&&<span className="cs">:</span>}
          <div className="cb"><div className="cn">{String(x.v).padStart(2,'0')}</div><div className="cl">{x.l}</div></div>
        </React.Fragment>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════
   COMMENTS
   ─ NEW: deleteComment function
   ─ NEW: delete button (×) on each comment/reply
     • Admin → can delete any comment
     • User  → can delete only their own comment
     • Others see no delete button
══════════════════════════════════════════ */
function Comments({postId,user,onLogin}){
  const{t,profile,toast,isAdmin}=useApp();
  const[list,setList]=useState([]);
  const[text,setText]=useState('');
  const[busy,setBusy]=useState(false);
  const[fetched,setFetched]=useState(false);
  const[replyTo,setReplyTo]=useState(null);
  const[replyText,setReplyText]=useState('');
  const[replyBusy,setReplyBusy]=useState(false);

  useEffect(()=>{
    let cancelled=false;
    (async()=>{
      const{data:cmts}=await SB.from('comments')
        .select('id,content,created_at,user_id,parent_id,is_admin_reply')
        .eq('post_id',postId).order('created_at',{ascending:true});
      if(cancelled)return;
      if(!cmts||!cmts.length){setList([]);setFetched(true);return;}
      const ids=[...new Set(cmts.map(c=>c.user_id))];
      const{data:profs}=await SB.from('profiles').select('id,name,avatar,avatar_url').in('id',ids);
      if(cancelled)return;
      const pm={};(profs||[]).forEach(p=>{pm[p.id]=p;});
      setList(cmts.map(c=>({...c,profile:pm[c.user_id]||null})));
      setFetched(true);
    })();
    return()=>{cancelled=true;};
  },[postId]);

  /* ── DELETE comment (admin: any / user: own only) ── */
  const deleteComment=async id=>{
    if(!user)return;
    if(!window.confirm(t('delCmt')+'?'))return;
    const{error}=await SB.from('comments').delete().eq('id',id);
    if(error){toast(error.message,false);return;}
    /* Remove the comment AND any replies to it from local state */
    setList(p=>p.filter(c=>c.id!==id&&c.parent_id!==id));
    toast('Deleted ✓');
  };

  const submit=async e=>{
    e.preventDefault();
    const tr=text.trim();
    if(!tr||!user||tr.length>MAX_COMMENT)return;
    setBusy(true);
    const{data,error}=await SB.from('comments')
      .insert({post_id:postId,user_id:user.id,content:tr,parent_id:null,is_admin_reply:false})
      .select('id,content,created_at,user_id,parent_id,is_admin_reply').single();
    setBusy(false);
    if(error){toast(error.message,false);return;}
    setList(p=>[...p,{...data,profile:profile?{name:profile.name,avatar:profile.avatar,avatar_url:profile.avatar_url}:null}]);
    setText('');
  };

  const submitReply=async(parentId)=>{
    const tr=replyText.trim();
    if(!tr||!user||tr.length>MAX_COMMENT)return;
    setReplyBusy(true);
    const{data,error}=await SB.from('comments')
      .insert({post_id:postId,user_id:user.id,content:tr,parent_id:parentId,is_admin_reply:true})
      .select('id,content,created_at,user_id,parent_id,is_admin_reply').single();
    setReplyBusy(false);
    if(error){toast(error.message,false);return;}
    setList(p=>[...p,{...data,profile:profile?{name:profile.name,avatar:profile.avatar,avatar_url:profile.avatar_url}:null}]);
    setReplyText('');setReplyTo(null);
  };

  if(!user)return(
    <div style={{borderTop:'1px solid var(--border)',paddingTop:10,marginTop:10}}>
      <div className="cm-login-box">
        <p style={{fontSize:12,color:'var(--muted)',marginBottom:10}}>{t('loginFirst')}</p>
        <div style={{display:'flex',gap:8,justifyContent:'center'}}>
          <button className="btn btn-p" style={{padding:'7px 16px',fontSize:12}} onClick={onLogin}>{t('login')}</button>
          <button className="btn btn-g" style={{padding:'7px 16px',fontSize:12}} onClick={onLogin}>{t('signup')}</button>
        </div>
      </div>
    </div>
  );

  const topLevel=list.filter(c=>!c.parent_id);
  const getReplies=pid=>list.filter(c=>c.parent_id===pid);
  /* Show delete button for admin (any comment) or for own comment */
  const canDelete=c=>isAdmin||(user&&user.id===c.user_id);

  return(
    <div style={{borderTop:'1px solid var(--border)',paddingTop:10,marginTop:10}}>
      <div className="cm-list">
        {!fetched&&<p style={{fontSize:11,color:'var(--muted)',padding:'6px 0'}}>Loading…</p>}
        {fetched&&!topLevel.length&&<p style={{fontSize:11,color:'var(--muted)',padding:'6px 0'}}>{t('noCmt')}</p>}
        {topLevel.map(c=>(
          <div key={c.id}>
            <div className="cm-item">
              <div className="cm-meta">
                <Av profile={c.profile} size={24} emojiSz={13}/>
                <span className="cm-name">{c.profile?.name||'User'}</span>
                <span className="cm-date">{new Date(c.created_at).toLocaleDateString()}</span>
                {/* DELETE BUTTON — visible only to owner or admin */}
                {canDelete(c)&&(
                  <button className="cm-del-btn" title={t('delCmt')} onClick={()=>deleteComment(c.id)}>×</button>
                )}
              </div>
              <div className="cm-txt">{c.content}</div>
              {isAdmin&&(
                <button style={{background:'none',border:'none',cursor:'pointer',color:'var(--accent)',fontSize:10,fontWeight:700,marginTop:5,padding:'2px 0'}}
                  onClick={()=>setReplyTo(replyTo===c.id?null:c.id)}>
                  <i className="fas fa-reply" style={{marginInlineEnd:4}}/>{t('reply')}
                </button>
              )}
            </div>
            {/* Replies */}
            {getReplies(c.id).map(r=>(
              <div key={r.id} className="cm-reply-item">
                <div className="cm-meta">
                  <Av profile={r.profile} size={22} emojiSz={12}/>
                  <span className="cm-name">{r.profile?.name||'Admin'}</span>
                  <span className="cm-admin-tag">Admin</span>
                  <span className="cm-date">{new Date(r.created_at).toLocaleDateString()}</span>
                  {/* Admin can also delete replies */}
                  {canDelete(r)&&(
                    <button className="cm-del-btn" title={t('delCmt')} onClick={()=>deleteComment(r.id)}>×</button>
                  )}
                </div>
                <div className="cm-txt">{r.content}</div>
              </div>
            ))}
            {replyTo===c.id&&(
              <div className="cm-reply-form">
                <div style={{display:'flex',gap:6,alignItems:'center'}}>
                  <Av profile={profile} size={20} emojiSz={11}/>
                  <input className="inp" style={{fontSize:11,padding:'6px 8px',flex:1}} placeholder="Write reply…"
                    value={replyText} onChange={e=>setReplyText(e.target.value.slice(0,MAX_COMMENT))} autoFocus/>
                  <button className="btn btn-p" style={{padding:'6px 10px',fontSize:11,height:30,flexShrink:0}}
                    onClick={()=>submitReply(c.id)} disabled={replyBusy||!replyText.trim()}>
                    {replyBusy?<i className="fas fa-spinner fa-spin"/>:<i className="fas fa-paper-plane"/>}
                  </button>
                  <button className="btn btn-g" style={{padding:'6px 8px',fontSize:11,height:30,flexShrink:0}}
                    onClick={()=>{setReplyTo(null);setReplyText('');}}>×</button>
                </div>
                <div className="cm-char">{replyText.length}/{MAX_COMMENT}</div>
              </div>
            )}
          </div>
        ))}
      </div>
      <form onSubmit={submit}>
        <div className="cm-input-row">
          <Av profile={profile} size={22} emojiSz={12}/>
          <input placeholder={t('addCmt')} value={text}
            onChange={e=>setText(e.target.value.slice(0,MAX_COMMENT))} maxLength={MAX_COMMENT}/>
          <button type="submit" disabled={busy||!text.trim()}>
            {busy?<i className="fas fa-spinner fa-spin"/>:<i className="fas fa-paper-plane"/>}
          </button>
        </div>
        <div className="cm-char">{text.length}/{MAX_COMMENT}</div>
      </form>
    </div>
  );
}


/* ══ HELPER: is post new (< 48h) ══ */
function isNewPost(iso){return(Date.now()-new Date(iso).getTime())<172800000;}

/* ══ QUICK VIEW MODAL ══ */
function QuickViewModal({post,onClose,onOpenLb,user,onLogin}){
  const{t,dir,lang,toast}=useApp();
  const[selImg,setSelImg]=useState(0);
  const[liked,setLiked]=useState(false);
  const[likes,setLikes]=useState(post.like_count||0);
  const allImgs=parseImgs(post.images);
  const rawTitle=post.title_ckb||post.title_en||'Bilal Bazar';
  const expired=!tleft(post.created_at,post.discount_days);
  const isHot=likes>=5;
  const isNew=isNewPost(post.created_at);
  const stockQty=post.stock_qty??null;

  useEffect(()=>{
    if(!user)return;
    SB.from('likes').select('id').eq('post_id',post.id).eq('user_id',user.id).maybeSingle()
      .then(({data})=>setLiked(!!data));
  },[user?.id,post.id]);

  const handleLike=async()=>{
    if(!user){onClose();onLogin();return;}
    try{
      if(liked){
        await SB.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);
        const nv=Math.max(0,likes-1);await SB.from('posts').update({like_count:nv}).eq('id',post.id);
        setLiked(false);setLikes(nv);
      }else{
        const{error}=await SB.from('likes').insert({post_id:post.id,user_id:user.id});
        if(error)throw error;
        const nv=likes+1;await SB.from('posts').update({like_count:nv}).eq('id',post.id);
        setLiked(true);setLikes(nv);
      }
    }catch(e){toast(e.message||'Like failed',false);}
  };

  const waShare=()=>{
    const msg=encodeURIComponent(`${rawTitle}\n📍 Bilal Bazar — Erbil\n${window.location.href}`);
    window.open(`https://wa.me/?text=${msg}`,'_blank');
  };

  const prev=()=>setSelImg(x=>(x-1+allImgs.length)%allImgs.length);
  const next=()=>setSelImg(x=>(x+1)%allImgs.length);

  return(
    <div className="qv-ov" onClick={onClose}>
      <div className="qv-box" onClick={e=>e.stopPropagation()}>
        <div className="mhdr">
          <h3 style={{fontFamily:'Noto Sans Arabic,Outfit,sans-serif',fontSize:14,direction:dir,maxWidth:'80%',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{rawTitle}</h3>
          <button className="btn btn-g" onClick={onClose} style={{padding:'5px 11px',flexShrink:0}}>×</button>
        </div>

        {allImgs.length>0&&(
          <>
            <div className="qv-hero" onClick={()=>onOpenLb(allImgs,selImg)}>
              <img src={allImgs[selImg]} alt=""/>
              {post.discount_pct>0&&!expired&&(
                <div className={`disc disc-pulse${dir==='ltr'?' ltr':''}`}>
                  <span style={{fontSize:13}}>{post.discount_pct}%</span>
                  <span style={{fontSize:7,opacity:.88}}>OFF</span>
                </div>
              )}
              {expired&&<div className="exp-ribbon"><span>{t('finished')}</span></div>}
              {isNew&&<div className={`new-badge${dir==='ltr'?' ltr':''}`}>{t('newDeal')}</div>}
              {allImgs.length>1&&<>
                <div className="qv-img-counter">{selImg+1} / {allImgs.length}</div>
                <button className="qv-nav" style={{left:8}} onClick={e=>{e.stopPropagation();prev();}}>‹</button>
                <button className="qv-nav" style={{right:8}} onClick={e=>{e.stopPropagation();next();}}>›</button>
              </>}
              <span style={{position:'absolute',bottom:10,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,.6)',color:'rgba(255,255,255,.7)',fontSize:9,fontWeight:700,letterSpacing:1.4,padding:'2px 10px',borderRadius:20,pointerEvents:'none',textTransform:'uppercase',backdropFilter:'blur(4px)'}}>tap to zoom</span>
            </div>
            {allImgs.length>1&&(
              <div className="qv-thumbs nsb">
                {allImgs.map((img,i)=>(
                  <div key={i} className={`qv-thumb${selImg===i?' act':''}`} onClick={()=>setSelImg(i)}>
                    <img src={img} alt=""/>
                  </div>
                ))}
              </div>
            )}
          </>
        )}

        <div className="qv-body">
          {/* Title */}
          <h2 style={{fontWeight:900,fontSize:18,lineHeight:1.4,fontFamily:'Noto Sans Arabic,Outfit,sans-serif',direction:dir}}>{rawTitle}</h2>

          {/* Badges */}
          <div className="deal-meta-row">
            {isHot&&<span className="hot-badge"><i className="fas fa-fire"/> {t('hotDeal')} · {likes}</span>}
            {isNew&&<span className="badge" style={{background:'rgba(245,158,11,.1)',color:'#fbbf24',borderColor:'rgba(245,158,11,.25)'}}><i className="fas fa-star"/> {t('newDeal')}</span>}
            {stockQty!==null&&stockQty>0&&<span className="urge-badge"><i className="fas fa-boxes"/> {stockQty} {t('stockLeft')}</span>}
            {stockQty!==null&&stockQty===0&&<span className="urge-badge" style={{color:'var(--danger)',borderColor:'rgba(239,68,68,.25)',background:'rgba(239,68,68,.1)'}}><i className="fas fa-times-circle"/> Out of Stock</span>}
            <span className="badge" style={{background:'rgba(16,185,129,.06)'}}>{t('cats.'+post.category)}</span>
          </div>

          {/* Countdown */}
          <div><Countdown iso={post.created_at} days={post.discount_days}/></div>

          {/* Like + WhatsApp row */}

          {/* Call CTA */}
          <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" className="qv-call">
            <i className="fas fa-phone-alt"/> {t('callStore')} · 0750 919 3030
          </a>
        </div>
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   DEAL CARD
   ─ NEW: Title "See more / Show less" for long titles
     • Titles ≤ TITLE_LIMIT chars → shown as-is
     • Titles > TITLE_LIMIT chars → truncated + toggle button
   ─ Everything else unchanged
══════════════════════════════════════════ */
function DealCard({post,user,isAdmin,onLogin,onDelete,onEdit,onOpenLb,activeCmt,setActiveCmt,onQuickView,cardIdx}){
  const{t,dir,toast}=useApp();
  const[liked,setLiked]=useState(false);
  const[likes,setLikes]=useState(post.like_count||0);
  const[copied,setCopied]=useState(false);
  /* ── NEW: title expand state ── */
  const[titleExp,setTitleExp]=useState(false);

  const allImgs=parseImgs(post.images);
  const thumbImgs=allImgs.slice(0,6);
  const n=thumbImgs.length;
  const expired=!tleft(post.created_at,post.discount_days);
  const rawTitle=post.title_ckb||post.title_en||'Bilal Bazar';
  const isHot=likes>=5;
  const isNew=isNewPost(post.created_at);
  const stockQty=post.stock_qty??null;
  const showCmt=activeCmt===post.id;

  /* ── Title truncation logic ── */
  const isLongTitle=rawTitle.length>TITLE_LIMIT;
  const displayTitle=isLongTitle&&!titleExp
    ?rawTitle.slice(0,TITLE_LIMIT).trimEnd()+'…'
    :rawTitle;

  useEffect(()=>{
    if(!user)return;
    SB.from('likes').select('id').eq('post_id',post.id).eq('user_id',user.id).maybeSingle()
      .then(({data})=>setLiked(!!data));
  },[user?.id,post.id]);

  const handleLike=async()=>{
    if(!user){onLogin();return;}
    try{
      if(liked){
        await SB.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);
        const nv=Math.max(0,likes-1);await SB.from('posts').update({like_count:nv}).eq('id',post.id);
        setLiked(false);setLikes(nv);
      }else{
        const{error}=await SB.from('likes').insert({post_id:post.id,user_id:user.id});
        if(error)throw error;
        const nv=likes+1;await SB.from('posts').update({like_count:nv}).eq('id',post.id);
        setLiked(true);setLikes(nv);
      }
    }catch(e){toast(e.message||'Like failed',false);}
  };

  const handleShare=async()=>{
    if(navigator.share){try{await navigator.share({title:rawTitle,url:window.location.href});}catch(e){}}
    else if(navigator.clipboard){await navigator.clipboard.writeText(window.location.href);setCopied(true);setTimeout(()=>setCopied(false),2000);}
  };

  const gc=n===0?'':n===1?'g1':n===2?'g2i':n===3?'g3i':n===4?'g4i':n===5?'g5i':'g6i';

  return(
    <div className="card card-stagger" style={{animationDelay:`${(cardIdx||0)*0.07}s`}}>
      <div className="pimg">
        {n===0
          ?<div style={{height:210,background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36}}>🏷️</div>
          :n===1
          ?<div className={`fi ${gc}`} onClick={()=>onOpenLb(allImgs,0)}><img src={thumbImgs[0]} alt="" loading="lazy"/></div>
          :<div className={gc}>
            {thumbImgs.map((img,idx)=>(
              <div key={idx} className="fi" onClick={()=>onOpenLb(allImgs,idx)}>
                <img src={img} alt="" loading="lazy"/>
              </div>
            ))}
          </div>
        }
        {isNew&&<div className={`new-badge${dir==='ltr'?' ltr':''}`}>{t('newDeal')}</div>}
        {post.discount_pct>0&&!expired&&(
          <div className={`disc disc-pulse${dir==='ltr'?' ltr':''}`}>
            <span style={{fontSize:13}}>{post.discount_pct}%</span>
            <span style={{fontSize:7,opacity:.88}}>OFF</span>
          </div>
        )}
        {expired&&<div className="exp-ribbon"><span>{t('finished')}</span></div>}
        {/* Image count badge — shown when more than 6 images */}
        {allImgs.length>6&&(
          <div style={{position:'absolute',bottom:8,left:8,background:'rgba(0,0,0,.65)',color:'#fff',fontSize:10,fontWeight:800,padding:'3px 8px',borderRadius:6,backdropFilter:'blur(4px)'}}>
            +{allImgs.length-6} <i className="fas fa-images" style={{fontSize:9,opacity:.8}}/>
          </div>
        )}
      </div>

      <div style={{padding:'13px 14px 14px'}}>
        {/* ── TITLE with See More toggle ── */}
        <h3 style={{fontWeight:800,fontSize:15,lineHeight:1.4,marginBottom:10,fontFamily:'Noto Sans Arabic,Outfit,sans-serif'}}>
          {displayTitle}
          {isLongTitle&&(
            <button
              className="title-toggle"
              onClick={e=>{e.stopPropagation();setTitleExp(x=>!x);}}
            >
              {titleExp?t('less'):t('more')}
            </button>
          )}
        </h3>

        <div className="deal-meta-row">
          {isHot&&<span className="hot-badge"><i className="fas fa-fire"/> {t('hotDeal')}</span>}
          {stockQty!==null&&stockQty>0&&<span className="urge-badge"><i className="fas fa-boxes"/> {stockQty} {t('stockLeft')}</span>}
          {stockQty===0&&<span className="urge-badge" style={{color:'var(--danger)',borderColor:'rgba(239,68,68,.25)',background:'rgba(239,68,68,.1)'}}>Out of Stock</span>}
        </div>
        <div style={{marginBottom:12}}><Countdown iso={post.created_at} days={post.discount_days}/></div>
        <div className="post-actions">
          <button onClick={handleLike} className={`act-btn${liked?' liked':''}`}>
            <i className={liked?'fas fa-heart':'far fa-heart'}/>{likes>0?` ${likes}`:''}
          </button>
          <button onClick={()=>setActiveCmt(showCmt?null:post.id)} className={`act-btn${showCmt?' active':''}`}>
            <i className="fas fa-comment-alt"/> {t('cmt')}
          </button>
          <button onClick={handleShare} className="act-btn">
            <i className="fas fa-share-alt"/>{copied?' ✓':' '+t('share')}
          </button>
          {onQuickView&&<button onClick={()=>onQuickView(post)} className="act-btn active" style={{marginInlineStart:'auto'}}><i className="fas fa-expand-alt"/> {t('quickView')}</button>}
          {isAdmin&&(
            <div className="admin-btns" style={{marginInlineStart:'0'}}>
              <button onClick={()=>onEdit(post)} className="btn btn-g" style={{padding:'4px 8px',fontSize:11,height:32}}><i className="fas fa-pencil-alt"/></button>
              <button onClick={()=>onDelete(post.id)} className="btn btn-d" style={{padding:'4px 8px',fontSize:11,height:32}}><i className="fas fa-trash"/></button>
            </div>
          )}
        </div>
        {showCmt&&<Comments postId={post.id} user={user} onLogin={onLogin}/>}
      </div>
    </div>
  );
}

/* ══════════════════════════════════════════
   POST MODAL
   ─ NEW: Multiple image selection in one click
   ─ NEW: Up to MAX_IMGS (100) images per post
   ─ NEW: If >100 selected, clamp safely with warning
   ─ NEW: Upload progress display while batch uploading
   ─ KEPT: Single-file crop flow (select 1 → crop dialog)
   ─ KEPT: All other existing functionality
══════════════════════════════════════════ */
function PostModal({editing,onSave,onClose}){
  const{t,toast}=useApp();
  const[imgs,setImgs]=useState(()=>editing?parseImgs(editing.images):[]);
  const[form,setForm]=useState({
    title_ckb:editing?.title_ckb||'',
    discount_pct:editing?.discount_pct??0,
    discount_days:editing?.discount_days||7,
    category:editing?.category||'rice',
    stock_qty:editing?.stock_qty??''
  });
  const[saving,setSaving]=useState(false);
  const[cropFile,setCropFile]=useState(null);
  const[cropAsp,setCropAsp]=useState(1);
  const[upBusy,setUpBusy]=useState(false);
  /* NEW: upload progress status */
  const[upStatus,setUpStatus]=useState('');
  const[upDone,setUpDone]=useState(0);
  const[upTotal,setUpTotal]=useState(0);

  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  /* ── Single image: goes through crop ── */
  const onCropped=async blob=>{
    setCropFile(null);setUpBusy(true);setUpStatus('Uploading…');
    try{
      const url=await uploadToStorage('posts-images',blob,'jpg');
      setImgs(p=>[...p,url]);
      toast('Image added ✓');
    }catch(e){toast(e.message||'Upload failed',false);}
    setUpBusy(false);setUpStatus('');
  };

  /* ── Multiple images: upload directly, no crop ── */
  const handleMultiUpload=async files=>{
    const remaining=MAX_IMGS-imgs.length;
    if(remaining<=0){
      toast(`Max ${MAX_IMGS} images reached`,false);
      return;
    }
    /* Clamp to remaining slots */
    const toUpload=files.slice(0,remaining);
    if(files.length>remaining){
      toast(`First ${toUpload.length} images selected (max ${MAX_IMGS} total)`,false);
    }
    setUpBusy(true);
    setUpTotal(toUpload.length);
    setUpDone(0);
    const newUrls=[];
    for(let i=0;i<toUpload.length;i++){
      setUpStatus(`Uploading ${i+1} of ${toUpload.length}…`);
      setUpDone(i);
      try{
        const file=toUpload[i];
        const ext=(file.name.split('.').pop()||'jpg').toLowerCase();
        const url=await uploadToStorage('posts-images',file,ext);
        newUrls.push(url);
      }catch(err){
        /* skip failed file silently, continue with rest */
      }
    }
    setImgs(p=>[...p,...newUrls]);
    setUpBusy(false);
    setUpStatus('');
    setUpDone(0);
    setUpTotal(0);
    if(newUrls.length)toast(`${newUrls.length} image(s) uploaded ✓`);
  };

  /* ── File input change handler ── */
  const onFilesSelected=e=>{
    const files=Array.from(e.target.files||[]);
    if(!files.length)return;
    if(files.length===1){
      setCropFile(files[0]); /* single → crop */
    }else{
      handleMultiUpload(files); /* multiple → direct batch upload */
    }
    e.target.value='';
  };

  const submit=async()=>{
    if(!form.title_ckb.trim()||imgs.length===0){toast('ناونیشان و وێنە پێویستن',false);return;}
    setSaving(true);
    const payload={
      title_ckb:form.title_ckb.trim(),title_ar:form.title_ckb.trim(),title_en:form.title_ckb.trim(),
      discount_pct:+form.discount_pct,discount_days:+form.discount_days,
      category:form.category,images:JSON.stringify(imgs),
      ...(form.stock_qty!==''&&form.stock_qty!==null?{stock_qty:parseInt(form.stock_qty)||0}:{})
    };
    const{error}=editing
      ?await SB.from('posts').update(payload).eq('id',editing.id)
      :await SB.from('posts').insert({...payload,created_at:new Date().toISOString(),like_count:0});
    setSaving(false);
    if(error){toast(error.message,false);return;}
    toast(editing?'Updated ✓':'Published ✓');onSave();
  };

  return(
    <div className="ov" onClick={onClose}>
      <div className="mbox" onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><h3>{editing?t('edit'):t('addPost')}</h3><button className="btn btn-g" onClick={onClose} style={{padding:'5px 10px'}}>×</button></div>
        <div className="mbody" style={{display:'flex',flexDirection:'column',gap:16}}>

          {/* ── IMAGE UPLOAD SECTION ── */}
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--accent)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>
              Images *
              <span style={{color:'var(--muted)',fontWeight:400,marginInlineStart:6}}>
                {imgs.length}/{MAX_IMGS}
              </span>
              {imgs.length>0&&(
                <span style={{color:'var(--accent)',fontWeight:400,marginInlineStart:6,fontSize:10}}>
                  (tap to remove)
                </span>
              )}
            </label>

            {/* Thumbnail strip */}
            <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:6}} className="nsb">
              {imgs.map((img,i)=>(
                <div key={i} style={{position:'relative',flexShrink:0}}>
                  <img src={img} alt="" style={{width:62,height:62,objectFit:'cover',borderRadius:8,border:'1px solid var(--border)',display:'block'}}/>
                  <button
                    onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))}
                    style={{position:'absolute',top:-4,right:-4,width:17,height:17,borderRadius:'50%',background:'var(--danger)',color:'#fff',border:'2px solid var(--elevated)',fontSize:8,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900}}
                  >×</button>
                  {i===0&&<div style={{position:'absolute',bottom:2,left:2,background:'rgba(16,185,129,.85)',borderRadius:3,padding:'1px 4px',fontSize:7,fontWeight:800,color:'#fff'}}>MAIN</div>}
                </div>
              ))}

              {/* Add image button */}
              {imgs.length<MAX_IMGS&&(
                <label style={{width:62,height:62,borderRadius:8,border:'1.5px dashed var(--border2)',background:'var(--bg)',flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:3,cursor:upBusy?'wait':'pointer',opacity:upBusy?.5:1,transition:'opacity .2s'}}>
                  {upBusy

/* ══ SPONSOR MODAL ══ */
function SpModal({sponsors,onUpdate,onClose}){
  const{t,toast}=useApp();
  const[list,setList]=useState(sponsors);
  const[step,setStep]=useState('pick');
  const[picked,setPicked]=useState(null);
  const[croppedBlob,setCroppedBlob]=useState(null);
  const[preview,setPreview]=useState(null);
  const[isVid,setIsVid]=useState(false);
  const[link,setLink]=useState('');
  const[placement,setPlacement]=useState('float');
  const[busy,setBusy]=useState(false);
  const fileRef=useRef(null);

  useEffect(()=>()=>{if(preview&&preview.startsWith('blob:'))URL.revokeObjectURL(preview);},[preview]);

  const reset=()=>{
    if(preview&&preview.startsWith('blob:'))URL.revokeObjectURL(preview);
    setPicked(null);setCroppedBlob(null);setPreview(null);setIsVid(false);setLink('');setStep('pick');
  };

  const onPick=e=>{
    const f=e.target.files[0];if(!f)return;
    if(preview&&preview.startsWith('blob:'))URL.revokeObjectURL(preview);
    const url=URL.createObjectURL(f);
    const vid=f.type.startsWith('video/');
    setPicked(f);setPreview(url);setIsVid(vid);
    setStep(vid?'link':'crop');e.target.value='';
  };

  const onCropped=blob=>{
    if(preview&&preview.startsWith('blob:'))URL.revokeObjectURL(preview);
    setCroppedBlob(blob);setPreview(URL.createObjectURL(blob));setStep('link');
  };

  const handleDone=async()=>{
    setBusy(true);
    try{
      let mediaUrl;
      if(isVid){const ext=(picked.name.split('.').pop()||'mp4').toLowerCase();mediaUrl=await uploadToStorage('images',picked,ext);}
      else{mediaUrl=await uploadToStorage('images',croppedBlob,'jpg');}
      const{data,error}=await SB.from('sponsors')
        .insert({image_url:mediaUrl,visible:true,link_url:link.trim()||null,sort_order:list.length,placement})
        .select().single();
      if(error)throw new Error(error.message);
      setList(p=>[...p,data]);toast('Sponsor added ✓');reset();
    }catch(e){toast(e.message||'Upload failed. Check Storage bucket "images".',false);}
    setBusy(false);
  };

  const toggle=async(id,cur)=>{
    await SB.from('sponsors').update({visible:!cur}).eq('id',id);
    setList(p=>p.map(s=>s.id===id?{...s,visible:!cur}:s));
  };
  const remove=async id=>{
    if(!window.confirm('Remove this sponsor?'))return;
    await SB.from('sponsors').delete().eq('id',id);
    setList(p=>p.filter(s=>s.id!==id));toast('Removed');
  };

  return(
    <div className="ov" onClick={step==='crop'?undefined:onClose}>
      <div className="mbox" onClick={e=>e.stopPropagation()}>
        <div className="mhdr">
          <h3>{t('mgSp')}</h3>
          <button className="btn btn-g" style={{padding:'5px 10px'}} onClick={()=>{onUpdate(list);onClose();}}>✓ {t('save')}</button>
        </div>
        <div className="mbody" style={{display:'flex',flexDirection:'column',gap:16}}>
          {step==='pick'&&(
            <>
              <p style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>Choose a banner image or video.</p>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>{t('spPlace')}</label>
                <div className="pl-toggle">
                  <button className={`pl-btn${placement==='top'?' sel':''}`} onClick={()=>setPlacement('top')}><i className="fas fa-arrow-up"/><span>{t('spTop')}</span></button>
                  <button className={`pl-btn${placement==='float'?' sel':''}`} onClick={()=>setPlacement('float')}><i className="fas fa-layer-group"/><span>{t('spFloat')}</span></button>
                </div>
              </div>
              <button className="btn btn-g wf" onClick={()=>fileRef.current?.click()} style={{padding:'20px',gap:10,fontSize:14,borderStyle:'dashed',borderRadius:14,flexDirection:'column'}}>
                <i className="fas fa-images acc" style={{fontSize:22}}/><span>{t('gallery')}</span>
                <span style={{fontSize:10,color:'var(--muted)',fontWeight:400}}>Image or Video · Link optional</span>
              </button>
              <input ref={fileRef} type="file" accept="image/*,video/mp4,video/webm,video/mov,video/quicktime" style={{display:'none'}} onChange={onPick}/>
            </>
          )}
          {step==='crop'&&picked&&!isVid&&<CropModal file={picked} aspect={4} onDone={onCropped} onClose={reset}/>}
          {step==='link'&&preview&&(
            <div style={{display:'flex',flexDirection:'column',gap:14}}>
              <div style={{borderRadius:10,overflow:'hidden',border:'1px solid var(--border)',background:'#000'}}>
                {isVid?<video src={preview} controls muted style={{width:'100%',maxHeight:100,objectFit:'contain',display:'block'}}/>
                  :<img src={preview} alt="" style={{width:'100%',height:65,objectFit:'cover',display:'block'}}/>}
              </div>
              <div>
                <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>{t('spLink')}</label>
                <input className="inp" placeholder="https://... (optional)" value={link} onChange={e=>setLink(e.target.value)} style={{fontSize:13}} dir="ltr"/>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
                <button className="btn btn-g" onClick={reset} disabled={busy} style={{padding:'12px'}}><i className="fas fa-times"/> Change</button>
                <button className="btn btn-p" onClick={handleDone} disabled={busy} style={{padding:'12px',fontSize:14}}>
                  {busy?<><i className="fas fa-spinner fa-spin"/> Uploading…</>:<><i className="fas fa-check"/> Done</>}
                </button>
              </div>
            </div>
          )}
          {list.length>0&&(
            <div>
              <p style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Current Sponsors ({list.length})</p>
              {list.map(s=>(
                <div key={s.id} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 0',borderBottom:'1px solid var(--border)'}}>
                  {isVideoUrl(s.image_url)
                    ?<div style={{width:76,height:26,background:'var(--border)',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><i className="fas fa-film" style={{color:'var(--muted)',fontSize:12}}/></div>
                    :<img src={s.image_url} alt="" style={{width:76,height:26,objectFit:'cover',borderRadius:5,border:'1px solid var(--border)',flexShrink:0}}/>
                  }
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:9,color:'var(--accent)',fontWeight:700,marginBottom:1}}>{s.placement==='top'?'Top':'Float'}</div>
                    <div style={{fontSize:10,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',direction:'ltr'}}>{s.link_url||'No link'}</div>
                  </div>
                  <button className="btn btn-g" style={{padding:'3px 7px',flexShrink:0,fontSize:10,height:24}} onClick={()=>toggle(s.id,s.visible)}>{s.visible?t('hide'):t('show')}</button>
                  <button className="btn btn-d" style={{padding:'3px 7px',flexShrink:0,fontSize:12,height:24}} onClick={()=>remove(s.id)}>×</button>
                </div>
              ))}
            </div>
          )}
          {!list.length&&step==='pick'&&<p style={{textAlign:'center',color:'var(--muted)',fontSize:12,padding:'8px 0'}}>No sponsors yet.</p>}
        </div>
      </div>
    </div>
  );
}
