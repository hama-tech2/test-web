<style>
:root{
  --bg:#060a08;--surface:#0e1712;--elevated:#131e17;
  --border:#1c2d22;--border2:#253d2d;
  --text:#dff0e8;--muted:#5a8a6e;--soft:#98c4aa;
  --accent:#10b981;--accent2:#059669;--accent3:#6ee7b7;
  --danger:#ef4444;--danger2:#b91c1c;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,textarea,select{font-family:inherit}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.rtl{direction:rtl} .ltr{direction:ltr}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--accent2);border-radius:2px}
.nsb{-ms-overflow-style:none;scrollbar-width:none}
.nsb::-webkit-scrollbar{display:none}

/* ── ANIMATIONS ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%,100%{background-position:200% 0}50%{background-position:-200% 0}}
@keyframes glow{0%,100%{opacity:.55}50%{opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,-10px)}to{opacity:1;transform:translate(-50%,0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes slideR{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:none}}
@keyframes slideL{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:none}}

/* FLOATING SPONSOR: slides in from left, pauses, fades back */
@keyframes spSlide{
  0%  {opacity:0;transform:translateX(calc(-100% - 20px))}
  16% {opacity:1;transform:translateX(16px)}
  58% {opacity:1;transform:translateX(16px)}
  70% {opacity:1;transform:translateX(24px)}
  88% {opacity:0;transform:translateX(calc(-100% - 20px))}
  100%{opacity:0;transform:translateX(calc(-100% - 20px))}
}
.sp-float-wrap{position:fixed;bottom:74px;left:0;z-index:44;pointer-events:none}
.sp-float-inner{
  position:relative;width:230px;height:68px;
  border-radius:0 16px 16px 0;overflow:hidden;
  background:#fff;
  box-shadow:0 8px 36px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.3),0 0 0 1px rgba(255,255,255,.15);
  animation:spSlide 9s ease-in-out infinite;
  pointer-events:auto;
}
.sp-float-inner img,.sp-float-inner video{width:100%;height:100%;object-fit:contain;display:block}
.sp-float-label{
  position:absolute;top:4px;right:7px;z-index:3;
  font-size:7px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;
  color:rgba(0,0,0,.35);background:rgba(255,255,255,.75);
  padding:1px 5px;border-radius:3px;
}

/* ── LAYOUT ── */
.c{max-width:1100px;margin:0 auto;padding:0 16px}
.flex{display:flex} .col{flex-direction:column}
.ac{align-items:center} .jb{justify-content:space-between} .jc{justify-content:center}
.gap1{gap:4px} .gap2{gap:8px} .gap3{gap:12px} .gap4{gap:16px} .wrap{flex-wrap:wrap}
.f1{flex:1} .wf{width:100%}
@media(min-width:560px){.sg2{grid-template-columns:repeat(2,1fr)}}
@media(min-width:820px){.mg3{grid-template-columns:repeat(3,1fr)}}
.rel{position:relative} .abs{position:absolute} .fix{position:fixed}
.ov-h{overflow:hidden} .ov-ya{overflow-y:auto}
.tc{text-align:center} .muted{color:var(--muted)} .acc{color:var(--accent)}
.bold{font-weight:700} .xbold{font-weight:900} .sm{font-size:12px} .xs{font-size:11px}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:10px 18px;border-radius:10px;border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:inherit;text-decoration:none}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.btn-p{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#02140d}
.btn-p:hover:not(:disabled){filter:brightness(1.08);transform:translateY(-1px)}
.btn-g{background:transparent;border:1px solid var(--border);color:var(--muted)}
.btn-g:hover{border-color:var(--accent);color:var(--text)}
.btn-d{background:rgba(239,68,68,.12);color:var(--danger);border:1px solid rgba(239,68,68,.22)}
.btn-d:hover{background:rgba(239,68,68,.2)}

.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:rgba(16,185,129,.1);color:var(--accent);border:1px solid rgba(16,185,129,.18)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s}
.card:hover{border-color:rgba(16,185,129,.28);box-shadow:0 12px 40px rgba(0,0,0,.48);transform:translateY(-3px)}
.inp{width:100%;background:var(--bg);border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;color:var(--text);font-size:14px;outline:none;transition:border-color .2s;font-family:inherit}
.inp:focus{border-color:var(--accent)}
.inp::placeholder{color:var(--muted)}

/* ── TOAST ── */
.toast-wrap{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:200;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{padding:9px 18px;border-radius:10px;font-size:13px;font-weight:700;min-width:190px;text-align:center;animation:toastIn .3s ease;backdrop-filter:blur(8px)}
.t-ok{background:rgba(16,185,129,.18);border:1px solid rgba(16,185,129,.3);color:var(--accent3)}
.t-err{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.28);color:#fca5a5}

/* ── MODAL ── */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(7px);z-index:80;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:540px){.ov{align-items:center;padding:20px}}
.mbox{background:var(--elevated);border:1px solid var(--border);width:100%;max-width:500px;max-height:93vh;overflow-y:auto;border-radius:20px 20px 0 0;animation:slideUp .24s ease}
@media(min-width:540px){.mbox{border-radius:20px;animation:scaleIn .2s ease}}
.mhdr{position:sticky;top:0;z-index:2;background:var(--elevated);padding:15px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.mhdr h3{font-weight:800;font-size:15px}
.mbody{padding:18px 20px}

/* ── DRAWER ── */
.dov{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.8);backdrop-filter:blur(4px)}
.dpanel{position:absolute;top:0;bottom:0;width:min(290px,85vw);background:var(--surface);border-inline-end:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto}
.rtl .dpanel{right:0;animation:slideR .22s ease}
.ltr .dpanel{left:0;animation:slideL .22s ease}
.di{display:flex;align-items:center;gap:12px;padding:13px 18px;font-size:14px;font-weight:600;color:var(--text);background:none;border:none;border-bottom:1px solid rgba(255,255,255,.04);width:100%;text-align:inherit;cursor:pointer;transition:background .12s;text-decoration:none;font-family:inherit}
.di:hover{background:var(--elevated)}
.dico{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}

/* ── MOBILE NAV ── */
.mnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(6,10,8,.97);border-top:1px solid var(--border);backdrop-filter:blur(14px);display:flex;justify-content:space-around;height:54px;padding-bottom:env(safe-area-inset-bottom)}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--muted);background:none;border:none;cursor:pointer;font-size:8.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;transition:color .14s}
.mnb.act{color:var(--accent)}

/* sp-strip removed – replaced by floating sponsor */

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:40;background:rgba(6,10,8,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}

/* ══════════════════════════════════════════
   HERO SECTION — BLACK SCREEN FIX
   Correct z-index layering:
     z-index 0 → video
     z-index 1 → ::after dark overlay
     z-index 2 → orbs + hero-body content
══════════════════════════════════════════ */
#hero{
  position:relative;
  min-height:100vh;
  min-height:100dvh;
  display:flex;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  /* fallback gradient — prevents black flash while video loads */
  background:linear-gradient(150deg,#071510 0%,#0b1e15 50%,#060a08 100%);
}
.hero-vid{position:absolute;inset:0;z-index:0}
.hero-vid video{
  position:absolute;inset:0;
  width:100%;height:100%;
  object-fit:cover;object-position:center;
  display:block;pointer-events:none;
}
/* dark overlay — above video (z:1), below content (z:2) */
.hero-vid::after{
  content:'';position:absolute;inset:0;z-index:1;
  background:linear-gradient(to bottom,rgba(4,9,6,.78) 0%,rgba(4,9,6,.28) 44%,rgba(4,9,6,.88) 100%);
}
/* content — MUST be z-index 2 to sit above video AND overlay */
.hero-body{
  position:relative;z-index:2;
  text-align:center;padding:108px 20px 88px;
  max-width:860px;margin:0 auto;width:100%;
}
.hero-title{font-weight:900;font-size:clamp(46px,9.5vw,100px);letter-spacing:-2px;line-height:.93;background:linear-gradient(130deg,#fff 0%,#aaf0d0 38%,var(--accent) 65%,#fff 100%);background-size:280% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:fadeUp .7s ease .1s both}
.hero-sub{font-weight:900;font-size:clamp(15px,2.8vw,22px);color:rgba(245,212,96,.84);margin-top:10px;font-family:'Noto Sans Arabic',sans-serif;animation:fadeUp .7s ease .36s both}
.hero-desc{color:rgba(214,236,255,.6);font-size:clamp(13px,2vw,15px);line-height:1.78;margin:14px auto 34px;max-width:500px;animation:fadeUp .7s ease .58s both}
.hero-btns{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;animation:fadeUp .7s ease .78s both}
.hero-stats{display:flex;gap:40px;justify-content:center;margin-top:52px;flex-wrap:wrap;animation:fadeUp .7s ease .98s both}

/* ── POST IMAGE GRID ── */
.pimg{position:relative}
.fi{background:var(--border);overflow:hidden;cursor:pointer}
.fi img{width:100%;height:100%;object-fit:cover;transition:transform .32s}
.fi:hover img{transform:scale(1.05)}
.g1{height:238px}
.g2i{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:198px}
.g3i{display:grid;grid-template-columns:1.7fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:218px}
.g3i .fi:first-child{grid-row:1/3}
.g4i{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:218px}
.g5i{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:2px;height:198px}
.more-over{position:absolute;inset:0;background:rgba(4,9,6,.58);display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff}

/* circular discount badge */
.disc{position:absolute;top:10px;right:10px;z-index:5;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--danger),var(--danger2));color:#fff;display:flex;flex-direction:column;align-items:center;justify-content:center;font-weight:900;font-size:12px;line-height:1;text-align:center;box-shadow:0 4px 14px rgba(185,28,28,.48)}
.ltr .disc{right:auto;left:10px}
.expover{position:absolute;inset:0;background:rgba(4,9,6,.65);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:5}
.expover span{background:var(--danger);color:#fff;padding:7px 18px;border-radius:6px;font-weight:900;font-size:13px}

/* ── COUNTDOWN ── */
.cdown{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;border-radius:8px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18)}
.cb{text-align:center;min-width:24px}
.cn{font-weight:900;font-size:16px;line-height:1;color:#fff}
.cl{font-size:7px;color:var(--accent);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}
.cs{color:rgba(16,185,129,.45);font-weight:900;font-size:13px;align-self:center;margin-bottom:2px}

/* ── POST ACTION ROW (fixed alignment) ── */
.post-actions{
  display:flex;align-items:center;
  gap:6px;flex-wrap:nowrap;
  padding-top:10px;border-top:1px solid var(--border);
}
.post-actions .act-btn{
  display:inline-flex;align-items:center;justify-content:center;
  gap:5px;padding:6px 10px;
  border-radius:8px;border:1px solid var(--border);
  background:transparent;color:var(--muted);
  font-size:12px;font-weight:700;cursor:pointer;
  transition:all .14s;white-space:nowrap;font-family:inherit;
  height:32px;
}
.post-actions .act-btn:hover{border-color:var(--accent);color:var(--text)}
.post-actions .act-btn.liked{background:rgba(239,68,68,.13);color:var(--danger);border-color:rgba(239,68,68,.3)}
.post-actions .act-btn.active{color:var(--accent);border-color:var(--accent)}

.lbc{position:absolute;top:12px;right:14px;background:rgba(255,255,255,.08);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lbn{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ── COMMENTS ── */
.cm-list{display:flex;flex-direction:column;gap:7px;max-height:160px;overflow-y:auto}
.cm-item{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px 12px}
.cm-meta{font-size:10px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:7px}
.cm-name{font-weight:800;font-size:13px;color:var(--accent)}
.cm-date{font-size:9px;color:var(--muted);margin-inline-start:auto}
.cm-txt{font-size:12px;line-height:1.5;color:var(--soft);padding-inline-start:30px;word-break:break-word}
.av-icon{width:24px;height:24px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:14px;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.2);flex-shrink:0}
.cm-login{display:flex;gap:8px;margin-top:10px}
.cm-char{font-size:9px;color:var(--muted);text-align:end;margin-top:3px}

/* ── SKELETON ── */
.sk{background:linear-gradient(90deg,var(--border) 25%,var(--elevated) 50%,var(--border) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

.stitle{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.stitle::before{content:'';width:26px;height:3px;border-radius:2px;background:linear-gradient(90deg,var(--accent),var(--accent2));flex-shrink:0}
.stitle h2{font-weight:900;font-size:24px}

/* ── LOCATION CARD ── */
.lcard{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;text-decoration:none;color:inherit;display:block;transition:transform .2s,border-color .2s,box-shadow .2s}

/* ── ABOUT FEATURES ── */
.feats{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.feat{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 14px;width:138px;text-align:center;transition:border-color .2s}
.feat:hover{border-color:var(--accent)}
.feat-ico{width:40px;height:40px;border-radius:10px;background:rgba(16,185,129,.1);border:1px solid rgba(16,185,129,.18);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:17px;color:var(--accent)}

/* ── FAB ── */
.fab-wa{position:fixed;bottom:66px;right:16px;width:50px;height:50px;border-radius:50%;background:#25d366;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;z-index:45;box-shadow:0 4px 20px rgba(37,211,102,.4);transition:transform .18s;text-decoration:none}
.fab-wa:hover{transform:scale(1.1)}
.fab-add{position:fixed;bottom:66px;left:16px;width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;display:flex;align-items:center;justify-content:center;color:#02140d;font-size:22px;z-index:45;cursor:pointer;box-shadow:0 4px 20px rgba(16,185,129,.42);transition:transform .18s}
.fab-add:hover{transform:scale(1.1) rotate(90deg)}

/* ── AVATAR SELECTOR ── */
.av-sel{display:flex;gap:10px;justify-content:center;margin-top:8px}
.av-opt{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 18px;border-radius:12px;border:2px solid var(--border);cursor:pointer;transition:all .15s;background:var(--bg);font-size:11px;font-weight:700;color:var(--muted)}
.av-opt.chosen{border-color:var(--accent);background:rgba(16,185,129,.08);color:var(--accent)}
.av-opt span{font-size:28px}

.divline{height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}

@media(max-width:640px){
  .hd{display:none!important}
  .g1{height:190px!important}
  .g2i,.g3i,.g4i,.g5i{height:168px!important}
  .hero-body{padding:88px 16px 68px!important}
  .hero-stats{gap:22px!important}
  .sp-strip{height:60px!important}
}
@media(min-width:641px){.md{display:none!important}}

/* ══════════════════════════════════════════
   CONTEXT
══════════════════════════════════════════ */
const Ctx=React.createContext();
function Provider({children}){
  const[lang,setLang]=useState('ckb');
  const[user,setUser]=useState(null);
  const[profile,setProfile]=useState(null);
  const[ready,setReady]=useState(false);
  const[toasts,setToasts]=useState([]);

  const t=useCallback(k=>{
    const keys=k.split('.');let v=TX[lang];
    for(const x of keys){if(v==null)return k;v=v[x]}
    return v==null?k:String(v);
  },[lang]);

  const toast=useCallback((msg,ok=true)=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,ok}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3500);
  },[]);

  const sw=useCallback(l=>{
    setLang(l);
    document.documentElement.lang=l;
    document.documentElement.dir=l==='en'?'ltr':'rtl';
  },[]);

  const loadProfile=useCallback(async uid=>{
    if(!uid)return;
    const{data}=await SB.from('profiles').select('*').eq('id',uid).maybeSingle();
    setProfile(data||null);
  },[]);

  useEffect(()=>{
    if(window.location.hash&&window.location.hash.includes('error')){
      const p=new URLSearchParams(window.location.hash.slice(1));
      const e=p.get('error_description')||p.get('error')||'Auth error';
      toast(decodeURIComponent(e.replace(/\+/g,' ')),false);
      window.history.replaceState(null,'',window.location.pathname);
    }
    SB.auth.getSession().then(({data:{session}})=>{
      const u=session?.user||null;
      setUser(u);
      if(u)loadProfile(u.id);
      setReady(true);
    });
    const{data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>{
      const u=s?.user||null;
      setUser(u);
      if(u)loadProfile(u.id);
      else setProfile(null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  const isAdmin=user?.email===ADMIN;
  const dir=lang==='en'?'ltr':'rtl';
  return(
    <Ctx.Provider value={{lang,t,sw,dir,user,profile,setProfile,isAdmin,ready,toast,loadProfile}}>
      {children}
      <Toasts toasts={toasts}/>
    </Ctx.Provider>
  );
}
const useApp=()=>useContext(Ctx);

/* ── HELPERS ── */
function tleft(iso,days){
  const d=new Date(iso).getTime()+days*86400000-Date.now();
  if(d<=0)return null;
  return{d:Math.floor(d/86400000),h:Math.floor(d%86400000/3600000),m:Math.floor(d%3600000/60000)};
}
function parseImgs(v){try{return Array.isArray(v)?v:JSON.parse(v||'[]')}catch{return[]}}
function isVideoUrl(url=''){return/\.(mp4|webm|mov|ogg|m4v)(\?|$)/i.test(url)}

/* Upload blob/File to Supabase Storage; base64 fallback for images */
async function uploadToStorage(bucket,fileOrBlob,ext='jpg'){
  const name=`${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
  const ctype=fileOrBlob instanceof Blob&&fileOrBlob.type?fileOrBlob.type:`image/${ext}`;
  const{error}=await SB.storage.from(bucket).upload(name,fileOrBlob,{contentType:ctype,upsert:false});
  if(error)throw new Error(error.message||'Storage upload failed');
  return SB.storage.from(bucket).getPublicUrl(name).data.publicUrl;
}

/* ── TOASTS ── */
function Toasts({toasts}){
  return(
    <div className="toast-wrap">
      {toasts.map(x=>(<div key={x.id} className={`toast ${x.ok?'t-ok':'t-err'}`}>{x.msg}</div>))}
    </div>
  );
}

/* ══════════════════════════════════════════
   CROP MODAL (images only, 4:1 aspect)
══════════════════════════════════════════ */
function CropModal({file,aspect,onDone,onClose}){
  const{t}=useApp();
  const[img,setImg]=useState(null);
  const[crop,setCrop]=useState({x:0,y:0});
  const[drag,setDrag]=useState(false);
  const dr=useRef({});
  const sr=useRef({rw:320,rh:320,cw:320,ch:80,scale:1});

  useEffect(()=>{
    if(!file)return;
    const url=URL.createObjectURL(file);
    const im=new Image();
    im.onload=()=>{
      const nw=im.naturalWidth,nh=im.naturalHeight;
      const maxW=Math.min(window.innerWidth-52,420);
      const sc=Math.min(maxW/nw,300/nh,1);
      const rw=Math.round(nw*sc),rh=Math.round(nh*sc);
      let cw,ch;
      if(aspect>=(rw/rh)){cw=rw;ch=Math.max(1,Math.round(rw/aspect));}
      else{ch=rh;cw=Math.max(1,Math.round(rh*aspect));}
      sr.current={rw,rh,cw,ch,scale:sc};
      setImg(im);setCrop({x:Math.round((rw-cw)/2),y:Math.round((rh-ch)/2)});
    };
    im.src=url;
    return()=>URL.revokeObjectURL(url);
  },[file,aspect]);

  const getXY=e=>e.touches?{cx:e.touches[0].clientX,cy:e.touches[0].clientY}:{cx:e.clientX,cy:e.clientY};
  const onS=e=>{setDrag(true);const{cx,cy}=getXY(e);dr.current={sx:cx,sy:cy,cx:crop.x,cy:crop.y};};
  const onM=e=>{if(!drag)return;const{cx,cy}=getXY(e);const dx=cx-dr.current.sx,dy=cy-dr.current.sy;const{rw,rh,cw,ch}=sr.current;setCrop({x:Math.max(0,Math.min(rw-cw,dr.current.cx+dx)),y:Math.max(0,Math.min(rh-ch,dr.current.cy+dy))});};
  const onE=()=>setDrag(false);

  const confirm=()=>{
    if(!img)return;
    const{scale,cw,ch}=sr.current;
    const sx=crop.x/scale,sy=crop.y/scale,sw=cw/scale,sh=ch/scale;
    const outW=Math.min(aspect>=4?1600:1200,Math.round(sw));
    const outH=Math.round(outW/aspect);
    const cv=document.createElement('canvas');cv.width=outW;cv.height=outH;
    cv.getContext('2d').drawImage(img,sx,sy,sw,sh,0,0,outW,outH);
    cv.toBlob(b=>{if(b)onDone(b);},'image/jpeg',.92);
  };

  if(!img)return(
    <div className="ov">
      <div className="mbox" style={{maxWidth:320,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
        <div className="mbody"><i className="fas fa-spinner fa-spin acc" style={{fontSize:28}}/><p style={{color:'var(--muted)',marginTop:12,fontSize:13}}>Loading image…</p></div>
      </div>
    </div>
  );
  const{rw,rh,cw,ch}=sr.current;
  return(
    <div className="ov" onClick={onClose}>
      <div className="mbox" style={{maxWidth:520}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><h3>{t('crop')}</h3><button className="btn btn-g" onClick={onClose} style={{padding:'5px 10px'}}>×</button></div>
        <div className="mbody" style={{textAlign:'center'}}>
          <p style={{fontSize:11,color:'var(--muted)',marginBottom:12}}>Drag the crop frame to adjust</p>
          <div style={{display:'inline-block',position:'relative',cursor:'grab',touchAction:'none',userSelect:'none'}}
            onMouseDown={onS} onMouseMove={onM} onMouseUp={onE} onMouseLeave={onE}
            onTouchStart={onS} onTouchMove={onM} onTouchEnd={onE}>
            <img src={img.src} alt="" style={{width:rw,height:rh,display:'block',borderRadius:8,maxWidth:'100%'}} draggable={false}/>
            <div style={{position:'absolute',left:crop.x,top:crop.y,width:cw,height:ch,border:'2px dashed rgba(255,255,255,.9)',boxShadow:'0 0 0 9999px rgba(0,0,0,.52)',borderRadius:4,pointerEvents:'none'}}/>
          </div>
          <div style={{display:'flex',gap:10,justifyContent:'center',marginTop:16}}>
            <button className="btn btn-g" onClick={onClose}>{t('cancel')}</button>
            <button className="btn btn-p" onClick={confirm}><i className="fas fa-check"/> {t('upload')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── LIGHTBOX ── */
function Lightbox({imgs,start,onClose}){
  const[i,setI]=useState(start);
  useEffect(()=>{
    const h=e=>{if(e.key==='Escape')onClose();if(e.key==='ArrowLeft')setI(x=>(x-1+imgs.length)%imgs.length);if(e.key==='ArrowRight')setI(x=>(x+1)%imgs.length);};
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[imgs,onClose]);
  return(
    <div className="lb" onClick={onClose}>
      <button className="lbc" onClick={onClose}>×</button>
      {imgs.length>1&&<div style={{position:'absolute',top:14,left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,.5)',fontSize:12,fontWeight:600}}>{i+1}/{imgs.length}</div>}
      <img src={imgs[i]} alt="" onClick={e=>e.stopPropagation()}/>
      {imgs.length>1&&<>
        <button className="lbn" style={{left:10}} onClick={e=>{e.stopPropagation();setI(x=>(x-1+imgs.length)%imgs.length);}}>‹</button>
        <button className="lbn" style={{right:10}} onClick={e=>{e.stopPropagation();setI(x=>(x+1)%imgs.length);}}>›</button>
      </>}
    </div>
  );
}

/* ══════════════════════════════════════════════════════════
   SPONSOR STRIP — supports image AND video with animation
══════════════════════════════════════════════════════════ */
function SpStrip({sponsors}){
  const[idx,setIdx]=useState(0);
  const[key,setKey]=useState(0);

  useEffect(()=>{
    if(sponsors.length<=1)return;
    const id=setInterval(()=>{setIdx(i=>(i+1)%sponsors.length);setKey(k=>k+1);},6500);
    return()=>clearInterval(id);
  },[sponsors.length]);

  if(!sponsors.length)return null;
  const s=sponsors[idx];
  const vid=isVideoUrl(s.image_url);

  const media=vid
    ?<video src={s.image_url} autoPlay muted loop playsInline style={{maxHeight:'100%',maxWidth:'100%',objectFit:'contain',borderRadius:6}}/>
    :<img src={s.image_url} alt="sponsor" style={{maxHeight:'100%',maxWidth:'100%',objectFit:'contain',borderRadius:6}}/>;

  const inner=s.link_url
    ?<a href={s.link_url} target="_blank" rel="noreferrer" style={{display:'flex',alignItems:'center',justifyContent:'center',width:'100%',height:'100%'}}>{media}</a>
    :media;

  return(
    <div className="sp-strip">
      <div key={key} className="sp-slide" style={{animation:'spShow 6.5s ease-in-out forwards'}}>
        {inner}
      </div>
    </div>
  );
}

/* ── COUNTDOWN ── */
function Countdown({iso,days}){
  const{t}=useApp();
  const[tl,setTl]=useState(()=>tleft(iso,days));
  useEffect(()=>{const id=setInterval(()=>setTl(tleft(iso,days)),30000);return()=>clearInterval(id);},[iso,days]);
  if(!tl)return<span style={{fontSize:11,fontWeight:700,color:'var(--muted)'}}>{t('finished')}</span>;
  return(
    <div className="cdown">
      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(
        <React.Fragment key={i}>
          {i>0&&<span className="cs">:</span>}
          <div className="cb"><div className="cn">{String(x.v).padStart(2,'0')}</div><div className="cl">{x.l}</div></div>
        </React.Fragment>
      ))}
    </div>
  );
}

/* ══════════════════════════════════════════
   COMMENTS — shows profile name + avatar
══════════════════════════════════════════ */
function Comments({postId,user}){
  const{t,profile,toast}=useApp();
  const[list,setList]=useState([]);
  const[text,setText]=useState('');
  const[busy,setBusy]=useState(false);
  const[fetched,setFetched]=useState(false);

  useEffect(()=>{
    SB.from('comments')
      .select('id,content,created_at,user_id,profiles(name,avatar)')
      .eq('post_id',postId)
      .order('created_at')
      .then(({data})=>{setList(data||[]);setFetched(true);});
  },[postId]);

  const submit=async e=>{
    e.preventDefault();if(!text.trim()||!user)return;
    setBusy(true);
    const{data,error}=await SB.from('comments')
      .insert({post_id:postId,user_id:user.id,content:text.trim()})
      .select('id,content,created_at,user_id,profiles(name,avatar)')
      .single();
    setBusy(false);
    if(error){toast(error.message,false);return;}
    setList(p=>[...p,data]);setText('');
  };

  return(
    <div style={{borderTop:'1px solid var(--border)',paddingTop:10,marginTop:10}}>
      <div className="cm-list">
        {!fetched&&<p style={{fontSize:11,color:'var(--muted)'}}>Loading…</p>}
        {fetched&&!list.length&&<p style={{fontSize:11,color:'var(--muted)'}}>{t('noCmt')}</p>}
        {list.map(c=>{
          const av=c.profiles?.avatar||'male';
          const nm=c.profiles?.name||'User';
          return(
            <div key={c.id} className="cm-item">
              <div className="cm-meta">
                <span className="av-icon">{AVATARS[av]||'👤'}</span>
                <span style={{fontWeight:700,color:'var(--soft)'}}>{nm}</span>
                <span style={{marginInlineStart:'auto'}}>{new Date(c.created_at).toLocaleDateString()}</span>
              </div>
              <div className="cm-txt">{c.content}</div>
            </div>
          );
        })}
      </div>
      {user?(
        <form onSubmit={submit} style={{display:'flex',gap:8,marginTop:8}}>
          <input className="inp" placeholder={t('addCmt')} value={text} onChange={e=>setText(e.target.value)} style={{fontSize:12,padding:'8px 10px'}}/>
          <button className="btn btn-p" disabled={busy||!text.trim()} style={{padding:'8px 12px',fontSize:12,flexShrink:0}}>
            <i className="fas fa-paper-plane"/>
          </button>
        </form>
      ):<p style={{fontSize:11,color:'var(--muted)',marginTop:8}}>{t('loginFirst')}</p>}
    </div>
  );
}

/* ══════════════════════════════════════════
   DEAL CARD — fixed action row alignment
══════════════════════════════════════════ */
function DealCard({post,user,isAdmin,onLogin,onDelete,onEdit}){
  const{t,dir,toast}=useApp();
  const[liked,setLiked]=useState(false);
  const[likes,setLikes]=useState(post.like_count||0);
  const[copied,setCopied]=useState(false);
  const[lb,setLb]=useState(null);
  const[showCmt,setShowCmt]=useState(false);
  const imgs=parseImgs(post.images);
  const expired=!tleft(post.created_at,post.discount_days);
  const title=post.title_ckb||post.title_en||'Bilal Bazar';

  useEffect(()=>{
    if(!user)return;
    SB.from('likes').select('id').eq('post_id',post.id).eq('user_id',user.id).maybeSingle()
      .then(({data})=>setLiked(!!data));
  },[user?.id,post.id]);

  const handleLike=async()=>{
    if(!user){onLogin();return;}
    try{
      if(liked){
        await SB.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);
        const n=Math.max(0,likes-1);
        await SB.from('posts').update({like_count:n}).eq('id',post.id);
        setLiked(false);setLikes(n);
      }else{
        const{error}=await SB.from('likes').insert({post_id:post.id,user_id:user.id});
        if(error)throw error;
        const n=likes+1;
        await SB.from('posts').update({like_count:n}).eq('id',post.id);
        setLiked(true);setLikes(n);
      }
    }catch(e){toast(e.message||'Like failed',false);}
  };

  const handleShare=async()=>{
    if(navigator.share){try{await navigator.share({title,url:window.location.href});}catch(e){}}
    else if(navigator.clipboard){await navigator.clipboard.writeText(window.location.href);setCopied(true);setTimeout(()=>setCopied(false),2000);}
  };

  const n=imgs.length;
  const gc=n===1?'g1':n===2?'g2i':n===3?'g3i':n===4?'g4i':'g5i';
  const vis=Math.min(n,5);

  return(
    <div className="card">
      <div className="pimg">
        {n===0
          ?<div style={{height:190,background:'var(--border)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36}}>🏷️</div>
          :n===1
          ?<div className="fi g1" onClick={()=>setLb(0)}><img src={imgs[0]} alt="" loading="lazy"/></div>
          :<div className={gc}>
            {imgs.slice(0,vis).map((img,i)=>(
              <div key={i} className="fi" onClick={()=>setLb(i)}>
                <img src={img} alt="" loading="lazy"/>
                {n>5&&i===vis-1&&<div className="more-over">+{n-4}</div>}
              </div>
            ))}
          </div>
        }
        {post.discount_pct>0&&!expired&&(
          <div className={`disc${dir==='ltr'?' ltr':''}`}>
            <span style={{fontSize:13}}>{post.discount_pct}%</span>
            <span style={{fontSize:7,opacity:.88}}>OFF</span>
          </div>
        )}
        {expired&&<div className="expover"><span>{t('finished')}</span></div>}
      </div>
      {lb!==null&&<Lightbox imgs={imgs} start={lb} onClose={()=>setLb(null)}/>}
      <div style={{padding:'13px 14px 14px'}}>
        <h3 style={{fontWeight:800,fontSize:15,lineHeight:1.35,marginBottom:10,fontFamily:'Noto Sans Arabic,Outfit,sans-serif'}}>{title}</h3>
        <div style={{marginBottom:12}}><Countdown iso={post.created_at} days={post.discount_days}/></div>

        <div className="post-actions">
          <button onClick={handleLike} className={`act-btn${liked?' liked':''}`}>
            <i className={liked?'fas fa-heart':'far fa-heart'}/>{likes>0?` ${likes}`:''}
          </button>
          <button onClick={()=>setShowCmt(s=>!s)} className={`act-btn${showCmt?' active':''}`}>
            <i className="fas fa-comment-alt"/> {t('cmt')}
          </button>
          <button onClick={handleShare} className="act-btn">
            <i className="fas fa-share-alt"/>{copied?' ✓':' '+t('share')}
          </button>
          {isAdmin&&(
            <div className="admin-btns">
              <button onClick={()=>onEdit(post)} className="btn btn-g" style={{padding:'4px 8px',fontSize:11,height:32}}><i className="fas fa-pencil-alt"/></button>
              <button onClick={()=>onDelete(post.id)} className="btn btn-d" style={{padding:'4px 8px',fontSize:11,height:32}}><i className="fas fa-trash"/></button>
            </div>
          )}
        </div>
        {showCmt&&<Comments postId={post.id} user={user}/>}
      </div>
    </div>
  );
}

/* ── POST MODAL ── */
function PostModal({editing,onSave,onClose}){
  const{t,toast}=useApp();

  const[saving,setSaving]=useState(false);
  const[cropFile,setCropFile]=useState(null);
  const[cropAsp,setCropAsp]=useState(1);
  const[upBusy,setUpBusy]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const onCropped=async blob=>{
    setCropFile(null);setUpBusy(true);
    try{const url=await uploadToStorage('posts-images',blob,'jpg');setImgs(p=>[...p,url]);toast('Image ready ✓');}
    catch(e){toast(e.message||'Upload failed',false);}

  const submit=async()=>{

    setSaving(true);
    const payload={title_ckb:form.title_ckb.trim(),title_ar:form.title_ckb.trim(),title_en:form.title_ckb.trim(),discount_pct:+form.discount_pct,discount_days:+form.discount_days,category:form.category,images:JSON.stringify(imgs)};

      ?await SB.from('posts').update(payload).eq('id',editing.id)

    <div className="ov" onClick={onClose}>
      <div className="mbox" onClick={e=>e.stopPropagation()}>

        <div className="mbody" style={{display:'flex',flexDirection:'column',gap:16}}>
          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--accent)',display:'block',marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>Images *</label>
            <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}} className="nsb">
              {imgs.map((img,i)=>(
                <div key={i} style={{position:'relative',flexShrink:0}}>

                  <button onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))} style={{position:'absolute',top:-4,right:-4,width:18,height:18,borderRadius:'50%',background:'var(--danger)',color:'#fff',border:'2px solid var(--elevated)',fontSize:9,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center',fontWeight:900}}>×</button>
                </div>
              ))}
              {imgs.length<5&&(
                <label style={{width:64,height:64,borderRadius:8,border:'1.5px dashed var(--border2)',background:'var(--bg)',flexShrink:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',gap:4,cursor:upBusy?'wait':'pointer'}}>
                  {upBusy?<i className="fas fa-spinner fa-spin acc"/>:<i className="fas fa-camera acc"/>}
                  <span style={{fontSize:9,color:'var(--muted)'}}>{upBusy?'…':'Add'}</span>
                  <input type="file" accept="image/*" style={{display:'none'}} disabled={upBusy} onChange={e=>{const f=e.target.files[0];if(f)setCropFile(f);}}/>
                </label>
              )}
            </div>
            <div style={{display:'flex',gap:6,marginTop:8}}>
              {[[1,'1:1'],[4/3,'4:3']].map(([r,l])=>(
                <button key={l} className={`btn ${cropAsp===r?'btn-p':'btn-g'}`} style={{padding:'5px 12px',fontSize:11,borderRadius:20}} onClick={()=>setCropAsp(r)}>{l}</button>
              ))}

          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--accent)',display:'block',marginBottom:6,textTransform:'uppercase',letterSpacing:.5}}>Title *</label>
            <input className="inp" dir="rtl" value={form.title_ckb} onChange={e=>set('title_ckb',e.target.value)} placeholder="بۆ نمونە: برنجی تازە"/>
          </div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>
            <div>
              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:5}}>Discount % <span className="acc">(0=none)</span></label>
              <input className="inp" type="number" min="0" max="99" value={form.discount_pct} onChange={e=>set('discount_pct',e.target.value)}/>

              <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:5}}>Days</label>

          <div>
            <label style={{fontSize:11,fontWeight:700,color:'var(--muted)',display:'block',marginBottom:8}}>Category</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>

                <button key={c} onClick={()=>set('category',c)} className={`btn ${form.category===c?'btn-p':'btn-g'}`} style={{borderRadius:20,padding:'7px 14px',fontSize:12}}>{TX.ckb.cats[c]}</button>

/* ════════════════════════════════════════════════════════════
   SPONSOR MODAL — FULLY FIXED
════════════════════════════════════════════════════════════ */
function SpModal({sponsors,onUpdate,onClose}){
  const{t,toast}=useApp();
  const[list,setList]=useState(sponsors);
  const[link,setLink]=useState('');
  const[picked,setPicked]=useState(null);
  const[preview,setPreview]=useState(null);
  const[isVid,setIsVid]=useState(false);
  const[cropOpen,setCropOpen]=useState(false);
  const[busy,setBusy]=useState(false);
  const fileRef=useRef(null);

  useEffect(()=>()=>{if(preview)URL.revokeObjectURL(preview);},[preview]);

  const openGallery=()=>{if(fileRef.current)fileRef.current.click();};

  const onPick=e=>{
    const f=e.target.files[0];
    if(!f)return;
    if(preview)URL.revokeObjectURL(preview);
    const url=URL.createObjectURL(f);
    const vid=f.type.startsWith('video/');
    setPicked(f);setPreview(url);setIsVid(vid);
    if(!vid)setCropOpen(true);
    e.target.value='';
  };

  const clearPick=()=>{
    if(preview)URL.revokeObjectURL(preview);
    setPicked(null);setPreview(null);setIsVid(false);setCropOpen(false);
  };

  const onCropped=async blob=>{
    setCropOpen(false);setBusy(true);
    try{
      const url=await uploadToStorage('images',blob,'jpg');
      await save(url);
    }catch(e){toast(e.message||'Image upload failed. Check Supabase Storage bucket "images".',false);}
    setBusy(false);clearPick();
  };

  const uploadVid=async()=>{
    if(!picked)return;
    setBusy(true);
    try{
      const ext=(picked.name.split('.').pop()||'mp4').toLowerCase();
      const url=await uploadToStorage('images',picked,ext);
      await save(url);
    }catch(e){toast(e.message||'Video upload failed. Check Supabase Storage.',false);}
    setBusy(false);clearPick();
  };

  const save=async mediaUrl=>{
    const trimmedLink=link.trim()||null;
    const{data,error}=await SB.from('sponsors')
      .insert({image_url:mediaUrl,visible:true,link_url:trimmedLink,sort_order:list.length})
      .select().single();
    if(error)throw new Error(error.message);
    setList(p=>[...p,data]);
    setLink('');
    toast('Sponsor added ✓');
  };

  const toggle=async(id,cur)=>{
    await SB.from('sponsors').update({visible:!cur}).eq('id',id);
    setList(p=>p.map(s=>s.id===id?{...s,visible:!cur}:s));
  };
  const remove=async id=>{
    if(!window.confirm('Remove this sponsor?'))return;
    await SB.from('sponsors').delete().eq('id',id);
    setList(p=>p.filter(s=>s.id!==id));
  };

  return(
    <div className="ov" onClick={onClose}>
      <div className="mbox" onClick={e=>e.stopPropagation()}>
        <div className="mhdr">
          <h3>{t('mgSp')}</h3>
          <button className="btn btn-g" style={{padding:'5px 10px'}} onClick={()=>{onUpdate(list);onClose();}}>✓ {t('save')}</button>
        </div>
        <div className="mbody" style={{display:'flex',flexDirection:'column',gap:14}}>
          <p style={{fontSize:11,color:'var(--muted)',lineHeight:1.6}}>
            Upload a <strong style={{color:'var(--soft)'}}>wide horizontal banner</strong>.
            Images will be cropped to 4:1. Link is optional.
          </p>

          {!picked&&(
            <button className="btn btn-g wf" onClick={openGallery} style={{padding:'14px',gap:10,fontSize:14,borderStyle:'dashed',borderRadius:12}}>
              <i className="fas fa-images acc" style={{fontSize:18}}/>{t('gallery')}
            </button>
          )}
          <input ref={fileRef} type="file" accept="image/*,video/mp4,video/webm,video/mov,video/quicktime" style={{display:'none'}} onChange={onPick}/>

          {picked&&isVid&&preview&&(
            <div style={{borderRadius:12,border:'1px solid var(--border)',overflow:'hidden',background:'var(--bg)'}}>
              <video src={preview} controls muted style={{width:'100%',maxHeight:110,objectFit:'contain',display:'block'}}/>
              <div style={{padding:'10px 12px',borderTop:'1px solid var(--border)'}}>
                <input className="inp" placeholder={t('spLink')} value={link} onChange={e=>setLink(e.target.value)} style={{marginBottom:8}}/>
                <div style={{display:'flex',gap:8}}>
                  <button className="btn btn-g f1" onClick={clearPick} disabled={busy}>{t('cancel')}</button>
                  <button className="btn btn-p f1" onClick={uploadVid} disabled={busy}>
                    {busy?<><i className="fas fa-spinner fa-spin"/> Uploading…</>:<><i className="fas fa-upload"/> Upload Video</>}
                  </button>
                </div>
              </div>
            </div>
          )}

          {picked&&!isVid&&preview&&!cropOpen&&(
            <div style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',border:'1px solid var(--border)',borderRadius:10,background:'var(--bg)'}}>
              <img src={preview} alt="preview" style={{width:90,height:30,objectFit:'contain',borderRadius:5,flexShrink:0}}/>
              <span style={{fontSize:12,color:'var(--soft)',flex:1}}>Ready to upload</span>
              <button className="btn btn-g xs" onClick={clearPick} style={{padding:'4px 8px'}}>×</button>
            </div>
          )}

          {picked&&!isVid&&!cropOpen&&preview&&(
            <div style={{display:'flex',flexDirection:'column',gap:8}}>
              <input className="inp" placeholder={t('spLink')} value={link} onChange={e=>setLink(e.target.value)}/>
              <button className="btn btn-p wf" disabled={busy} onClick={async()=>{
                setCropOpen(true);
              }} style={{padding:'11px'}}>
                {busy?<><i className="fas fa-spinner fa-spin"/> Uploading…</>:'Re-adjust crop'}
              </button>
            </div>
          )}

          {cropOpen&&picked&&!isVid&&(
            <CropModal file={picked} aspect={4} onDone={onCropped} onClose={()=>{setCropOpen(false);clearPick();}}/>
          )}

          {list.length>0&&(
            <div>
              <p style={{fontSize:11,fontWeight:700,color:'var(--muted)',textTransform:'uppercase',letterSpacing:.5,marginBottom:8}}>Current Sponsors</p>
              <div style={{display:'flex',flexDirection:'column',gap:6}}>
                {list.map(s=>(
                  <div key={s.id} style={{display:'flex',alignItems:'center',gap:8,padding:'8px 0',borderBottom:'1px solid var(--border)'}}>
                    {isVideoUrl(s.image_url)
                      ?<div style={{width:90,height:30,background:'var(--border)',borderRadius:5,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                        <i className="fas fa-film" style={{color:'var(--muted)',fontSize:14}}/>
                       </div>
                      :<img src={s.image_url} alt="" style={{width:90,height:30,objectFit:'cover',borderRadius:5,border:'1px solid var(--border)',flexShrink:0}}/>
                    }
                    <div style={{flex:1,fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',direction:'ltr'}}>{s.link_url||'No link'}</div>
                    <button className="btn btn-g xs" style={{padding:'4px 8px',flexShrink:0,fontSize:11}} onClick={()=>toggle(s.id,s.visible)}>{s.visible?t('hide'):t('show')}</button>
                    <button className="btn btn-d xs" style={{padding:'4px 8px',flexShrink:0,fontSize:11}} onClick={()=>remove(s.id)}>×</button>
                  </div>
                ))}
              </div>
            </div>
          )}
          {!list.length&&<p style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'12px 0'}}>No sponsors yet.</p>}
        </div>
      </div>
    </div>
  );
}

function App(){
  const{t,lang,dir,user,isAdmin,toast}=useApp();
  const[posts,setPosts]=useState([]);
  const[sponsors,setSponsors]=useState([]);
  const[cat,setCat]=useState('all');
  const[shown,setShown]=useState(3);
  const[loading,setLoading]=useState(true);
  const[active,setActive]=useState('hero');
  const[drawer,setDrawer]=useState(false);
  const[authOpen,setAuthOpen]=useState(false);
  const[postModal,setPostModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[spOpen,setSpOpen]=useState(false);
  const[profileOpen,setProfileOpen]=useState(false);
  const[needLogin,setNeedLogin]=useState(false);
  const vidRef=useRef(null);

  const loadPosts=useCallback(async()=>{
    setLoading(true);
    try{
      const{data,error}=await SB.from('posts').select('*').order('created_at',{ascending:false});
      if(error)throw error;
      setPosts(data||[]);
    }catch(e){toast('Failed to load posts',false);}
    setLoading(false);
  },[toast]);

  const loadSponsors=useCallback(async()=>{
    try{
      const{data}=await SB.from('sponsors').select('*').eq('visible',true).order('sort_order');
      setSponsors(data||[]);
    }catch{}
  },[]);

  useEffect(()=>{loadPosts();loadSponsors();},[]);
  useEffect(()=>{setShown(3);},[cat]);
  useEffect(()=>{const id=setInterval(loadPosts,30000);return()=>clearInterval(id);},[loadPosts]);

  useEffect(()=>{
    const v=vidRef.current;if(!v)return;
    const play=()=>v.play().catch(()=>{});
    play();
    v.addEventListener('canplay',play,{once:true});
    v.addEventListener('loadeddata',play,{once:true});
    v.load();
    return()=>{v.removeEventListener('canplay',play);v.removeEventListener('loadeddata',play);};
  },[]);

  useEffect(()=>{
    const ids=['hero','deals','locs','about'];
    const obs=new IntersectionObserver(entries=>entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);}),{threshold:.2});
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);

  const deletePost=async id=>{
    if(!window.confirm(t('del')+'?'))return;
    await SB.from('posts').delete().eq('id',id);
    setPosts(p=>p.filter(x=>x.id!==id));
    toast('Deleted');
  };
  const handleSaved=()=>{setPostModal(false);setEditing(null);loadPosts();};

  const filtered=useMemo(()=>cat==='all'?posts:posts.filter(p=>p.category===cat),[posts,cat]);
  const visible=filtered.slice(0,shown);

    {id:'hero',i:'fa-home',l:t('home')},

    {id:'about',i:'fa-info-circle',l:t('about')},

    <div className={dir==='rtl'?'rtl':'ltr'}>

      <SpStrip sponsors={sponsors}/>

      <header className="hdr">
        <div className="c flex ac jb" style={{height:52}}>
          <div style={{display:'flex',alignItems:'center',gap:9,cursor:'pointer'}} onClick={()=>go('hero')}>
            <div style={{width:32,height:32,borderRadius:8,background:'linear-gradient(135deg,var(--accent),var(--accent2))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,fontWeight:900,color:'#02140d',flexShrink:0}}>B</div>
            <div>
              <div style={{fontWeight:900,fontSize:14,color:'#fff'}}>Bilal Bazar</div>
              <div style={{fontSize:8,fontWeight:700,color:'var(--accent)',letterSpacing:2,textTransform:'uppercase'}}>Erbil · Kurdistan</div>
            </div>
          </div>
          <nav className="hd flex gap2">
            {nav.map(x=>(
              <button key={x.id} onClick={()=>go(x.id)} className="btn btn-g" style={{padding:'6px 10px',fontSize:13,color:active===x.id?'var(--accent)':'var(--muted)',borderColor:'transparent'}}>
                {x.l}
              </button>
            ))}
          </nav>
          <div style={{display:'flex',alignItems:'center',gap:8}}>
            {isAdmin&&<button onClick={()=>{setEditing(null);setPostModal(true);}} className="btn btn-p hd" style={{padding:'7px 12px',fontSize:12}}><i className="fas fa-plus"/> {t('addPost')}</button>}
            {user&&<div style={{width:28,height:28,borderRadius:'50%',background:'var(--elevated)',border:'2px solid var(--accent)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:800,color:'var(--accent)',flexShrink:0,cursor:'pointer'}} onClick={()=>setProfileOpen(true)}>
              {user.email[0].toUpperCase()}

            <button className="btn btn-g" style={{padding:'8px 10px'}} onClick={()=>setDrawer(true)}><i className="fas fa-bars"/></button>

      </header>

      <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" className="fab-wa"><i className="fab fa-whatsapp"/></a>
      {isAdmin&&<button className="fab-add" onClick={()=>{setEditing(null);setPostModal(true);}}><i className="fas fa-plus"/></button>}

      {drawer&&<Drawer onClose={()=>setDrawer(false)} onAuth={()=>setAuthOpen(true)} onAdd={()=>{setEditing(null);setPostModal(true);}} onSp={()=>setSpOpen(true)} onProfile={()=>setProfileOpen(true)}/>}
      {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)}/>}
      {profileOpen&&<ProfileModal onClose={()=>setProfileOpen(false)}/>}
      {postModal&&<PostModal editing={editing} onSave={handleSaved} onClose={()=>{setPostModal(false);setEditing(null);}}/>}
      {spOpen&&<SpModal sponsors={sponsors} onUpdate={s=>{setSponsors(s);loadSponsors();}} onClose={()=>setSpOpen(false)}/>}

      {needLogin&&(
        <div className="ov" onClick={()=>setNeedLogin(false)}>
          <div className="mbox" style={{maxWidth:320}} onClick={e=>e.stopPropagation()}>
            <div className="mbody" style={{textAlign:'center'}}>
              <div style={{fontSize:42,marginBottom:10}}>❤️</div>
              <h3 style={{fontWeight:800,fontSize:17,marginBottom:6}}>{t('loginFirst')}</h3>
              <p style={{fontSize:12,color:'var(--muted)',marginBottom:16}}>تۆمار بکە یان بچۆ ژوورەوە</p>
              <div style={{display:'flex',gap:8}}>
                <button className="btn btn-p f1" onClick={()=>{setNeedLogin(false);setAuthOpen(true);}}>{t('login')}</button>
                <button className="btn btn-g f1" onClick={()=>{setNeedLogin(false);setAuthOpen(true);}}>{t('signup')}</button>
              </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const Root=()=><Provider><App/></Provider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
