<style>
:root{
  --bg:#050f0a;--dark:#071410;--card:#091a14;--mid:#0d2218;--lift:#112a1e;
  --rim:#183d2a;--rim2:#1e4d35;--muted:#3a6a52;--soft:#6aa882;--text:#d8f0e8;
  --white:#f0faf4;--gold:#059669;--gold2:#10b981;--gold3:#6ee7b7;--teal:#047857;
  --teal2:#34d399;--red:#c0392b;--red2:#e74c3c;--r:10px;--r2:14px;--r3:18px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.rtl{direction:rtl}.ltr{direction:ltr}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--gold2);border-radius:2px}
.nsb::-webkit-scrollbar{display:none}.nsb{-ms-overflow-style:none;scrollbar-width:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes slideUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes slideRight{from{opacity:0;transform:translateX(100%)}to{opacity:1;transform:translateX(0)}}
@keyframes slideLeft{from{opacity:0;transform:translateX(-100%)}to{opacity:1;transform:translateX(0)}}

.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease}
.reveal.vis{opacity:1;transform:none}

#hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden}
.vbg{position:absolute;inset:0;z-index:0}
.vbg video{width:100%;height:100%;object-fit:cover;opacity:.35}
.vbg::after{content:'';position:absolute;inset:0;background:linear-gradient(to bottom,rgba(5,15,10,.7) 0%,rgba(5,15,10,.2) 40%,rgba(5,15,10,.9) 100%)}

.hero-title{font-weight:900;font-size:clamp(48px,9vw,90px);letter-spacing:-2px;line-height:.95;background:linear-gradient(120deg,#fff 0%,#d4f7e8 25%,var(--gold2) 52%,#fff 72%,var(--gold3) 100%);background-size:250% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:fadeUp .7s ease .2s both,shimmer 5s linear infinite}
.hero-sub{font-family:'Noto Sans Arabic',sans-serif;font-weight:900;font-size:clamp(16px,3vw,24px);color:rgba(245,208,128,.82);margin-bottom:12px;animation:fadeUp .7s ease .4s both}
.hero-desc{color:rgba(220,238,255,.68);font-size:clamp(13px,2.2vw,16px);line-height:1.75;max-width:520px;margin:0 auto 32px;animation:fadeUp .7s ease .6s both}

.sponsor-strip{position:relative;height:70px;background:var(--dark);border-bottom:1px solid var(--rim);overflow:hidden}
.sp-slide{position:absolute;inset:0;opacity:0;transition:opacity 1s ease-in-out;display:flex;align-items:center;justify-content:center}
.sp-slide.active{opacity:1}
.sp-slide img{width:100%;height:100%;object-fit:cover;object-position:center}

.hdr{position:sticky;top:0;z-index:60;background:rgba(6,20,14,.96);border-bottom:1px solid var(--rim);backdrop-filter:blur(14px)}

.card{background:var(--card);border:1px solid var(--rim);border-radius:var(--r2);overflow:hidden;transition:transform .2s ease,box-shadow .2s ease,border-color .2s ease}
.card:hover{transform:translateY(-4px);box-shadow:0 18px 50px rgba(0,0,0,.5),0 0 28px rgba(5,150,105,.1);border-color:var(--gold)}
.card-img-wrap{position:relative;height:220px;overflow:hidden;cursor:pointer;background:var(--mid)}
.card-img-wrap img{width:100%;height:100%;object-fit:cover;transition:transform .3s ease}
.card:hover .card-img-wrap img{transform:scale(1.05)}
.discount-badge{position:absolute;top:12px;left:12px;width:46px;height:46px;border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;box-shadow:0 4px 14px rgba(192,57,43,.5)}
.ltr .discount-badge{left:auto;right:12px}
.expired-overlay{position:absolute;inset:0;background:rgba(6,9,26,.65);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.expired-overlay span{background:var(--red);color:#fff;padding:8px 22px;border-radius:6px;font-weight:900;font-size:15px;letter-spacing:1px}
.card-body{padding:16px}
.card-body h3{font-weight:800;font-size:15px;line-height:1.4;margin-bottom:10px;color:var(--white)}
.card-meta{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.category-pill{display:inline-flex;padding:3px 10px;border-radius:12px;font-size:11px;font-weight:700;background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.2);color:var(--gold2)}
.countdown{display:inline-flex;align-items:center;gap:4px;padding:6px 10px;border-radius:6px;background:rgba(200,150,42,.08);border:1px solid rgba(200,150,42,.18);font-weight:900;font-size:13px;color:#fff}
.expired-badge{display:inline-block;padding:4px 10px;border-radius:6px;background:var(--red);color:#fff;font-size:11px;font-weight:900}
.card-actions{display:flex;align-items:center;justify-content:space-between;padding-top:10px;border-top:1px solid var(--rim);gap:8px}
.like-btn,.share-btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:8px;background:var(--mid);color:var(--soft);border:none;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.like-btn:hover,.share-btn:hover{background:var(--lift);color:var(--text)}
.like-btn.liked{background:rgba(192,57,43,.18);color:#ef9a9a}
.admin-actions{display:flex;gap:5px}
.admin-actions button{width:30px;height:30px;border-radius:6px;border:none;background:rgba(59,130,246,.12);color:#7ab4fa;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px}
.admin-actions button:last-child{background:rgba(192,57,43,.12);color:#f08080}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:11px 20px;border:none;border-radius:var(--r);font-family:inherit;font-weight:700;font-size:14px;cursor:pointer;transition:all .16s ease;text-decoration:none}
.btn:disabled{opacity:.5;cursor:not-allowed;transform:none!important}
.btn-gold{background:linear-gradient(135deg,var(--gold),var(--gold2));color:#06091a;box-shadow:0 4px 16px rgba(5,150,105,.3)}
.btn-gold:hover:not(:disabled){box-shadow:0 6px 26px rgba(5,150,105,.5);transform:translateY(-1px)}
.btn-dark{background:var(--mid);color:var(--text);border:1px solid var(--rim)}
.btn-dark:hover{border-color:var(--gold);color:var(--gold2)}
.btn-ghost{background:transparent;color:var(--soft);border:1px solid var(--rim)}
.btn-ghost:hover{color:var(--text);border-color:var(--gold2);background:var(--mid)}

.inp,.modal input,.modal select{width:100%;background:var(--bg);border:1.5px solid var(--rim);border-radius:var(--r);padding:11px 14px;color:var(--text);font-size:14px;font-family:inherit;outline:none;transition:border-color .2s}
.inp:focus,.modal input:focus,.modal select:focus{border-color:var(--gold)}
.modal input::placeholder{color:var(--muted)}

.modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:90;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(6px)}
@media(min-width:640px){.modal-backdrop{align-items:center;padding:20px}}
.modal{background:var(--card);border:1px solid var(--rim);border-radius:var(--r3) var(--r3) 0 0;width:100%;max-width:480px;max-height:92vh;overflow-y:auto;box-shadow:0 -12px 50px rgba(0,0,0,.6);animation:slideUp .24s ease}
@media(min-width:640px){.modal{border-radius:var(--r3);animation:scaleIn .22s ease}}
.modal-header{position:sticky;top:0;z-index:2;background:var(--card);padding:16px 20px;border-bottom:1px solid var(--rim);display:flex;align-items:center;justify-content:space-between}
.modal-header h3{font-weight:800;font-size:15px;color:var(--white)}
.modal-header button{background:none;border:none;color:var(--muted);font-size:26px;cursor:pointer;width:32px;height:32px;display:flex;align-items:center;justify-content:center}
.modal-body{padding:18px;display:flex;flex-direction:column;gap:14px}
.form-group{display:flex;flex-direction:column;gap:6px}
.form-group label{font-size:11px;color:var(--gold2);font-weight:700;text-transform:uppercase;letter-spacing:.6px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.error-msg{background:rgba(192,57,43,.1);border:1px solid rgba(192,57,43,.3);border-radius:8px;padding:10px 12px;color:#f08080;font-size:12px}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted);font-size:12px;margin:8px 0}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--rim)}
.link-btn{background:none;border:none;color:var(--gold2);font-weight:700;cursor:pointer;font-family:inherit;font-size:inherit}
.switch-mode{text-align:center;font-size:13px;color:var(--muted);margin-top:10px}

.image-upload{display:flex;flex-direction:column;gap:10px}
.image-upload img{width:100%;height:160px;object-fit:cover;border-radius:var(--r);border:1px solid var(--rim)}
.upload-btn{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:20px;background:var(--mid);border:2px dashed var(--rim2);border-radius:var(--r);cursor:pointer;color:var(--soft);font-size:13px;font-weight:600;transition:all .2s}
.upload-btn:hover{border-color:var(--gold);color:var(--gold2)}
.upload-btn input{display:none}

.sponsor-upload{margin-bottom:16px}
.sponsor-preview{width:100%;height:100px;border-radius:var(--r);overflow:hidden;border:1px solid var(--rim);margin-bottom:10px}
.sponsor-preview img{width:100%;height:100%;object-fit:cover}
.sponsor-list{display:flex;flex-direction:column;gap:10px}

.sponsor-item button{margin-left:auto;width:32px;height:32px;border-radius:6px;border:none;background:rgba(192,57,43,.12);color:#f08080;cursor:pointer}

.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.97);z-index:300;display:flex;align-items:center;justify-content:center;padding:20px}
.lightbox img{max-width:100%;max-height:90vh;object-fit:contain;border-radius:10px}
.lightbox button{position:absolute;top:16px;right:20px;background:none;border:none;color:#fff;font-size:34px;cursor:pointer}

.stitle{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.stitle::before{content:'';display:block;width:28px;height:2.5px;border-radius:1px;background:linear-gradient(90deg,var(--gold),var(--gold2));flex-shrink:0}
.sk{background:linear-gradient(90deg,var(--mid) 25%,var(--lift) 50%,var(--mid) 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:8px}

.loccard{background:var(--card);border:1px solid var(--rim);border-radius:var(--r2);padding:20px;text-decoration:none;color:inherit;display:block;transition:all .2s ease}
.loccard:hover{border-color:var(--gold);transform:translateY(-4px);box-shadow:0 16px 44px rgba(0,0,0,.44),0 0 22px rgba(5,150,105,.1)}
.abt-feat{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.abt-feat-item{background:var(--card);border:1px solid var(--rim);border-radius:var(--r2);padding:18px 14px;width:140px;text-align:center;transition:all .2s}
.abt-feat-item:hover{border-color:var(--gold2)}
.abt-feat-ico{width:40px;height:40px;border-radius:10px;background:rgba(5,150,105,.1);border:1px solid rgba(5,150,105,.2);display:flex;align-items:center;justify-content:center;margin:0 auto 10px;font-size:17px;color:var(--gold2)}

.mnav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:rgba(6,20,14,.97);border-top:1px solid var(--rim);backdrop-filter:blur(14px);display:flex;justify-content:space-around;align-items:center;height:56px;padding-bottom:env(safe-area-inset-bottom)}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;color:var(--muted);background:none;border:none;cursor:pointer;font-family:inherit;font-size:7.5px;font-weight:700;text-transform:uppercase;letter-spacing:.3px;padding:7px 0;transition:color .15s}
.mnb.act{color:var(--gold2)}

.drawer-backdrop{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.76);backdrop-filter:blur(4px)}
.drawer{position:absolute;top:0;bottom:0;width:min(290px,85vw);background:var(--dark);border-inline-end:1px solid var(--rim);display:flex;flex-direction:column;overflow-y:auto}
.rtl .drawer{right:0;animation:slideRight .22s ease}
.ltr .drawer{left:0;animation:slideLeft .22s ease}
.di{display:flex;align-items:center;gap:13px;padding:13px 18px;border-bottom:1px solid rgba(255,255,255,.04);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;background:none;border-top:none;border-left:none;border-right:none;width:100%;text-align:inherit;text-decoration:none;font-family:inherit;transition:background .14s}
.di:hover{background:var(--mid)}
.dico{width:33px;height:33px;border-radius:8px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px}

.fab{position:fixed;width:50px;height:50px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:22px;z-index:45;box-shadow:0 4px 20px rgba(0,0,0,.4);text-decoration:none;border:none;cursor:pointer;transition:transform .18s}
.fab:hover{transform:scale(1.1)}
.fab-wa{bottom:66px;right:16px;background:#25d366}
.fab-add{bottom:66px;left:16px;background:linear-gradient(135deg,var(--gold),var(--gold2));color:#06091a}

@media(max-width:640px){.hd{display:none!important}}
@media(min-width:641px){.mnav{display:none!important}}
</style>

const Ctx=React.createContext();
const useApp=()=>useContext(Ctx);
const Provider=({children})=>{
  const [lang,setLang]=useState('ckb');
  const [user,setUser]=useState(null);
  const [profile,setProfile]=useState(null);
  const [ready,setReady]=useState(false);

  const t=useCallback(k=>{
    const keys=k.split('.');
    let v=T[lang];
    for(const x of keys){if(v==null)return k;v=v[x]}
    return v==null?k:String(v);
  },[lang]);

  const sw=useCallback(l=>{
    setLang(l);
    document.documentElement.lang=l;
    document.documentElement.dir=l==='en'?'ltr':'rtl';
  },[]);

  useEffect(()=>{
    SB.auth.getSession().then(({data:{session}})=>{
      setUser(session?.user||null);
      setReady(true);
    });
    const {data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>{
      setUser(s?.user||null);
    });
    return()=>subscription.unsubscribe();
  },[]);

  useEffect(()=>{
    if(user){
      SB.from('profiles').select('*').eq('id',user.id).single().then(({data})=>setProfile(data));
    }else{setProfile(null)}
  },[user]);

  const isAdmin=profile?.is_admin||user?.email===ADMIN_EMAIL;
  const dir=lang==='en'?'ltr':'rtl';
  return(<Ctx.Provider value={{lang,t,sw,dir,user,profile,isAdmin,ready}}>{children}</Ctx.Provider>);
};

const timeLeft=(expiresAt)=>{
  const diff=new Date(expiresAt).getTime()-Date.now();
  if(diff<=0)return null;
  return{d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000)};
};

const useReveal=()=>{
  const ref=useRef(null);
  useEffect(()=>{
    const el=ref.current;
    if(!el)return;
    const obs=new IntersectionObserver(([e])=>{if(e.isIntersecting){el.classList.add('vis');obs.disconnect()}},{threshold:.08});
    obs.observe(el);
    return()=>obs.disconnect();
  },[]);
  return ref;
};

const handleShare=async(title)=>{
  if(navigator.share){try{await navigator.share({title,url:window.location.href})}catch(e){}}
  else if(navigator.clipboard){await navigator.clipboard.writeText(window.location.href);alert('Link copied!')}
};

const Countdown=({expiresAt})=>{
  const {t}=useApp();
  const [tl,setTl]=useState(()=>timeLeft(expiresAt));
  useEffect(()=>{const id=setInterval(()=>setTl(timeLeft(expiresAt)),1000);return()=>clearInterval(id)},[expiresAt]);
  if(!tl)return<span className="expired-badge">{t('expired')}</span>;
  return(
    <div className="countdown">
      <span>{String(tl.d).padStart(2,'0')}</span>:
      <span>{String(tl.h).padStart(2,'0')}</span>:
      <span>{String(tl.m).padStart(2,'0')}</span>
    </div>
  );
};

const Lightbox=({src,onClose})=>{
  useEffect(()=>{const h=e=>{if(e.key==='Escape')onClose()};window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h)},[onClose]);
  return(
    <div className="lightbox" onClick={onClose}>
      <button onClick={onClose}>×</button>
      <img src={src} alt="" onClick={e=>e.stopPropagation()}/>
    </div>
  );
};

const PostModal=({editing,onSave,onClose})=>{
  const {t}=useApp();
  const [title,setTitle]=useState(editing?.title||'');
  const [category,setCategory]=useState(editing?.category||'rice');
  const [discount,setDiscount]=useState(editing?.discount||0);
  const [expiresAt,setExpiresAt]=useState(editing?.expires_at?new Date(editing.expires_at).toISOString().slice(0,16):new Date(Date.now()+7*86400000).toISOString().slice(0,16));
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState(editing?.image_url||'');
  const [saving,setSaving]=useState(false);

  const handleFile=e=>{const f=e.target.files[0];if(!f)return;setFile(f);setPreview(URL.createObjectURL(f))};
  const submit=async()=>{
    if(!title.trim())return;
    setSaving(true);
    try{
      let imageUrl=editing?.image_url||'';
      if(file){
        const ext=file.name.split('.').pop();
        const name=`${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const {data,error}=await SB.storage.from('posts-images').upload(name,file);
        if(error)throw error;
        const {data:{publicUrl}}=SB.storage.from('posts-images').getPublicUrl(data.path);
        imageUrl=publicUrl;
      }
      const payload={title,category,discount:+discount,expires_at:new Date(expiresAt).toISOString(),image_url:imageUrl};
      if(editing){await SB.from('posts').update(payload).eq('id',editing.id)}
      else{await SB.from('posts').insert(payload)}
      onSave();
    }catch(e){alert('Error: '+e.message)}
    setSaving(false);
  };
  return(
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h3>{editing?t('editPost'):t('addPost')}</h3><button onClick={onClose}>×</button></div>
        <div className="modal-body">
          <div className="form-group"><label>{t('ptitle')} *</label><input className="inp" value={title} onChange={e=>setTitle(e.target.value)}/></div>
          <div className="form-row">
            <div className="form-group"><label>{t('cat')}</label>
              <select className="inp" value={category} onChange={e=>setCategory(e.target.value)}>
                {['rice','meat','cereal','other'].map(c=><option key={c} value={c}>{t('cats.'+c)}</option>)}
              </select>
            </div>
            <div className="form-group"><label>{t('pct')} (0-99)</label><input className="inp" type="number" min="0" max="99" value={discount} onChange={e=>setDiscount(e.target.value)}/></div>
          </div>
          <div className="form-group"><label>Expires At</label><input className="inp" type="datetime-local" value={expiresAt} onChange={e=>setExpiresAt(e.target.value)}/></div>
          <div className="form-group">
            <label>Image {editing?'(leave empty to keep current)':'*'}</label>
            <div className="image-upload">
              {preview&&<img src={preview} alt="preview"/>}
              <label className="upload-btn"><i className="fas fa-camera" style={{fontSize:20,color:'var(--gold2)'}}/><span>{file?file.name:'Choose image'}</span><input type="file" accept="image/*" onChange={handleFile}/></label>
            </div>
          </div>
          <button className="btn btn-gold" onClick={submit} disabled={saving||!title.trim()||(!editing&&!file)} style={{width:'100%'}}>{saving?'Saving...':(editing?t('save'):t('pub'))}</button>
        </div>
      </div>
    </div>
  );
};

const SponsorMgr=({sponsors,onUpdate,onClose})=>{
  const {t}=useApp();
  const [file,setFile]=useState(null);
  const [preview,setPreview]=useState('');
  const [uploading,setUploading]=useState(false);
  const handleFile=e=>{const f=e.target.files[0];if(!f)return;setFile(f);setPreview(URL.createObjectURL(f))};
  const addSponsor=async()=>{
    if(!file)return;
    setUploading(true);
    try{
      const ext=file.name.split('.').pop();
      const name=`${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
      const {data,error}=await SB.storage.from('sponsors-images').upload(name,file);
      if(error)throw error;
      const {data:{publicUrl}}=SB.storage.from('sponsors-images').getPublicUrl(data.path);
      await SB.from('sponsors').insert({image_url:publicUrl});
      setFile(null);setPreview('');onUpdate();
    }catch(e){alert('Upload failed: '+e.message)}
    setUploading(false);
  };
  const removeSponsor=async(id)=>{if(!window.confirm('Delete this sponsor?'))return;await SB.from('sponsors').delete().eq('id',id);onUpdate()};
  return(
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h3>{t('mgSp')}</h3><button onClick={onClose}>×</button></div>

          <div className="sponsor-upload">

            <label className="upload-btn"><i className="fas fa-image" style={{fontSize:20,color:'var(--gold2)'}}/><span>Select banner image</span><input type="file" accept="image/*" onChange={handleFile}/></label>
            {file&&<button className="btn btn-gold" onClick={addSponsor} disabled={uploading} style={{width:'100%'}}>{uploading?'Uploading...':'Add Sponsor'}</button>}
          </div>
          <div className="sponsor-list">
            {sponsors.map(s=>(
              <div key={s.id} className="sponsor-item"><img src={s.image_url} alt="sponsor"/><button onClick={()=>removeSponsor(s.id)}><i className="fas fa-trash"/></button></div>
            ))}
            {sponsors.length===0&&<p style={{color:'var(--muted)',textAlign:'center',padding:20}}>No sponsors yet.</p>}
          </div>
        </div>
      </div>
    </div>
  );
};

const AuthModal=({mode,onClose,onSwitch})=>{
  const {t}=useApp();
  const [email,setEmail]=useState('');
  const [pass,setPass]=useState('');
  const [err,setErr]=useState('');
  const [loading,setLoading]=useState(false);
  const submit=async(e)=>{
    e.preventDefault();
    setLoading(true);setErr('');
    try{
      if(mode==='login'){
        const {error}=await SB.auth.signInWithPassword({email:email.trim(),password:pass});
        if(error)throw error;
      }else{
        const {error}=await SB.auth.signUp({email:email.trim(),password:pass});
        if(error)throw error;
      }
      onClose();
    }catch(e){
      let msg=e.message||'Authentication failed';
      if(msg.includes('Invalid login'))msg='Wrong email or password';
      if(msg.includes('already registered'))msg='Account exists. Please log in.';
      if(msg.includes('weak'))msg='Password must be at least 6 characters.';
      setErr(msg);
    }
    setLoading(false);
  };
  const google=async()=>{
    const {error}=await SB.auth.signInWithOAuth({provider:'google',options:{redirectTo:window.location.origin+window.location.pathname}});
    if(error)setErr('Google sign-in failed. Please use email & password.');
  };
  return(
    <div className="modal-backdrop" onClick={onClose}>
      <div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-header"><h3>{mode==='login'?t('login'):t('signup')}</h3><button onClick={onClose}>×</button></div>
        <div className="modal-body">
          <form onSubmit={submit} autoComplete="off">
            <input type="text" name="fake_username" style={{display:'none'}} autoComplete="username"/>
            <div className="form-group"><label>Email</label><input className="inp" type="email" value={email} onChange={e=>setEmail(e.target.value)} required autoComplete="off"/></div>
            <div className="form-group"><label>Password</label><input className="inp" type="password" value={pass} onChange={e=>setPass(e.target.value)} required autoComplete="new-password"/></div>
            {err&&<div className="error-msg">{err}</div>}
            <button type="submit" className="btn btn-gold" disabled={loading} style={{width:'100%'}}>{loading?'Please wait...':(mode==='login'?t('login'):t('signup'))}</button>
          </form>
          <div className="divider">or</div>
          <button className="btn btn-dark" onClick={google} style={{width:'100%'}}><i className="fab fa-google"/> Continue with Google</button>
          <p className="switch-mode">{mode==='login'?t('noAcc'):t('haveAcc')} <button className="link-btn" onClick={onSwitch}>{mode==='login'?t('signup'):t('login')}</button></p>
        </div>
      </div>
    </div>
  );
};

          </div>
        </div>
        <div style={{position:'absolute',bottom:24,left:'50%',transform:'translateX(-50%)',zIndex:2,display:'flex',flexDirection:'column',alignItems:'center',gap:6,color:'rgba(255,255,255,.3)',animation:'fadeIn 1s ease 2s both'}}>
          <span style={{fontSize:8,letterSpacing:3,textTransform:'uppercase',fontWeight:600}}>scroll</span>
          <i className="fas fa-chevron-down" style={{fontSize:12,animation:'float 2s ease-in-out infinite'}}/>
        </div>
      </section>

      <section id="deals" style={{padding:'60px 16px',maxWidth:1100,margin:'0 auto'}}>
        <div ref={r1} className="reveal">
          <div className="stitle">
            <h2 style={{fontWeight:900,fontSize:24,color:'var(--white)'}}>{t('dtitle')}</h2>
            <span style={{display:'inline-flex',padding:'3px 10px',borderRadius:12,fontSize:11,fontWeight:700,background:'rgba(5,150,105,.1)',border:'1px solid rgba(5,150,105,.2)',color:'var(--gold2)'}}>{filtered.length}</span>
          </div>
          <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:14,marginBottom:24}} className="nsb">
            {['all','rice','meat','cereal','other'].map(c=>(
              <button key={c} onClick={()=>setCat(c)} style={{padding:'8px 18px',borderRadius:20,border:cat!==c?'1px solid var(--rim)':'none',fontSize:13,fontWeight:700,cursor:'pointer',whiteSpace:'nowrap',fontFamily:'inherit',background:cat===c?'linear-gradient(135deg,var(--gold),var(--gold2))':'var(--mid)',color:cat===c?'#06091a':'var(--soft)',transition:'all .16s'}}>{t('cats.'+c)}</button>
            ))}
          </div>
          {loading?(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
              {[1,2,3].map(i=><div key={i} className="card"><div className="sk" style={{height:200}}/><div style={{padding:14,display:'flex',flexDirection:'column',gap:8}}><div className="sk" style={{height:16,width:'75%'}}/><div className="sk" style={{height:12,width:'50%'}}/></div></div>)}
            </div>
          ):error?(
            <div style={{textAlign:'center',padding:60,color:'#f08080'}}>
              <i className="fas fa-exclamation-circle" style={{fontSize:40,marginBottom:12}}/>
              <p>{error}</p>
              <button className="btn btn-gold" onClick={loadPosts} style={{marginTop:16}}>Retry</button>
            </div>
          ):filtered.length===0?(
            <div style={{textAlign:'center',padding:60,color:'var(--muted)'}}><div style={{fontSize:48,marginBottom:12}}>🏷️</div><p style={{fontSize:16}}>{t('noDeals')}</p></div>
          ):(
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                {visiblePosts.map(post=>(
                  <DealCard key={post.id} post={post} likes={likes} userLike={!!likes.find(l=>l.post_id===post.id&&l.user_id===user?.id)} onLike={toggleLike} onEdit={p=>{setEditing(p);setPostModal(true)}} onDelete={deletePost} onNeedLogin={()=>setNeedLogin(true)}/>
                ))}
              </div>
              {filtered.length>3&&shown<=3&&(
                <div style={{textAlign:'center',marginTop:28}}>
                  <button className="btn btn-gold" onClick={()=>setShown(filtered.length)} style={{padding:'12px 32px',borderRadius:30,fontSize:14}}><i className="fas fa-chevron-down" style={{marginInlineEnd:8}}/> {t('more')} ({filtered.length-3})</button>
                </div>
              )}
              {shown>3&&filtered.length>3&&(
                <div style={{textAlign:'center',marginTop:28}}>
                  <button className="btn btn-ghost" onClick={()=>setShown(3)} style={{padding:'12px 32px',borderRadius:30,fontSize:14}}><i className="fas fa-chevron-up" style={{marginInlineEnd:8}}/> {t('hide')}</button>
                </div>
              )}
            </>
          )}
        </div>
      </section>

      <div style={{height:1,background:'linear-gradient(90deg,transparent,var(--rim),transparent)'}}/>

      <section id="locs" style={{padding:'60px 16px',background:'var(--dark)',borderTop:'1px solid var(--rim)'}}>
        <div ref={r2} className="reveal" style={{maxWidth:1100,margin:'0 auto'}}>
          <div className="stitle" style={{justifyContent:'center',marginBottom:28}}><h2 style={{fontWeight:900,fontSize:24,color:'var(--white)'}}>{t('ltitle')}</h2></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(260px,1fr))',gap:14}}>
            {LOCS.map(loc=>(
              <a key={loc.id} href={loc.link} target="_blank" rel="noopener noreferrer" className="loccard">
                <div style={{width:44,height:44,borderRadius:10,background:'rgba(5,150,105,.12)',border:'1px solid rgba(5,150,105,.25)',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14,fontSize:18,color:'var(--gold2)'}}><i className="fas fa-store"/></div>
                <h3 style={{fontWeight:800,fontSize:15,marginBottom:6,color:'var(--white)'}}>{loc[lang]||loc.en}</h3>
                <p style={{fontSize:12,color:'var(--muted)',marginBottom:14,lineHeight:1.5}}>{loc.addr[lang]||loc.addr.en}</p>
                <div style={{display:'flex',flexDirection:'column',gap:6,marginBottom:14,fontSize:11,color:'var(--soft)'}}>
                  <span style={{display:'flex',alignItems:'center',gap:6}}><i className="far fa-clock" style={{color:'var(--gold)',width:14}}/>{loc.hr}</span>
                  <span style={{display:'flex',alignItems:'center',gap:6}}><i className="fas fa-phone" style={{color:'var(--gold)',width:14}}/>{loc.ph}</span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <span style={{flex:1,background:'linear-gradient(135deg,var(--gold),var(--gold2))',color:'#fff',borderRadius:8,padding:'10px',textAlign:'center',fontSize:12,fontWeight:800,display:'flex',alignItems:'center',justifyContent:'center',gap:5}}><i className="fas fa-map-marker-alt"/> {t('openMap')}</span>
                  <a href={`tel:+964${loc.ph.replace(/^0/,'').replace(/\s/g,'')}`} onClick={e=>e.stopPropagation()} style={{background:'var(--mid)',border:'1px solid var(--rim)',borderRadius:8,padding:'10px 14px',display:'flex',alignItems:'center',color:'var(--soft)',fontSize:14}}><i className="fas fa-phone"/></a>
                </div>
              </a>
            ))}
          </div>
        </div>
      </section>

      <div style={{height:1,background:'linear-gradient(90deg,transparent,var(--rim),transparent)'}}/>

      <section id="about" style={{padding:'60px 16px',maxWidth:720,margin:'0 auto',textAlign:'center'}}>
        <div ref={r3} className="reveal">
          <div className="stitle" style={{justifyContent:'center',marginBottom:16}}><h2 style={{fontWeight:900,fontSize:24,color:'var(--white)'}}>{t('atitle')}</h2></div>
          <p style={{color:'var(--soft)',fontSize:15,lineHeight:1.9,maxWidth:600,margin:'0 auto'}}>{t('atext')}</p>
          <div className="abt-feat">
            {[{i:'fa-leaf',l:t('feat1')},{i:'fa-tag',l:t('feat2')},{i:'fa-award',l:t('feat3')}].map((f,idx)=>(
              <div key={idx} className="abt-feat-item"><div className="abt-feat-ico"><i className={`fas ${f.i}`}/></div><div style={{fontSize:12,fontWeight:700,color:'var(--white)'}}>{f.l}</div></div>
            ))}
          </div>
        </div>
      </section>

      <footer style={{background:'var(--bg)',borderTop:'1px solid var(--rim)',padding:'40px 16px 80px',textAlign:'center'}}>
        <div style={{fontWeight:900,fontSize:28,marginBottom:4,background:'linear-gradient(120deg,#fff,var(--gold2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Bilal Bazar</div>
        <div style={{fontSize:9,fontWeight:700,letterSpacing:3,color:'var(--gold)',marginBottom:10}}>ERBIL</div>
        <div style={{fontFamily:'Noto Sans Arabic',fontSize:14,color:'var(--muted)',marginBottom:20}}>{lang==='ckb'?'بیلال بازار':lang==='ar'?'بيلال بازار':'Bilal Bazar'}</div>
        <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" style={{display:'inline-flex',alignItems:'center',gap:8,background:'rgba(37,211,102,.09)',border:'1px solid rgba(37,211,102,.2)',borderRadius:10,padding:'10px 20px',color:'#25d366',textDecoration:'none',fontSize:14,fontWeight:700,marginBottom:20}}><i className="fab fa-whatsapp" style={{fontSize:18}}/> WhatsApp</a>
        <p style={{fontSize:11,color:'var(--muted)'}}>{t('copy')}</p>
      </footer>

      <div className="mnav">
        {navItems.map(x=><button key={x.id} className={`mnb${active===x.id?' act':''}`} onClick={()=>go(x.id)}><i className={`fas ${x.icon}`} style={{fontSize:18}}/>{x.l}</button>)}
        <button className="mnb" onClick={()=>setDrawer(true)}><i className="fas fa-bars" style={{fontSize:18}}/> {t('menu')}</button>
      </div>

      <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" className="fab fab-wa"><i className="fab fa-whatsapp"/></a>
      {isAdmin&&<button className="fab fab-add" onClick={()=>{setEditing(null);setPostModal(true)}}><i className="fas fa-plus"/></button>}

      {drawer&&(
        <div className="drawer-backdrop" onClick={()=>setDrawer(false)}>
          <div className={`drawer ${dir==='ltr'?'ltr':'rtl'}`} onClick={e=>e.stopPropagation()}>
            <div style={{padding:'18px',borderBottom:'1px solid rgba(255,255,255,.05)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
              <span style={{fontWeight:900,fontSize:17,background:'linear-gradient(120deg,var(--gold),var(--gold2))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>Bilal Bazar</span>
              <button onClick={()=>setDrawer(false)} style={{background:'var(--mid)',border:'1px solid var(--rim)',borderRadius:8,width:30,height:30,color:'var(--muted)',cursor:'pointer',fontSize:16}}>×</button>
            </div>
            <button className="di" onClick={()=>{go('hero');setDrawer(false)}}><div className="dico" style={{background:'rgba(200,150,42,.12)'}}><i className="fas fa-home" style={{color:'var(--gold2)'}}/></div>{t('home')}</button>
            <button className="di" onClick={()=>{go('locs');setDrawer(false)}}><div className="dico" style={{background:'rgba(13,148,136,.1)'}}><i className="fas fa-map-marker-alt" style={{color:'var(--teal2)'}}/></div>{t('locs')}</button>
            <button className="di" onClick={()=>{go('about');setDrawer(false)}}><div className="dico" style={{background:'rgba(96,165,250,.1)'}}><i className="fas fa-info-circle" style={{color:'#60a5fa'}}/></div>{t('about')}</button>
            <div style={{padding:'14px 16px',borderBottom:'1px solid rgba(255,255,255,.04)'}}>
              <p style={{fontSize:10,color:'var(--muted)',fontWeight:700,marginBottom:8,textTransform:'uppercase',letterSpacing:1}}>{t('lang')}</p>
              <div style={{display:'flex',gap:6}}>
                {[{c:'ckb',l:'کوردی'},{c:'ar',l:'عربی'},{c:'en',l:'EN'}].map(x=>(
                  <button key={x.c} onClick={()=>{sw(x.c);setDrawer(false)}} style={{flex:1,padding:'8px 4px',borderRadius:8,border:'none',fontWeight:700,fontSize:12,cursor:'pointer',fontFamily:'inherit',background:lang===x.c?'var(--gold)':'var(--mid)',color:lang===x.c?'#06091a':'var(--soft)'}}>{x.l}</button>
                ))}
              </div>
            </div>
            {user?(
              <>
                {isAdmin&&<>
                  <button className="di" onClick={()=>{setEditing(null);setPostModal(true);setDrawer(false)}}><div className="dico" style={{background:'rgba(200,150,42,.12)'}}><i className="fas fa-plus" style={{color:'var(--gold2)'}}/></div>{t('addPost')}</button>
                  <button className="di" onClick={()=>{setSpMgr(true);setDrawer(false)}}><div className="dico" style={{background:'rgba(167,139,250,.1)'}}><i className="fas fa-star" style={{color:'#a78bfa'}}/></div>{t('mgSp')}</button>
                </>}
                <button className="di" onClick={async()=>{await SB.auth.signOut();window.location.reload()}} style={{color:'#f08080'}}><div className="dico" style={{background:'rgba(192,57,43,.1)'}}><i className="fas fa-sign-out-alt" style={{color:'#f08080'}}/></div>{t('logout')}</button>
              </>
            ):(
              <>
                <button className="di" onClick={()=>{setAuthMode('login');setDrawer(false)}}><div className="dico" style={{background:'rgba(200,150,42,.12)'}}><i className="fas fa-user" style={{color:'var(--gold2)'}}/></div>{t('login')}</button>
                <button className="di" onClick={()=>{setAuthMode('signup');setDrawer(false)}}><div className="dico" style={{background:'rgba(13,148,136,.12)'}}><i className="fas fa-user-plus" style={{color:'var(--teal2)'}}/></div>{t('signup')}</button>
              </>
            )}
          </div>
        </div>
      )}

      {authMode&&<AuthModal mode={authMode} onClose={()=>setAuthMode(null)} onSwitch={()=>setAuthMode(m=>m==='login'?'signup':'login')}/>}
      {needLogin&&(
        <div className="modal-backdrop" onClick={()=>setNeedLogin(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()} style={{maxWidth:340}}>
            <div style={{padding:28,textAlign:'center'}}>
              <div style={{fontSize:44,marginBottom:12}}>❤️</div>
              <h3 style={{fontWeight:800,fontSize:17,marginBottom:8,color:'var(--white)'}}>{t('loginLike')}</h3>
              <div style={{display:'flex',gap:8,marginTop:16}}>
                <button className="btn btn-gold" style={{flex:1}} onClick={()=>{setNeedLogin(false);setAuthMode('login')}}>{t('login')}</button>
                <button className="btn btn-ghost" style={{flex:1}} onClick={()=>{setNeedLogin(false);setAuthMode('signup')}}>{t('signup')}</button>
              </div>
            </div>
          </div>
        </div>
      )}
      {postModal&&<PostModal editing={editing} onSave={()=>{setPostModal(false);setEditing(null);loadPosts()}} onClose={()=>{setPostModal(false);setEditing(null)}}/>}
      {spMgr&&<SponsorMgr sponsors={sponsors} onUpdate={()=>{loadSponsors();setSpMgr(false)}} onClose={()=>setSpMgr(false)}/>}
    </div>
  );
};

const Root=()=><Provider><App/></Provider>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
