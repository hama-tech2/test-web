<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<style>
/* ─── VARIABLES ─── */
:root{
  --bg:#060a08;--surf:#0f1713;--elev:#141f1a;
  --brd:#1e2f26;--txt:#e6f2ec;--muted:#6b8f7e;
  --acc:#10b981;--acc2:#059669;
  --red:#ef4444;--red2:#b91c1c;
  --r:12px;--rs:8px;
}
/* ─── RESET ─── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Outfit','Noto Sans Arabic',sans-serif;background:var(--bg);color:var(--txt);overflow-x:hidden;-webkit-font-smoothing:antialiased}
button,input,textarea{font-family:inherit}
img{max-width:100%;display:block}
a{color:inherit;text-decoration:none}
.rtl{direction:rtl}.ltr{direction:ltr}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg)}
::-webkit-scrollbar-thumb{background:var(--acc2);border-radius:2px}

/* ─── ANIMATIONS ─── */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
@keyframes glow{0%,100%{opacity:.4}50%{opacity:.8}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes toast-in{from{opacity:0;transform:translateX(-50%) translateY(-8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
/* Sponsor: slide in from left, pause, slide out to left */
@keyframes sp-in{
  0%{opacity:0;transform:translateX(-60px)}
  15%,85%{opacity:1;transform:translateX(0)}
  100%{opacity:0;transform:translateX(-60px)}
}

/* ─── LAYOUT HELPERS ─── */
.c{max-width:1080px;margin:0 auto;padding:0 16px}
.flex{display:flex}.fcc{display:flex;align-items:center;justify-content:center}
.aic{align-items:center}.jb{justify-content:space-between}.wrap{flex-wrap:wrap}
.col{flex-direction:column}.g2{gap:8px}.g3{gap:12px}.g4{gap:16px}
.f1{flex:1}.rel{position:relative}.abs{position:absolute}
.fixed{position:fixed}.inset{inset:0}.ov-h{overflow:hidden}.ov-ya{overflow-y:auto}
.w100{width:100%}.h100{height:100%}
.grid{display:grid}
.g-auto{grid-template-columns:repeat(auto-fill,minmax(280px,1fr))}
.g-2{grid-template-columns:repeat(2,1fr)}
.g-3{grid-template-columns:repeat(3,1fr)}
@media(min-width:640px){.sm2{grid-template-columns:repeat(2,1fr)}}
@media(min-width:768px){.md3{grid-template-columns:repeat(3,1fr)}}

/* ─── TYPOGRAPHY ─── */
.xs{font-size:11px}.sm{font-size:13px}.base{font-size:15px}.lg{font-size:18px}
.xl{font-size:22px}.xxl{font-size:28px}
.bold{font-weight:700}.xbold{font-weight:800}.black{font-weight:900}
.tc{text-align:center}.muted{color:var(--muted)}.acc{color:var(--acc)}
.up{text-transform:uppercase}.ls{letter-spacing:.15em}

/* ─── SPACING ─── */
.p2{padding:8px}.p3{padding:12px}.p4{padding:16px}.p5{padding:20px}
.px3{padding-inline:12px}.px4{padding-inline:16px}.px5{padding-inline:20px}
.py2{padding-block:8px}.py3{padding-block:12px}.py4{padding-block:16px}.py5{padding-block:40px}
.mt1{margin-top:4px}.mt2{margin-top:8px}.mt3{margin-top:12px}.mt4{margin-top:16px}.mt6{margin-top:24px}
.mb1{margin-bottom:4px}.mb2{margin-bottom:8px}.mb3{margin-bottom:12px}.mb4{margin-bottom:16px}

/* ─── BUTTON ─── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;
  padding:10px 18px;border-radius:var(--rs);border:none;
  font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none!important}
.btn-p{background:linear-gradient(135deg,var(--acc),var(--acc2));color:#02140d}
.btn-p:hover:not(:disabled){filter:brightness(1.1);transform:translateY(-1px)}
.btn-g{background:transparent;border:1px solid var(--brd);color:var(--muted)}
.btn-g:hover{border-color:var(--acc);color:var(--txt)}
.btn-d{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.25)}
.btn-d:hover{background:rgba(239,68,68,.2)}

/* ─── INPUT ─── */
.inp{width:100%;background:var(--bg);border:1.5px solid var(--brd);border-radius:var(--rs);
  padding:11px 14px;color:var(--txt);font-size:14px;outline:none;transition:border-color .2s}
.inp:focus{border-color:var(--acc)}
.inp::placeholder{color:#3d5a4e}

/* ─── CARD ─── */
.card{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);
  overflow:hidden;transition:transform .2s,border-color .2s,box-shadow .2s}
.card:hover{border-color:rgba(16,185,129,.3);box-shadow:0 12px 40px rgba(0,0,0,.45)}

/* ─── BADGE ─── */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:20px;
  font-size:11px;font-weight:700;background:rgba(16,185,129,.1);
  color:var(--acc);border:1px solid rgba(16,185,129,.2)}

/* ─── MODAL ─── */
.mover{position:fixed;inset:0;background:rgba(0,0,0,.88);backdrop-filter:blur(6px);
  z-index:50;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:520px){.mover{align-items:center;padding:20px}}
.mbox{background:var(--elev);border:1px solid var(--brd);width:100%;max-width:520px;
  max-height:92vh;overflow-y:auto;border-radius:var(--r) var(--r) 0 0;
  animation:fadeUp .22s ease}
@media(min-width:520px){.mbox{border-radius:var(--r);animation:fadeIn .2s ease}}
.mhdr{position:sticky;top:0;background:var(--elev);padding:16px 20px;
  border-bottom:1px solid var(--brd);display:flex;align-items:center;
  justify-content:space-between;z-index:2}
.mhdr h3{font-size:15px;font-weight:800}
.mbdy{padding:20px;display:flex;flex-direction:column;gap:16px}

/* ─── DRAWER ─── */
.dov{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(4px);z-index:60}
.dpan{position:absolute;top:0;bottom:0;width:min(300px,85vw);background:var(--surf);
  display:flex;flex-direction:column;overflow-y:auto}
.rtl .dpan{right:0;border-inline-start:1px solid var(--brd);animation:fadeIn .2s ease}
.ltr .dpan{left:0;border-inline-end:1px solid var(--brd);animation:fadeIn .2s ease}
.di{display:flex;align-items:center;gap:12px;padding:12px 20px;font-size:14px;
  font-weight:600;color:var(--txt);background:none;border:none;width:100%;
  text-align:inherit;cursor:pointer;transition:background .12s;text-decoration:none}
.di:hover{background:var(--elev)}
.dic{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;
  justify-content:center;font-size:14px;background:rgba(16,185,129,.1);flex-shrink:0}

/* ─── TOAST ─── */
.tw{position:fixed;top:16px;left:50%;transform:translateX(-50%);
  z-index:200;display:flex;flex-direction:column;gap:8px;pointer-events:none;
  width:max-content;max-width:90vw}
.toast{padding:10px 18px;border-radius:var(--rs);font-size:13px;font-weight:600;
  box-shadow:0 10px 30px rgba(0,0,0,.5);animation:toast-in .3s ease;
  background:var(--elev);border:1px solid var(--brd);text-align:center}
.t-ok{border-color:rgba(16,185,129,.3);color:var(--acc)}
.t-err{border-color:rgba(239,68,68,.3);color:var(--red)}

/* ─── SPONSOR STRIP ─── */
.sp-strip{position:relative;height:72px;background:var(--surf);
  border-bottom:1px solid var(--brd);overflow:hidden;flex-shrink:0}
@media(min-width:768px){.sp-strip{height:96px}}
.sp-slide{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center;padding:6px 12px;animation:sp-in 5s ease-in-out forwards}
.sp-slide img{max-height:100%;max-width:100%;width:100%;object-fit:contain;
  border-radius:4px}
.sp-link{display:flex;align-items:center;justify-content:center;width:100%;height:100%}

/* ─── HERO ─── */
#hero{position:relative;min-height:100vh;min-height:100dvh;
  display:flex;align-items:center;justify-content:center;overflow:hidden}
.vbg{position:absolute;inset:0;z-index:0}
.vbg video{width:100%;height:100%;object-fit:cover;object-position:center;
  position:absolute;top:0;left:0;display:block}
.vbg::after{content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(6,10,8,.85) 0%,rgba(6,10,8,.3) 45%,rgba(6,10,8,.92) 100%)}
.hcont{position:relative;z-index:2;text-align:center;
  padding:100px 20px 80px;max-width:820px;margin:0 auto;width:100%}
.htitle{font-family:'Outfit',sans-serif;font-weight:900;
  font-size:clamp(44px,9vw,96px);letter-spacing:-2px;line-height:.95;
  background:linear-gradient(120deg,#fff 0%,#a7f3d0 40%,var(--acc) 70%,#fff 100%);
  background-size:250% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;animation:fadeUp .7s ease .1s both}
.hsub{font-family:'Noto Sans Arabic',sans-serif;font-weight:900;
  font-size:clamp(16px,2.8vw,22px);color:rgba(245,208,128,.85);
  margin-top:10px;animation:fadeUp .7s ease .35s both}
.hdesc{color:rgba(220,238,255,.6);font-size:clamp(13px,2.2vw,16px);
  line-height:1.75;margin:16px auto 32px;max-width:520px;
  animation:fadeUp .7s ease .55s both}
.hcta{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;
  animation:fadeUp .7s ease .75s both}
.hstats{display:flex;gap:40px;justify-content:center;margin-top:50px;
  animation:fadeUp .7s ease .95s both;flex-wrap:wrap}
.scroll-h{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  display:flex;flex-direction:column;align-items:center;gap:4px;
  color:rgba(255,255,255,.25);animation:fadeIn 1s ease 2.5s both;z-index:2}

/* ─── HEADER ─── */
.hdr{position:sticky;top:0;z-index:40;background:rgba(6,10,8,.9);
  backdrop-filter:blur(12px);border-bottom:1px solid var(--brd)}

/* ─── SECTION TITLE ─── */
.stitle{display:flex;align-items:center;gap:12px;margin-bottom:20px}
.stitle::before{content:'';display:block;width:28px;height:3px;border-radius:2px;
  background:linear-gradient(90deg,var(--acc),var(--acc2));flex-shrink:0}
.stitle h2{font-weight:900;font-size:24px}

/* ─── POST IMAGES ─── */
.pimg{position:relative}
.pimg .fi{background:var(--brd);overflow:hidden;cursor:pointer}
.pimg .fi img{width:100%;height:100%;object-fit:cover;transition:transform .3s}
.pimg .fi:hover img{transform:scale(1.04)}
.pi1{height:230px}
.pi2{display:grid;grid-template-columns:1fr 1fr;gap:2px;height:200px}
.pi3{display:grid;grid-template-columns:1.6fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:210px}
.pi3 .fi:first-child{grid-row:1/3}
.pi4{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;height:210px}
.pi5{display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:1fr 1fr;gap:2px;height:200px}
.pmore{position:absolute;inset:0;background:rgba(6,10,8,.55);
  display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:900;color:#fff}
.dbadge{position:absolute;top:10px;left:10px;z-index:6;width:44px;height:44px;
  border-radius:50%;background:linear-gradient(135deg,var(--red),var(--red2));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-weight:900;font-size:11px;line-height:1.1;text-align:center;
  box-shadow:0 4px 12px rgba(185,28,28,.45)}
.ltr .dbadge{left:auto;right:10px}
.exp-ov{position:absolute;inset:0;background:rgba(6,10,8,.6);
  backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:6}
.exp-ov span{background:var(--red);color:#fff;padding:7px 18px;border-radius:6px;
  font-weight:900;font-size:13px}

/* ─── COUNTDOWN ─── */
.cd{display:inline-flex;align-items:center;gap:4px;padding:6px 12px;
  border-radius:8px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.18)}
.cd-b{text-align:center;min-width:24px}
.cd-n{font-weight:900;font-size:16px;line-height:1;color:#fff}
.cd-l{font-size:7px;color:var(--acc);text-transform:uppercase;letter-spacing:.8px;margin-top:1px}
.cd-s{color:rgba(16,185,129,.5);font-weight:900;font-size:13px;align-self:center;margin-bottom:2px}

/* ─── LIGHTBOX ─── */
.lb{position:fixed;inset:0;background:rgba(0,0,0,.96);z-index:300;
  display:flex;align-items:center;justify-content:center;padding:16px}
.lb img{max-width:92vw;max-height:86vh;object-fit:contain;border-radius:var(--rs)}
.lb-x{position:absolute;top:12px;right:16px;background:none;border:none;
  color:#fff;font-size:32px;cursor:pointer;width:44px;height:44px;
  display:flex;align-items:center;justify-content:center}
.lb-n{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.08);
  border:none;color:#fff;width:42px;height:42px;border-radius:50%;font-size:22px;
  cursor:pointer;display:flex;align-items:center;justify-content:center}

/* ─── CROP ─── */
.cw{position:relative;display:inline-block;touch-action:none;user-select:none;cursor:grab}
.cw:active{cursor:grabbing}
.ci{max-width:360px;max-height:360px;display:block;border-radius:var(--rs)}
.cb{position:absolute;border:2px dashed #fff;box-shadow:0 0 0 9999px rgba(0,0,0,.55);
  border-radius:4px;pointer-events:none}

/* ─── COMMENTS ─── */
.cmt-list{display:flex;flex-direction:column;gap:6px;margin-top:8px}
.cmt{background:var(--bg);border:1px solid var(--brd);border-radius:var(--rs);padding:8px 10px}
.cmt-meta{font-size:10px;color:var(--muted);margin-bottom:3px;display:flex;gap:6px;align-items:center}
.cmt-txt{font-size:12px;line-height:1.4}

/* ─── SKELETON ─── */
.sk{background:linear-gradient(90deg,var(--brd) 25%,var(--elev) 50%,var(--brd) 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}

/* ─── LOCATION CARD ─── */
.lcard{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);
  padding:20px;display:block;transition:all .2s;text-decoration:none;color:inherit}
.lcard:hover{border-color:rgba(16,185,129,.35);transform:translateY(-3px);
  box-shadow:0 12px 36px rgba(0,0,0,.4)}

/* ─── ABOUT FEATURES ─── */
.af{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:28px}
.ai{background:var(--surf);border:1px solid var(--brd);border-radius:var(--r);
  padding:18px 14px;width:140px;text-align:center;transition:all .2s}
.ai:hover{border-color:var(--acc)}
.aico{width:40px;height:40px;border-radius:10px;background:rgba(16,185,129,.1);
  border:1px solid rgba(16,185,129,.2);display:flex;align-items:center;
  justify-content:center;margin:0 auto 10px;font-size:17px;color:var(--acc)}

/* ─── MOBILE NAV ─── */
.mnav{position:fixed;bottom:0;left:0;right:0;z-index:50;
  background:rgba(6,10,8,.97);border-top:1px solid var(--brd);
  backdrop-filter:blur(14px);display:flex;justify-content:space-around;
  height:56px;padding-bottom:env(safe-area-inset-bottom)}
.mnb{flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:2px;color:var(--muted);background:none;border:none;
  cursor:pointer;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.3px}
.mnb.act{color:var(--acc)}

/* ─── FABs ─── */
.fab-wa{position:fixed;bottom:68px;right:16px;width:50px;height:50px;
  border-radius:50%;background:#25d366;display:flex;align-items:center;
  justify-content:center;color:#fff;font-size:22px;z-index:45;
  box-shadow:0 4px 20px rgba(37,211,102,.4);transition:transform .2s;text-decoration:none}
.fab-wa:hover{transform:scale(1.1)}
.fab-add{position:fixed;bottom:68px;left:16px;width:50px;height:50px;
  border-radius:50%;background:linear-gradient(135deg,var(--acc),var(--acc2));
  border:none;display:flex;align-items:center;justify-content:center;
  color:#02140d;font-size:22px;z-index:45;cursor:pointer;
  box-shadow:0 4px 20px rgba(16,185,129,.45);transition:transform .2s}
.fab-add:hover{transform:scale(1.1) rotate(90deg)}

/* ─── DIVIDER ─── */
.div{height:1px;background:linear-gradient(90deg,transparent,var(--brd),transparent);margin:0 16px}

/* ─── RESPONSIVE ─── */
@media(max-width:640px){
  .hm{display:none!important}
  .pi1{height:200px!important}
  .pi2,.pi3,.pi4,.pi5{height:170px!important}
  .hstats{gap:20px!important}
  .ai{width:120px!important}
  .sp-strip{height:58px!important}
}
@media(min-width:641px){
  .hd{display:none!important}
  .mnav{display:none!important}
  .fab-wa{bottom:24px}
  .fab-add{bottom:24px}
}
</style>

/* ═══ CONTEXT ═══ */
const Ctx=React.createContext();
function AppProv({children}){
  const[lang,setLang]=useState('ckb');
  const[user,setUser]=useState(null);
  const[isAdmin,setIsAdmin]=useState(false);
  const[ready,setReady]=useState(false);
  const[toasts,setToasts]=useState([]);

  const t=useCallback(k=>{
    const ks=k.split('.');let v=T[lang];
    for(const x of ks){if(v==null)return k;v=v[x];}
    return v==null?k:String(v);
  },[lang]);

  const addToast=useCallback((msg,type='ok')=>{
    const id=Date.now()+Math.random();
    setToasts(p=>[...p,{id,msg,type}]);
    setTimeout(()=>setToasts(p=>p.filter(x=>x.id!==id)),3200);
  },[]);

  const sw=useCallback(l=>{
    setLang(l);
    document.documentElement.lang=l;
    document.documentElement.dir=l==='en'?'ltr':'rtl';
  },[]);

  const checkAdmin=useCallback(async(uid,email)=>{
    if(email===ADMIN){setIsAdmin(true);return;}
    const{data}=await SB.from('profiles').select('is_admin').eq('id',uid).maybeSingle();
    setIsAdmin(!!(data?.is_admin));
  },[]);

  useEffect(()=>{
    // Handle OAuth error in URL hash
    const h=window.location.hash;
    if(h&&(h.includes('error='))){
      const p=new URLSearchParams(h.replace('#',''));
      const err=(p.get('error_description')||p.get('error')||'Login failed')
        .replace(/\+/g,' ');
      addToast(decodeURIComponent(err),'err');
      window.history.replaceState(null,'',window.location.pathname);
    }
    SB.auth.getSession().then(({data:{session}})=>{
      const u=session?.user||null;
      setUser(u);
      if(u)checkAdmin(u.id,u.email);
      setReady(true);
    });
    const{data:{subscription}}=SB.auth.onAuthStateChange((_,s)=>{
      const u=s?.user||null;
      setUser(u);
      if(u)checkAdmin(u.id,u.email);
      else setIsAdmin(false);
    });
    return()=>subscription.unsubscribe();
  },[checkAdmin,addToast]);

  const dir=lang==='en'?'ltr':'rtl';
  return(
    <Ctx.Provider value={{lang,t,sw,dir,user,isAdmin,ready,addToast}}>
      {children}
      <div className="tw">
        {toasts.map(x=><div key={x.id} className={`toast t-${x.type}`}>{x.msg}</div>)}
      </div>
    </Ctx.Provider>
  );
}
const useApp=()=>useContext(Ctx);

/* ═══ HELPERS ═══ */
function tLeft(iso,days){
  const diff=new Date(iso).getTime()+days*86400000-Date.now();
  if(diff<=0)return null;
  return{d:Math.floor(diff/86400000),h:Math.floor(diff%86400000/3600000),m:Math.floor(diff%3600000/60000)};
}
function parseImgs(v){try{return Array.isArray(v)?v:JSON.parse(v||'[]')}catch{return[]}}

async function storeUpload(bucket,blob,ext='jpg'){
  const nm=`${Date.now()}_${Math.random().toString(36).slice(2,7)}.${ext}`;
  const{error}=await SB.storage.from(bucket).upload(nm,blob,{contentType:'image/jpeg'});
  if(error)throw error;
  return SB.storage.from(bucket).getPublicUrl(nm).data.publicUrl;
}

/* ═══ CROP MODAL ═══ */
function CropModal({file,aspect,onDone,onClose}){
  const{t}=useApp();
  const[img,setImg]=useState(null);
  const[crop,setCrop]=useState({x:0,y:0});
  const[drag,setDrag]=useState(false);
  const dr=useRef({sx:0,sy:0,cx:0,cy:0});
  const sz=useRef({rw:0,rh:0,cw:0,ch:0,scale:1});

  useEffect(()=>{
    const url=URL.createObjectURL(file);
    const im=new Image();
    im.onload=()=>{
      const nw=im.naturalWidth,nh=im.naturalHeight;
      const max=360,scale=Math.min(max/nw,max/nh,1);
      const rw=nw*scale,rh=nh*scale;
      let cw,ch;
      if(aspect>=rw/rh){cw=rw;ch=rw/aspect}else{ch=rh;cw=rh*aspect}
      sz.current={rw,rh,cw,ch,scale};
      setImg(im);
      setCrop({x:(rw-cw)/2,y:(rh-ch)/2});
    };
    im.src=url;
    return()=>URL.revokeObjectURL(url);
  },[file,aspect]);

  const getXY=e=>{const t=e.touches;return t?{x:t[0].clientX,y:t[0].clientY}:{x:e.clientX,y:e.clientY}};
  const onS=e=>{setDrag(true);const{x,y}=getXY(e);dr.current={sx:x,sy:y,cx:crop.x,cy:crop.y}};
  const onM=e=>{
    if(!drag)return;
    const{x,y}=getXY(e);
    const{rw,rh,cw,ch}=sz.current;
    setCrop({
      x:Math.max(0,Math.min(rw-cw,dr.current.cx+(x-dr.current.sx))),
      y:Math.max(0,Math.min(rh-ch,dr.current.cy+(y-dr.current.sy)))
    });
  };
  const onE=()=>setDrag(false);
  const confirm=()=>{
    if(!img)return;
    const{scale,cw,ch}=sz.current;
    const ox=crop.x/scale,oy=crop.y/scale,ow=cw/scale,oh=ch/scale;
    const outW=Math.min(aspect>2?1400:1000,ow);
    const outH=outW/aspect;
    const c=document.createElement('canvas');
    c.width=outW;c.height=outH;
    c.getContext('2d').drawImage(img,ox,oy,ow,oh,0,0,outW,outH);
    c.toBlob(b=>{if(b)onDone(b)},'image/jpeg',0.92);
  };

  if(!img)return(
    <div className="mover">
      <div className="mbox" style={{padding:40,textAlign:'center'}}>
        <i className="fas fa-spinner fa-spin acc" style={{fontSize:28}}/>
      </div>
    </div>
  );
  const{rw,rh,cw,ch}=sz.current;
  return(
    <div className="mover" onClick={onClose}>
      <div className="mbox" style={{maxWidth:440,textAlign:'center'}} onClick={e=>e.stopPropagation()}>
        <div className="mhdr"><h3>{t('crop')}</h3><button className="btn btn-g" style={{padding:'6px 10px'}} onClick={onClose}>×</button></div>
        <div className="mbdy" style={{alignItems:'center'}}>
          <p className="xs muted">Drag to reposition. Area outside dashed border is removed.</p>
          <div className="cw" onMouseDown={onS} onMouseMove={onM} onMouseUp={onE} onMouseLeave={onE} onTouchStart={onS} onTouchMove={onM} onTouchEnd={onE}>
            <img src={img.src} alt="" className="ci" style={{width:rw,height:rh}} draggable={false}/>
            <div className="cb" style={{left:crop.x,top:crop.y,width:cw,height:ch}}/>
          </div>
          <div className="flex g3 justify-center">
            <button className="btn btn-g" onClick={onClose}>{t('cancel')}</button>
            <button className="btn btn-p" onClick={confirm}><i className="fas fa-check"/> {t('upload')}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ═══ LIGHTBOX ═══ */
function Lightbox({images,start,onClose}){
  const[i,setI]=useState(start);
  useEffect(()=>{
    const h=e=>{
      if(e.key==='Escape')onClose();
      if(e.key==='ArrowLeft')setI(x=>(x-1+images.length)%images.length);
      if(e.key==='ArrowRight')setI(x=>(x+1)%images.length);
    };
    window.addEventListener('keydown',h);
    return()=>window.removeEventListener('keydown',h);
  },[images,onClose]);
  return(
    <div className="lb" onClick={onClose}>
      <button className="lb-x" onClick={onClose}>×</button>
      {images.length>1&&<div style={{position:'absolute',top:18,left:'50%',transform:'translateX(-50%)',color:'rgba(255,255,255,.5)',fontSize:13}}>{i+1}/{images.length}</div>}
      <img src={images[i]} alt="" onClick={e=>e.stopPropagation()}/>
      {images.length>1&&<>
        <button className="lb-n" style={{left:12}} onClick={e=>{e.stopPropagation();setI(x=>(x-1+images.length)%images.length)}}>‹</button>
        <button className="lb-n" style={{right:12}} onClick={e=>{e.stopPropagation();setI(x=>(x+1)%images.length)}}>›</button>
      </>}
    </div>
  );
}

/* ═══ SPONSOR STRIP ═══ */
function SponsorStrip({sponsors}){
  const[idx,setIdx]=useState(0);
  const[tick,setTick]=useState(0);
  useEffect(()=>{
    if(sponsors.length<=1)return;
    const id=setInterval(()=>{setIdx(i=>(i+1)%sponsors.length);setTick(t=>t+1);},5200);
    return()=>clearInterval(id);
  },[sponsors.length]);
  if(!sponsors.length)return null;
  const s=sponsors[idx];
  return(
    <div className="sp-strip">
      <div key={`${s.id}-${tick}`} className="sp-slide">
        {s.link_url
          ?<a href={s.link_url} target="_blank" rel="noreferrer" className="sp-link"><img src={s.image_url} alt="sponsor"/></a>
          :<img src={s.image_url} alt="sponsor"/>}
      </div>
    </div>
  );
}

/* ═══ COUNTDOWN ═══ */
function Countdown({iso,days}){
  const{t}=useApp();
  const[tl,setTl]=useState(()=>tLeft(iso,days));
  useEffect(()=>{const id=setInterval(()=>setTl(tLeft(iso,days)),30000);return()=>clearInterval(id);},[iso,days]);
  if(!tl)return<span className="xs bold muted">{t('finished')}</span>;
  return(
    <div className="cd">
      {[{v:tl.d,l:t('days')},{v:tl.h,l:t('hrs')},{v:tl.m,l:t('min')}].map((x,i)=>(
        <React.Fragment key={i}>
          {i>0&&<span className="cd-s">:</span>}
          <div className="cd-b">
            <div className="cd-n">{String(x.v).padStart(2,'0')}</div>
            <div className="cd-l">{x.l}</div>
          </div>
        </React.Fragment>
      ))}
    </div>
  );
}

  const[busy,setBusy]=useState(false);

  useEffect(()=>{
    SB.from('comments').select('*, profiles(email)')
      .eq('post_id',postId).order('created_at',{ascending:true})
      .then(({data})=>setList(data||[]));
  },[postId]);

  const submit=async e=>{
    e.preventDefault();
    if(!text.trim()||!user)return;
    setBusy(true);
    try{
      const{data,error}=await SB.from('comments')
        .insert({post_id:postId,user_id:user.id,content:text.trim()})
        .select('*, profiles(email)').single();
      if(error)throw error;
      setList(p=>[...p,data]);
      setText('');
    }catch(e){addToast(e.message||'Comment failed','err');}
    setBusy(false);
  };

  return(
    <div style={{borderTop:'1px solid var(--brd)',paddingTop:8,marginTop:8}}>
      <div className="cmt-list" style={{maxHeight:120,overflowY:'auto'}}>
        {list.map(c=>(
          <div key={c.id} className="cmt">
            <div className="cmt-meta"><i className="fas fa-user-circle"/>{c.profiles?.email?.split('@')[0]||'User'}</div>
            <div className="cmt-txt">{c.content}</div>
          </div>
        ))}
        {!list.length&&<p style={{fontSize:11,color:'var(--muted)',padding:'4px 0'}}>{t('noComments')}</p>}
      </div>
      {user?(
        <form onSubmit={submit} style={{display:'flex',gap:6,marginTop:8}}>
          <input className="inp" placeholder={t('addComment')} value={text}
            onChange={e=>setText(e.target.value)}
            style={{fontSize:12,padding:'8px 10px',minHeight:0}}/>
          <button className="btn btn-p" disabled={busy||!text.trim()} style={{padding:'8px 12px',fontSize:12}}>
            <i className="fas fa-paper-plane"/>
          </button>
        </form>
      ):(
        <p style={{fontSize:11,color:'var(--muted)',marginTop:6}}>{t('loginLike')}</p>
      )}
    </div>
  );
}

/* ═══ DEAL CARD ═══ */
function DealCard({post,user,isAdmin,onLoginRequired,onDelete,onEdit}){
  const{t,dir,addToast}=useApp();
  const[liked,setLiked]=useState(false);
  const[likes,setLikes]=useState(post.like_count||0);
  const[copied,setCopied]=useState(false);
  const[lb,setLb]=useState(null);
  const[showCmt,setShowCmt]=useState(false);
  const imgs=parseImgs(post.images);
  const expired=!tLeft(post.created_at,post.discount_days);
  const title=(dir==='rtl'?post.title_ckb:post.title_en)||post.title_ckb||'';

  useEffect(()=>{
    if(!user)return;
    SB.from('likes').select('id').eq('post_id',post.id).eq('user_id',user.id).maybeSingle()
      .then(({data})=>setLiked(!!data));
  },[user?.id,post.id]);

  const handleLike=async()=>{
    if(!user){onLoginRequired();return;}
    try{
      if(liked){
        await SB.from('likes').delete().eq('post_id',post.id).eq('user_id',user.id);
        const nc=Math.max(0,likes-1);
        await SB.from('posts').update({like_count:nc}).eq('id',post.id);
        setLiked(false);setLikes(nc);
      }else{
        const{error}=await SB.from('likes').insert({post_id:post.id,user_id:user.id});
        if(error)throw error;
        const nc=likes+1;
        await SB.from('posts').update({like_count:nc}).eq('id',post.id);
        setLiked(true);setLikes(nc);
      }
    }catch(e){addToast('Like failed','err');}
  };

  const handleShare=async()=>{
    const url=`${window.location.origin}${window.location.pathname}?p=${post.id}`;
    if(navigator.share){try{await navigator.share({title,url});}catch(e){}}
    else if(navigator.clipboard){
      await navigator.clipboard.writeText(url);
      setCopied(true);setTimeout(()=>setCopied(false),2000);
      addToast(t('copied'),'ok');
    }
  };

  const n=imgs.length;
  const gc=n===1?'pi1':n===2?'pi2':n===3?'pi3':n===4?'pi4':'pi5';
  const vis=Math.min(n,5);

  return(
    <div className="card">
      <div className="pimg">
        {n===0?(
          <div style={{height:200,background:'var(--brd)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:36}}>🏷️</div>
        ):n===1?(
          <div className={`fi pi1`} onClick={()=>setLb(0)}><img src={imgs[0]} alt="" loading="lazy"/></div>
        ):(
          <div className={gc}>
            {imgs.slice(0,vis).map((img,i)=>(
              <div key={i} className="fi" onClick={()=>setLb(i)}>
                <img src={img} alt="" loading="lazy"/>
                {n>5&&i===vis-1&&<div className="pmore">+{n-4}</div>}
              </div>
            ))}
          </div>
        )}
        {post.discount_pct>0&&!expired&&(
          <div className={`dbadge${dir==='ltr'?' ltr':''}`}>{post.discount_pct}%</div>
        )}
        {expired&&<div className="exp-ov"><span>{t('finished')}</span></div>}
      </div>

      {lb!==null&&<Lightbox images={imgs} start={lb} onClose={()=>setLb(null)}/>}

      <div className="p4">
        <h3 style={{fontWeight:700,fontSize:15,marginBottom:10,lineHeight:1.35}}>{title}</h3>
        <div style={{marginBottom:12}}><Countdown iso={post.created_at} days={post.discount_days}/></div>

        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',
          paddingTop:10,borderTop:'1px solid var(--brd)',gap:4,flexWrap:'wrap'}}>
          <div style={{display:'flex',gap:4,flexWrap:'wrap'}}>
            <button onClick={handleLike} className="btn btn-g"
              style={{padding:'6px 10px',fontSize:12,gap:4,
                background:liked?'rgba(239,68,68,.12)':'',
                color:liked?'var(--red)':'var(--muted)',
                borderColor:liked?'rgba(239,68,68,.3)':''}}>
              <i className={liked?'fas fa-heart':'far fa-heart'}/>{likes}
            </button>
            <button onClick={handleShare} className="btn btn-g" style={{padding:'6px 10px',fontSize:12,gap:4}}>
              <i className="fas fa-share-alt"/>{copied?t('copied'):t('share')}
            </button>
            <button onClick={()=>setShowCmt(s=>!s)} className="btn btn-g"
              style={{padding:'6px 10px',fontSize:12,gap:4,
                color:showCmt?'var(--acc)':'var(--muted)'}}>
              <i className="fas fa-comment"/>{t('comments')}
            </button>
          </div>
          {isAdmin&&(
            <div style={{display:'flex',gap:4}}>
              <button onClick={()=>onEdit(post)} className="btn btn-g" style={{padding:'6px 8px',fontSize:12}}><i className="fas fa-pencil-alt"/></button>
              <button onClick={()=>onDelete(post.id)} className="btn btn-d" style={{padding:'6px 8px',fontSize:12}}><i className="fas fa-trash"/></button>
            </div>
          )}
        </div>
        {showCmt&&<Comments postId={post.id} user={user}/>}
      </div>
    </div>
  );
}

function PostModal({editing,onSave,onClose}){
  const{t,addToast}=useApp();
  const[imgs,setImgs]=useState(()=>editing?parseImgs(editing.images):[]);
  const[form,setForm]=useState({
    title:editing?.title_ckb||'',
    pct:editing?.discount_pct??0,
    days:editing?.discount_days||7,
    cat:editing?.category||'rice'
  });
  const[busy,setBusy]=useState(false);
  const[cropFile,setCropFile]=useState(null);
  const[cropAsp,setCropAsp]=useState(1);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));

  const onCropped=async blob=>{
    setCropFile(null);
    setBusy(true);
    try{
      const url=await storeUpload('posts-images',blob);
      setImgs(p=>[...p,url]);
      addToast('Image uploaded ✅','ok');
    }catch(e){
      addToast(e.message||'Upload failed. Check "posts-images" bucket in Supabase Storage.','err');
    }
    setBusy(false);
  };

  const submit=async()=>{
    if(!form.title.trim()||imgs.length===0)return;
    setBusy(true);
    try{
      const payload={
        title_ckb:form.title.trim(),title_ar:form.title.trim(),title_en:form.title.trim(),
        discount_pct:+form.pct,discount_days:+form.days,
        category:form.cat,images:JSON.stringify(imgs)
      };
      if(editing){
        const{error}=await SB.from('posts').update(payload).eq('id',editing.id);
        if(error)throw error;
        addToast('Updated ✅','ok');
      }else{
        const{error}=await SB.from('posts').insert({
          ...payload,created_at:new Date().toISOString(),like_count:0
        });
        if(error)throw error;
        addToast('Published 🎉','ok');
      }
      onSave();
    }catch(e){
      addToast(e.message||'Save failed. Check Supabase tables.','err');
    }
    setBusy(false);
  };

  return(
    <div className="mover" onClick={onClose}>
      <div className="mbox" onClick={e=>e.stopPropagation()}>
        <div className="mhdr">
          <h3>{editing?t('editPost'):t('addPost')}</h3>

        <div className="mbdy">

            <label style={{display:'block',fontSize:11,fontWeight:700,color:'var(--acc)',
              marginBottom:8,textTransform:'uppercase',letterSpacing:.5}}>
              وێنەکان * ({imgs.length}/5)
            </label>
            <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:4}}>
              {imgs.map((img,i)=>(
                <div key={i} style={{position:'relative',flexShrink:0}}>
                  <img src={img} alt="" style={{width:68,height:68,objectFit:'cover',
                    borderRadius:8,border:'1px solid var(--brd)',display:'block'}}/>
                  <button onClick={()=>setImgs(p=>p.filter((_,j)=>j!==i))}
                    style={{position:'absolute',top:-4,right:-4,background:'var(--red)',
                      color:'#fff',width:20,height:20,borderRadius:'50%',border:'none',
                      fontSize:11,cursor:'pointer',fontWeight:900,display:'flex',
                      alignItems:'center',justifyContent:'center'}}>×</button>
                </div>
              ))}
              {imgs.length<5&&(
                <label style={{width:68,height:68,borderRadius:8,
                  border:'1.5px dashed var(--brd)',background:'var(--bg)',
                  display:'flex',flexDirection:'column',alignItems:'center',
                  justifyContent:'center',cursor:'pointer',flexShrink:0,gap:4}}>
                  <i className="fas fa-camera acc" style={{fontSize:18}}/>
                  <span style={{fontSize:9,color:'var(--muted)',fontWeight:600}}>Add</span>
                  <input type="file" accept="image/*" style={{display:'none'}}
                    onChange={e=>{if(e.target.files[0])setCropFile(e.target.files[0]);}}/>
                </label>

            </div>
            <div style={{display:'flex',gap:6,marginTop:6}}>
              <button className={`btn ${cropAsp===1?'btn-p':'btn-g'}`} style={{padding:'6px 12px',fontSize:11}}
                onClick={()=>setCropAsp(1)}>1:1</button>

            <div>
              <label style={{display:'block',fontSize:11,color:'var(--muted)',marginBottom:6}}>

              </label>
              <input className="inp" type="number" min="0" max="99" value={form.pct}
                onChange={e=>set('pct',e.target.value)}/>
            </div>
            <div>
              <label style={{display:'block',fontSize:11,color:'var(--muted)',marginBottom:6}}>{t('pdays')}</label>
              <input className="inp" type="number" min="1" max="365" value={form.days}
                onChange={e=>set('days',e.target.value)}/>
            </div>
          </div>
          {/* Category */}
          <div>
            <label style={{display:'block',fontSize:11,color:'var(--muted)',marginBottom:8}}>جۆر</label>
            <div style={{display:'flex',flexWrap:'wrap',gap:6}}>

                  {T.ckb.cats[c]}
                </button>

            </div>
          </div>
          <button className="btn btn-p w100" onClick={submit}
            disabled={busy||!form.title.trim()||imgs.length===0}
            style={{padding:14,fontSize:15}}>
            {busy?<><i className="fas fa-spinner fa-spin"/> {t('uploading')}</>

          {(imgs.length===0||!form.title.trim())&&(
            <p style={{textAlign:'center',color:'var(--muted)',fontSize:11,marginTop:-8}}>
              {imgs.length===0?t('noImg'):t('noTitle')}
            </p>
          )}
        </div>
      </div>
    </div>
  );
}

function SponsorModal({sponsors,onUpdate,onClose}){
  const{t,addToast}=useApp();

  const[link,setLink]=useState('');
  const[cropFile,setCropFile]=useState(null);
  const[busy,setBusy]=useState(false);

  const onCropped=async blob=>{
    setCropFile(null);
    setBusy(true);
    try{
      const url=await storeUpload('images',blob);
      const{data,error}=await SB.from('sponsors')
        .insert({image_url:url,visible:true,link_url:link||null,sort_order:list.length})
        .select().single();
      if(error)throw error;
      setList(p=>[...p,data]);
      setLink('');
      addToast('Sponsor added ✅','ok');
    }catch(e){
      addToast(e.message||'Failed. Check "images" bucket in Supabase Storage.','err');
    }
    setBusy(false);
  };

  const toggle=async(id,cur)=>{
    await SB.from('sponsors').update({visible:!cur}).eq('id',id);
    setList(p=>p.map(s=>s.id===id?{...s,visible:!cur}:s));
  };
  const remove=async id=>{
    await SB.from('sponsors').delete().eq('id',id);
    setList(p=>p.filter(s=>s.id!==id));

  return(
    <div className="mover" onClick={onClose}>

              <input type="file" accept="image/*" style={{display:'none'}}
                onChange={e=>{if(e.target.files[0])setCropFile(e.target.files[0]);}}/>
            </label>
          </div>
          {cropFile&&<CropModal file={cropFile} aspect={4} onDone={onCropped} onClose={()=>setCropFile(null)}/>}

            <div key={s.id} style={{display:'flex',alignItems:'center',gap:10,
              paddingBottom:10,borderBottom:'1px solid var(--brd)'}}>
              <img src={s.image_url} alt="" style={{width:110,height:36,objectFit:'cover',
                borderRadius:6,border:'1px solid var(--brd)',flexShrink:0}}/>
              <div style={{flex:1,fontSize:11,color:'var(--muted)',overflow:'hidden',
                textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{s.link_url||'No link'}</div>
              <button className="btn btn-g" style={{padding:'6px 10px',fontSize:11}}
                onClick={()=>toggle(s.id,s.visible)}>{s.visible?'Hide':'Show'}</button>
              <button className="btn btn-d" style={{padding:'6px 8px',fontSize:11}}
                onClick={()=>remove(s.id)}>×</button>
            </div>
          ))}
          {!list.length&&<p style={{textAlign:'center',color:'var(--muted)',fontSize:13,padding:'16px 0'}}>No sponsors yet.</p>}
        </div>
      </div>
    </div>
  );
}

/* ═══ APP ═══ */
function App(){
  const{t,lang,dir,user,isAdmin,addToast}=useApp();
  const[posts,setPosts]=useState([]);
  const[sponsors,setSponsors]=useState([]);
  const[cat,setCat]=useState('all');
  const[shown,setShown]=useState(3);
  const[loading,setLoading]=useState(true);
  const[active,setActive]=useState('hero');
  const[drawer,setDrawer]=useState(false);
  const[authOpen,setAuthOpen]=useState(false);
  const[postModal,setPostModal]=useState(false);
  const[editing,setEditing]=useState(null);
  const[spModal,setSpModal]=useState(false);
  const vRef=useRef(null);

  const loadPosts=useCallback(async()=>{
    setLoading(true);
    try{
      const{data,error}=await SB.from('posts').select('*').order('created_at',{ascending:false});
      if(error)throw error;
      setPosts(data||[]);
    }catch(e){console.error('Posts:',e);}
    setLoading(false);
  },[]);

  const loadSponsors=useCallback(async()=>{
    try{
      const{data}=await SB.from('sponsors').select('*').eq('visible',true).order('sort_order');
      setSponsors(data||[]);
    }catch(e){console.error('Sponsors:',e);}
  },[]);

  useEffect(()=>{loadPosts();loadSponsors();},[loadPosts,loadSponsors]);
  useEffect(()=>{setShown(3);},[cat]);

  /* VIDEO: robust autoplay for GitHub Pages / mobile */
  useEffect(()=>{
    const v=vRef.current;
    if(!v)return;
    v.muted=true;
    const tryPlay=()=>{
      const p=v.play();
      if(p)p.catch(()=>{/* blocked by browser policy, bg color shows instead */});
    };
    if(v.readyState>=2)tryPlay();
    else v.addEventListener('canplay',tryPlay,{once:true});
    return()=>v.removeEventListener('canplay',tryPlay);
  },[]);

  useEffect(()=>{
    const ids=['hero','deals','locs','about'];
    const obs=new IntersectionObserver(
      entries=>entries.forEach(e=>{if(e.isIntersecting)setActive(e.target.id);}),
      {threshold:.2}
    );
    ids.forEach(id=>{const el=document.getElementById(id);if(el)obs.observe(el);});
    return()=>obs.disconnect();
  },[]);

  const delPost=async id=>{
    if(!window.confirm(t('del')+'?'))return;
    try{
      await SB.from('posts').delete().eq('id',id);
      setPosts(p=>p.filter(x=>x.id!==id));
      addToast('Deleted','ok');
    }catch(e){addToast('Delete failed','err');}
  };

  const handleSaved=()=>{setPostModal(false);setEditing(null);loadPosts();};

  const filtered=useMemo(()=>cat==='all'?posts:posts.filter(p=>p.category===cat),[posts,cat]);
  const visible=filtered.slice(0,shown);
  const go=id=>document.getElementById(id)?.scrollIntoView({behavior:'smooth'});
  const nav=[{id:'hero',i:'fa-home',l:t('home')},{id:'deals',i:'fa-tags',l:'Deals'},
    {id:'locs',i:'fa-map-marker-alt',l:t('locs')},{id:'about',i:'fa-info-circle',l:t('about')}];

  return(
    <div className={dir==='rtl'?'rtl':'ltr'}>

      <SponsorStrip sponsors={sponsors}/>

      {/* HEADER */}
      <header className="hdr">
        <div className="c flex aic jb" style={{height:52}}>
          <div className="flex aic g2" style={{cursor:'pointer'}} onClick={()=>go('hero')}>
            <div style={{width:32,height:32,borderRadius:8,flexShrink:0,
              background:'linear-gradient(135deg,var(--acc),var(--acc2))',
              display:'flex',alignItems:'center',justifyContent:'center',
              fontWeight:900,fontSize:16,color:'#02140d'}}>B</div>
            <div>
              <div style={{fontWeight:800,fontSize:14,lineHeight:1}}>Bilal Bazar</div>
              <div style={{fontSize:8,color:'var(--acc)',fontWeight:700,letterSpacing:2,textTransform:'uppercase',marginTop:1}}>Erbil · Kurdistan</div>
            </div>
          </div>
          <nav className="flex g2 hm">
            {nav.map(x=>(
              <button key={x.id} onClick={()=>go(x.id)} className="btn btn-g"
                style={{padding:'6px 10px',fontSize:13,borderColor:'transparent',
                  color:active===x.id?'var(--acc)':'var(--muted)'}}>
                {x.l}
              </button>
            ))}
          </nav>
          <div className="flex aic g2">
            {isAdmin&&(
              <button onClick={()=>{setEditing(null);setPostModal(true);}} className="btn btn-p hm" style={{padding:'7px 12px',fontSize:12}}>
                <i className="fas fa-plus"/> {t('addPost')}
              </button>
            )}
            {user&&(
              <div style={{width:28,height:28,borderRadius:'50%',background:'var(--elev)',
                border:'2px solid var(--acc)',display:'flex',alignItems:'center',
                justifyContent:'center',fontSize:12,fontWeight:700,color:'var(--acc)',flexShrink:0}}>
                {user.email[0].toUpperCase()}
              </div>
            )}
            <button onClick={()=>setDrawer(true)} className="btn btn-g" style={{padding:'8px 10px'}}>
              <i className="fas fa-bars"/>
            </button>
          </div>
        </div>
      </header>

      {/* HERO + VIDEO */}
      <section id="hero">
        <div className="vbg">
          {/*
            bg.mp4 must be in the SAME folder as index.html on GitHub.
            Commit: git add bg.mp4 && git commit -m "add video" && git push
          */}
          <video ref={vRef} autoPlay muted loop playsInline preload="auto">
            <source src="bg.mp4" type="video/mp4"/>
          </video>
        </div>

        {/* Ambient orbs */}
        <div style={{position:'absolute',width:500,height:500,borderRadius:'50%',
          background:'radial-gradient(circle,rgba(16,185,129,.08),transparent 70%)',
          top:'8%',right:'-6%',filter:'blur(60px)',
          animation:'glow 5s ease-in-out infinite',zIndex:1,pointerEvents:'none'}}/>
        <div style={{position:'absolute',width:350,height:350,borderRadius:'50%',
          background:'radial-gradient(circle,rgba(52,211,153,.06),transparent 70%)',
          bottom:'8%',left:'-4%',filter:'blur(60px)',
          animation:'glow 6s ease-in-out 1s infinite',zIndex:1,pointerEvents:'none'}}/>

        <div className="hcont">
          <h1 className="htitle">BILAL BAZAR</h1>
          <div style={{display:'flex',alignItems:'center',justifyContent:'center',gap:14,
            marginTop:8,animation:'fadeUp .7s ease .3s both'}}>
            <div style={{width:40,height:1,background:'linear-gradient(90deg,transparent,var(--acc))'}}/>
            <span style={{fontSize:10,fontWeight:700,letterSpacing:4,color:'var(--acc)',textTransform:'uppercase'}}>Erbil · Est. 2020</span>
            <div style={{width:40,height:1,background:'linear-gradient(90deg,var(--acc),transparent)'}}/>
          </div>
          <div className="hsub">{lang==='ckb'?'بیلال بازار':lang==='ar'?'بيلال بازار':'Bilal Bazar'}</div>
          <p className="hdesc">{t('sub')}</p>
          <div className="hcta">
            <button onClick={()=>go('deals')} className="btn btn-p" style={{padding:'14px 28px',borderRadius:30,fontSize:15}}>
              <i className="fas fa-fire" style={{color:'rgba(100,10,0,.7)'}}/>{t('deals')}
            </button>
            <button onClick={()=>go('locs')} className="btn btn-g"
              style={{padding:'14px 28px',borderRadius:30,fontSize:15,color:'#fff',borderColor:'rgba(255,255,255,.2)'}}>
              <i className="fas fa-map-marker-alt"/>{t('stores')}
            </button>
          </div>
          <div className="hstats">
            {[{n:'4',l:t('br')},{n:'10K+',l:t('pr')},{n:t('wk'),l:t('dc')}].map(s=>(
              <div key={s.n} style={{textAlign:'center'}}>
                <div style={{fontWeight:900,fontSize:26,color:'#fff',lineHeight:1}}>{s.n}</div>
                <div style={{fontSize:9,color:'var(--acc)',fontWeight:700,letterSpacing:1.5,textTransform:'uppercase',marginTop:4}}>{s.l}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="scroll-h">
          <span style={{fontSize:9,letterSpacing:2.5,textTransform:'uppercase',fontWeight:600}}>scroll</span>
          <i className="fas fa-chevron-down" style={{fontSize:11,animation:'float 2.5s ease-in-out infinite'}}/>
        </div>
      </section>

      {/* DEALS */}
      <section id="deals" style={{padding:'44px 0'}}>
        <div className="c">
          <div className="stitle"><h2>{t('dtitle')}</h2><span className="badge">{filtered.length}</span></div>
          <div style={{display:'flex',gap:8,overflowX:'auto',paddingBottom:14,marginBottom:20,scrollbarWidth:'none'}}>
            {CATS.map(c=>(
              <button key={c} onClick={()=>setCat(c)}
                className={`btn ${cat===c?'btn-p':'btn-g'}`}
                style={{borderRadius:22,padding:'8px 18px',fontSize:13,whiteSpace:'nowrap'}}>
                {t('cats.'+c)}
              </button>
            ))}
          </div>

          {loading?(
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
              {[1,2,3].map(i=>(
                <div key={i} className="card">
                  <div className="sk" style={{height:200}}/>
                  <div style={{padding:14,display:'flex',flexDirection:'column',gap:8}}>
                    <div className="sk" style={{height:14,width:'70%'}}/>
                    <div className="sk" style={{height:12,width:'50%'}}/>
                  </div>
                </div>
              ))}
            </div>
          ):filtered.length===0?(
            <div style={{textAlign:'center',padding:'60px 20px',color:'var(--muted)'}}>
              <div style={{fontSize:44,marginBottom:12}}>🏷️</div>
              <p style={{fontSize:16}}>{t('noDeals')}</p>
            </div>
          ):(
            <>
              <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(280px,1fr))',gap:16}}>
                {visible.map(post=>(
                  <DealCard key={post.id} post={post} user={user} isAdmin={isAdmin}
                    onLoginRequired={()=>setAuthOpen(true)}
                    onDelete={delPost}
                    onEdit={p=>{setEditing(p);setPostModal(true);}}/>
                ))}
              </div>
              {/* See More — only when more than 3 posts exist */}
              {filtered.length>3&&shown<=3&&(
                <div style={{textAlign:'center',marginTop:24}}>
                  <button className="btn btn-p" style={{borderRadius:30,padding:'12px 28px',fontSize:14}}
                    onClick={()=>setShown(filtered.length)}>
                    <i className="fas fa-chevron-down"/> {t('more')} ({filtered.length-3})
                  </button>
                </div>
              )}
              {shown>3&&filtered.length>3&&(
                <div style={{textAlign:'center',marginTop:24}}>
                  <button className="btn btn-g" style={{borderRadius:30,padding:'12px 28px',fontSize:14}}
                    onClick={()=>setShown(3)}>
                    <i className="fas fa-chevron-up"/> {t('lessBtn')}
                  </button>
                </div>
              )}
            </>
          )}
        </div>
      </section>

      <div className="div"/>

      {/* LOCATIONS */}
      <section id="locs" style={{padding:'44px 0',background:'var(--surf)',borderTop:'1px solid var(--brd)'}}>
        <div className="c">
          <div className="stitle" style={{justifyContent:'center'}}><h2>{t('ltitle')}</h2></div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(240px,1fr))',gap:14}}>
            {LOCS.map(loc=>(
              <a key={loc.id} href={loc.link} target="_blank" rel="noopener noreferrer" className="lcard">
                <div style={{width:40,height:40,borderRadius:10,
                  background:'rgba(16,185,129,.1)',border:'1px solid rgba(16,185,129,.2)',
                  display:'flex',alignItems:'center',justifyContent:'center',marginBottom:14}}>
                  <i className="fas fa-store acc"/>
                </div>
                <h3 style={{fontWeight:800,fontSize:14,marginBottom:5,lineHeight:1.35}}>
                  {loc[lang]||loc.en}
                </h3>
                <p style={{fontSize:12,color:'var(--muted)',marginBottom:13,lineHeight:1.4}}>
                  {loc.addr[lang]||loc.addr.en}
                </p>
                <div style={{display:'flex',flexDirection:'column',gap:5,marginBottom:13,
                  fontSize:11,color:'var(--muted)',direction:'ltr',textAlign:'start'}}>
                  <span style={{display:'flex',alignItems:'center',gap:6}}>
                    <i className="far fa-clock acc" style={{width:14}}/>{loc.hr}
                  </span>
                  <span style={{display:'flex',alignItems:'center',gap:6}}>
                    <i className="fas fa-phone acc" style={{width:14}}/>{loc.ph}
                  </span>
                </div>
                <div style={{display:'flex',gap:8}}>
                  <span className="btn btn-p f1" style={{padding:'8px',fontSize:12,gap:5}}>
                    <i className="fas fa-map-marker-alt"/>{t('openMap')}
                  </span>
                  <a href={`tel:+964${loc.ph.replace(/^0/,'').replace(/\s/g,'')}`}
                    onClick={e=>e.stopPropagation()} className="btn btn-g" style={{padding:'8px 12px'}}>
                    <i className="fas fa-phone"/>
                  </a>
                </div>
              </a>
            ))}
          </div>
        </div>
      </section>

      <div className="div"/>

      {/* ABOUT */}
      <section id="about" style={{padding:'44px 16px',maxWidth:700,margin:'0 auto',textAlign:'center'}}>
        <div className="stitle" style={{justifyContent:'center'}}><h2>{t('atitle')}</h2></div>
        <p style={{color:'var(--muted)',fontSize:15,lineHeight:1.85}}>{t('atext')}</p>
        <div className="af">
          {[{i:'fa-leaf',l:t('feat1')},{i:'fa-tag',l:t('feat2')},{i:'fa-award',l:t('feat3')}].map((f,i)=>(
            <div key={i} className="ai">
              <div className="aico"><i className={`fas ${f.i}`}/></div>
              <div style={{fontSize:12,fontWeight:700}}>{f.l}</div>
            </div>
          ))}
        </div>
      </section>

      {/* FOOTER */}
      <footer style={{textAlign:'center',padding:'32px 16px 72px',
        background:'var(--bg)',borderTop:'1px solid var(--brd)'}}>
        <div style={{fontWeight:900,fontSize:26,marginBottom:4,
          background:'linear-gradient(90deg,#fff,var(--acc))',
          WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent',backgroundClip:'text'}}>
          Bilal Bazar
        </div>
        <div style={{fontSize:8,fontWeight:700,color:'var(--acc)',letterSpacing:3,
          textTransform:'uppercase',marginBottom:8}}>Erbil · Kurdistan</div>
        <div style={{fontSize:14,color:'var(--muted)',marginBottom:18,fontFamily:'Noto Sans Arabic'}}>
          {lang==='ckb'?'بیلال بازار':lang==='ar'?'بيلال بازار':'Bilal Bazar'}
        </div>
        <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer"
          style={{display:'inline-flex',alignItems:'center',gap:8,
            background:'rgba(37,211,102,.09)',border:'1px solid rgba(37,211,102,.2)',
            borderRadius:10,padding:'10px 20px',color:'#25d366',
            textDecoration:'none',fontSize:14,fontWeight:700,marginBottom:18}}>
          <i className="fab fa-whatsapp" style={{fontSize:17}}/> WhatsApp
        </a>
        <p style={{fontSize:11,color:'var(--muted)'}}>{t('copy')}</p>
      </footer>

      {/* MOBILE BOTTOM NAV */}
      <div className="mnav hd">
        {nav.map(x=>(
          <button key={x.id} className={`mnb ${active===x.id?'act':''}`} onClick={()=>go(x.id)}>
            <i className={`fas ${x.i}`} style={{fontSize:19}}/>{x.l}
          </button>
        ))}
        <button className="mnb" onClick={()=>setDrawer(true)}>
          <i className="fas fa-bars" style={{fontSize:19}}/>{t('menu')}
        </button>
      </div>

      {/* FABs */}
      <a href="https://wa.me/9647509193030" target="_blank" rel="noreferrer" className="fab-wa">
        <i className="fab fa-whatsapp"/>
      </a>
      {isAdmin&&(
        <button className="fab-add" onClick={()=>{setEditing(null);setPostModal(true);}}>
          <i className="fas fa-plus"/>
        </button>
      )}

      {/* MODALS */}
      {drawer&&<Drawer onClose={()=>setDrawer(false)} onAuth={()=>setAuthOpen(true)}
        onAddPost={()=>{setEditing(null);setPostModal(true);}} onSpMgr={()=>setSpModal(true)}/>}
      {authOpen&&<AuthModal onClose={()=>setAuthOpen(false)}/>}
      {postModal&&<PostModal editing={editing} onSave={handleSaved}
        onClose={()=>{setPostModal(false);setEditing(null);}}/>}
      {spModal&&<SponsorModal sponsors={sponsors} onUpdate={setSponsors}
        onClose={()=>setSpModal(false)}/>}
    </div>
  );
}

const Root=()=><AppProv><App/></AppProv>;
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
